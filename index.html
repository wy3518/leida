<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洪荒剑仙 - 斩妖录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @keyframes bossWarning {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        @keyframes bossTextPulse {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.5);
            }
            20% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.2);
            }
            40% { 
                transform: translate(-50%, -50%) scale(1);
            }
            80% { 
                opacity: 1; 
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        @keyframes levelUpPulse {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.3);
            }
            30% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.1);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1);
            }
            80% { 
                opacity: 1; 
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.9);
            }
        }
        
        body {
            background: linear-gradient(135deg, #1a0f0a 0%, #2d1810 50%, #1a0f0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'SimSun', '宋体', serif;
            overflow: hidden;
            user-select: none;
        }
        
        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 32px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.8);
            margin-bottom: 8px;
            letter-spacing: 6px;
        }
        
        .subtitle {
            color: #8b7355;
            font-size: 14px;
            letter-spacing: 3px;
        }
        
        .stats {
            display: flex;
            gap: 25px;
            font-size: 14px;
            color: #d4af37;
            margin-top: 10px;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .canvas-wrapper {
            position: relative;
            border: 3px solid #8b4513;
            border-radius: 50%;
            box-shadow: 
                0 0 40px rgba(139, 69, 19, 0.4),
                inset 0 0 60px rgba(0, 0, 0, 0.5),
                0 0 0 2px #d4af37,
                0 0 0 4px #8b4513;
            background: radial-gradient(circle at center, #1a0f0a 0%, #0d0705 100%);
            margin-top: 15px;
        }
        
        canvas {
            border-radius: 50%;
            cursor: crosshair;
            display: block;
        }
        
        .controls {
            color: #8b7355;
            margin-top: 20px;
            font-size: 13px;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .revive-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }
        
        .revive-text {
            font-size: 40px;
            color: #dc143c;
            text-shadow: 0 0 30px #dc143c;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 10px;
        }
        
        .revive-countdown {
            font-size: 60px;
            color: #ffd700;
            text-shadow: 0 0 40px #ffd700;
            font-family: 'Courier New', monospace;
        }
        
        .revive-subtext {
            color: #8b7355;
            font-size: 16px;
            margin-top: 15px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>洪荒剑仙</h1>
            <div class="subtitle">上古战场 · 斩妖除魔</div>
            <div class="stats">
                <div class="stat-item">
                    <span>气血: <span id="playerHp">100</span>/100</span>
                </div>
                <div class="stat-item">
                    <span>斩妖: <span id="kills">0</span></span>
                </div>
                <div class="stat-item">
                    <span>波次: <span id="wave">1</span></span>
                </div>
                <div class="stat-item">
                    <span>修为: <span id="score">0</span></span>
                </div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="500" height="500"></canvas>
            <div class="revive-overlay" id="reviveOverlay">
                <div class="revive-text">道消身殒</div>
                <div class="revive-countdown" id="reviveCountdown">5</div>
                <div class="revive-subtext">元神重塑中...</div>
            </div>
        </div>
        
        <div class="controls">
            点击地面御剑飞行 | 剑气自动斩妖 | 死亡后5秒重塑肉身 | <button id="equipBtn" style="background:#8b4513;color:#ffd700;border:1px solid #d4af37;padding:2px 8px;cursor:pointer;font-family:inherit;">装备栏</button> | <button id="bagBtn" style="background:#4a7c59;color:#ffd700;border:1px solid #d4af37;padding:2px 8px;cursor:pointer;font-family:inherit;">背包</button>
        </div>
        
        <!-- 装备栏界面 -->
        <div id="equipPanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:3px solid #8b4513;border-radius:15px;padding:20px;z-index:10000;box-shadow:0 0 30px rgba(139,69,19,0.5);">
            <div style="text-align:center;color:#ffd700;font-size:20px;margin-bottom:15px;">🌿 装备栏 🌿</div>
            <div style="display:flex;gap:30px;">
                <!-- 左侧：人物和装备 -->
                <div style="position:relative;width:200px;height:280px;background:rgba(139,69,19,0.2);border-radius:10px;border:2px solid #8b4513;">
                    <!-- 头盔 -->
                    <div class="equip-slot" data-slot="helmet" style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;" title="头盔">🪖</div>
                    <!-- 左手法宝 -->
                    <div class="equip-slot" data-slot="leftHand" style="position:absolute;top:80px;left:10px;width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;" title="法宝">📿</div>
                    <!-- 人物 -->
                    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;">👤</div>
                    <!-- 右手绿武 -->
                    <div class="equip-slot" data-slot="weapon" id="weaponSlot" style="position:absolute;top:80px;right:10px;width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #90EE90;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 10px #90EE90;" title="绿武">🗡️</div>
                    <!-- 衣服 -->
                    <div class="equip-slot" data-slot="armor" style="position:absolute;top:150px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;" title="衣服">👘</div>
                    <!-- 鞋子 -->
                    <div class="equip-slot" data-slot="shoes" style="position:absolute;top:220px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;" title="鞋子">👢</div>
                    <!-- 项链 -->
                    <div class="equip-slot" data-slot="necklace" style="position:absolute;top:150px;left:10px;width:40px;height:40px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;" title="项链">📿</div>
                    <!-- 戒指 -->
                    <div class="equip-slot" data-slot="ring" style="position:absolute;top:150px;right:10px;width:40px;height:40px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;" title="戒指">💍</div>
                </div>
                <!-- 右侧：绿武信息 -->
                <div style="width:200px;color:#d4af37;">
                    <div style="font-size:16px;color:#90EE90;margin-bottom:10px;">🌿 绿芽剑</div>
                    <div style="font-size:14px;margin-bottom:5px;">阶段: <span id="gwStage" style="color:#90EE90;">嫩芽</span></div>
                    <div style="font-size:14px;margin-bottom:5px;">成长: <span id="gwGrowth">0</span>/<span id="gwMaxGrowth">100</span></div>
                    <div style="width:100%;height:10px;background:#333;border-radius:5px;margin:10px 0;overflow:hidden;">
                        <div id="gwBar" style="width:0%;height:100%;background:linear-gradient(90deg,#90EE90,#4CAF50);transition:width 0.3s;"></div>
                    </div>
                    <div style="font-size:12px;color:#888;margin-top:10px;">
                        <div>攻击加成: <span id="gwAtk">+0%</span></div>
                        <div>暴击加成: <span id="gwCrit">+0%</span></div>
                        <div style="margin-top:5px;color:#666;">技能: <span id="gwSkill">无</span></div>
                    </div>
                </div>
            </div>
            <button id="closeEquip" style="position:absolute;top:10px;right:10px;background:#8b4513;color:#ffd700;border:1px solid #d4af37;padding:5px 10px;cursor:pointer;font-family:inherit;border-radius:5px;">✕</button>
        </div>
        
        <!-- 背包界面 -->
        <div id="bagPanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:3px solid #8b4513;border-radius:15px;padding:20px;z-index:10000;box-shadow:0 0 30px rgba(139,69,19,0.5);width:340px;">
            <div style="text-align:center;color:#ffd700;font-size:20px;margin-bottom:15px;">🎒 背包</div>
            <div id="bagGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:15px;">
                <!-- 20个背包格子 -->
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span id="bagCount" style="color:#888;font-size:12px;">0/20</span>
                <button id="sortBag" style="background:#4a7c59;color:#fff;border:none;padding:5px 15px;cursor:pointer;font-family:inherit;border-radius:5px;font-size:12px;">自动整理</button>
            </div>
            <button id="closeBag" style="position:absolute;top:10px;right:10px;background:#8b4513;color:#ffd700;border:1px solid #d4af37;padding:5px 10px;cursor:pointer;font-family:inherit;border-radius:5px;">✕</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radarRadius = 230;

        let gameRunning = true;
        let playerAlive = true;
        let reviveTimer = 0;
        let wave = 1;
        let kills = 0;
        let score = 0;
        let frameCount = 0;

        const player = {
            x: centerX,
            y: centerY,
            radius: 14,
            hp: 100,
            maxHp: 100,
            attackRange: 90,
            attackDamage: 30,
            attackInterval: 6,
            attackTimer: 0,
            moveSpeed: 3,
            targetX: centerX,
            targetY: centerY,
            isMoving: false,
            color: '#ffd700',
            swordAngle: 0,
            // 绿武系统
            greenWeapon: {
                name: '绿芽剑',
                stage: 1, // 1-5阶段
                stageName: '嫩芽',
                color: '#90EE90',
                growth: 0,
                maxGrowth: 100,
                bonusAttack: 0,
                bonusCrit: 0,
                skill: null
            },
            // 已装备
            equipped: {
                helmet: null,
                armor: null,
                shoes: null,
                necklace: null,
                ring: null,
                leftHand: null
            }
        };

        // 背包系统
        const bag = {
            maxSize: 20,
            items: []
        };

        // 装备品质配置
        const itemQualities = {
            common: { name: '普通', color: '#808080', bonus: 1 },
            uncommon: { name: '精良', color: '#CD7F32', bonus: 1.2 },
            rare: { name: '稀有', color: '#C0C0C0', bonus: 1.5 },
            epic: { name: '史诗', color: '#FFD700', bonus: 2 },
            legendary: { name: '传说', color: '#FF6B35', bonus: 2.5 },
            mythic: { name: '神话', color: '#B19CD9', bonus: 3 }
        };

        // 装备类型配置
        const equipTypes = {
            helmet: { name: '头盔', icon: '🪖', stat: 'defense' },
            armor: { name: '衣服', icon: '👘', stat: 'hp' },
            shoes: { name: '鞋子', icon: '👢', stat: 'speed' },
            necklace: { name: '项链', icon: '📿', stat: 'all' },
            ring: { name: '戒指', icon: '💍', stat: 'attack' },
            leftHand: { name: '法宝', icon: '🔮', stat: 'special' }
        };

        // 绿武阶段配置
        const greenWeaponStages = {
            1: { name: '嫩芽', color: '#90EE90', maxGrowth: 100, attackBonus: 0, critBonus: 0, skill: null },
            2: { name: '幼苗', color: '#4CAF50', maxGrowth: 300, attackBonus: 0.2, critBonus: 0.05, skill: 'lifeSteal' },
            3: { name: '青藤', color: '#2E7D32', maxGrowth: 600, attackBonus: 0.4, critBonus: 0.10, skill: 'slow' },
            4: { name: '翠竹', color: '#1B5E20', maxGrowth: 1000, attackBonus: 0.6, critBonus: 0.15, skill: 'defense' },
            5: { name: '古木', color: '#0D3B0D', maxGrowth: 999999, attackBonus: 1.0, critBonus: 0.25, skill: 'ultimate' }
        };

        let enemies = [];
        let projectiles = [];
        let particles = [];
        let damageTexts = [];
        let floatingTexts = [];

        const enemyTypes = {
            spirit: { name: '妖灵', radius: 8, hp: 20, damage: 5, attackRange: 50, attackSpeed: 60, moveSpeed: 1.6, color: '#90EE90', score: 5, shape: 'circle', tier: 1, sizeType: 'S' },
            goblin: { name: '小妖', radius: 10, hp: 40, damage: 10, attackRange: 55, attackSpeed: 55, moveSpeed: 1.3, color: '#4a7c59', score: 15, shape: 'circle', tier: 2, sizeType: 'M' },
            demon: { name: '妖魔', radius: 12, hp: 70, damage: 18, attackRange: 65, attackSpeed: 45, moveSpeed: 1.1, color: '#8b0000', score: 35, shape: 'triangle', tier: 3, sizeType: 'M' },
            general: { name: '妖将', radius: 14, hp: 120, damage: 25, attackRange: 60, attackSpeed: 65, moveSpeed: 0.9, color: '#FF8C00', score: 60, shape: 'square', tier: 4, sizeType: 'L' },
            boss: { name: '妖王', radius: 18, hp: 200, damage: 35, attackRange: 70, attackSpeed: 70, moveSpeed: 0.75, color: '#4b0082', score: 100, shape: 'diamond', tier: 5, sizeType: 'L' },
            emperor: { name: '妖皇', radius: 20, hp: 350, damage: 50, attackRange: 75, attackSpeed: 80, moveSpeed: 0.6, color: '#FFD700', score: 200, shape: 'star', tier: 6, sizeType: 'L' },
            god: { name: '魔神', radius: 25, hp: 600, damage: 80, attackRange: 80, attackSpeed: 90, moveSpeed: 0.45, color: '#DC143C', score: 500, shape: 'hexstar', tier: 7, sizeType: 'L' }
        };

        const sizeModifiers = {
            'S': { scale: 0.8, dodge: 0.2, damageReduce: 0.1, rangeMod: 0.9 },
            'M': { scale: 1.0, dodge: 0, damageReduce: 0, rangeMod: 1.0 },
            'L': { scale: 1.3, hpMod: 0.3, damageTake: 0.1, rangeMod: 1.15 }
        };

        function getRandomSizeType(enemyType) {
            const rand = Math.random();
            switch(enemyType) {
                case 'spirit':
                    if (rand < 0.8) return 'S';
                    return 'M';
                case 'goblin':
                    if (rand < 0.6) return 'S';
                    if (rand < 0.95) return 'M';
                    return 'L';
                case 'demon':
                    if (rand < 0.2) return 'S';
                    if (rand < 0.8) return 'M';
                    return 'L';
                case 'general':
                    if (rand < 0.05) return 'S';
                    if (rand < 0.5) return 'M';
                    return 'L';
                case 'boss':
                    if (rand < 0.3) return 'M';
                    return 'L';
                case 'emperor':
                    if (rand < 0.15) return 'M';
                    return 'L';
                case 'god':
                    if (rand < 0.05) return 'M';
                    return 'L';
                default:
                    return 'M';
            }
        }

        function spawnEnemy(type) {
            const config = enemyTypes[type];
            const angle = Math.random() * Math.PI * 2;
            const distance = radarRadius - 35;
            const sizeType = getRandomSizeType(type);
            const sizeMod = sizeModifiers[sizeType];
            
            let finalHp = config.hp;
            let finalDamage = config.damage;
            let finalSpeed = config.moveSpeed;
            
            if (sizeType === 'S') {
                finalHp = Math.floor(config.hp * 0.8);
                finalDamage = Math.floor(config.damage * 0.9);
                finalSpeed = config.moveSpeed * 1.2;
            } else if (sizeType === 'L') {
                finalHp = Math.floor(config.hp * (1 + sizeMod.hpMod));
                finalDamage = Math.floor(config.damage * 1.1);
                finalSpeed = config.moveSpeed * 0.8;
            }
            
            const enemy = {
                x: centerX + Math.cos(angle) * distance,
                y: centerY + Math.sin(angle) * distance,
                type: type,
                ...config,
                sizeType: sizeType,
                hp: finalHp,
                maxHp: finalHp,
                damage: finalDamage,
                moveSpeed: finalSpeed,
                attackCooldown: 0,
                id: Math.random()
            };
            
            enemies.push(enemy);
            
            // 妖皇和魔神出现时的警示
            if (type === 'emperor' || type === 'god') {
                showBossWarning(config.name, config.color);
            }
        }
        
        function showBossWarning(bossName, bossColor) {
            // 创建全屏警示效果
            const warningDiv = document.createElement('div');
            warningDiv.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: radial-gradient(circle, transparent 30%, ${bossColor}40 70%);
                pointer-events: none;
                z-index: 9999;
                animation: bossWarning 3s ease-out forwards;
            `;
            
            const warningText = document.createElement('div');
            warningText.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 48px;
                font-weight: bold;
                color: ${bossColor};
                text-shadow: 0 0 30px ${bossColor}, 0 0 60px ${bossColor};
                z-index: 10000;
                text-align: center;
                animation: bossTextPulse 3s ease-out forwards;
            `;
            warningText.innerHTML = `⚠️ ${bossName}降临 ⚠️`;
            
            document.body.appendChild(warningDiv);
            document.body.appendChild(warningText);
            
            setTimeout(() => {
                warningDiv.remove();
                warningText.remove();
            }, 3000);
        }

        function getEnemyTypeByWave() {
            const rand = Math.random();
            if (wave <= 2) {
                if (rand < 0.7) return 'spirit';
                return 'goblin';
            } else if (wave <= 4) {
                if (rand < 0.3) return 'spirit';
                if (rand < 0.8) return 'goblin';
                return 'demon';
            } else if (wave <= 6) {
                if (rand < 0.1) return 'spirit';
                if (rand < 0.4) return 'goblin';
                if (rand < 0.8) return 'demon';
                return 'general';
            } else if (wave <= 8) {
                if (rand < 0.2) return 'goblin';
                if (rand < 0.55) return 'demon';
                if (rand < 0.85) return 'general';
                return 'boss';
            } else if (wave <= 10) {
                if (rand < 0.1) return 'goblin';
                if (rand < 0.35) return 'demon';
                if (rand < 0.7) return 'general';
                if (rand < 0.95) return 'boss';
                return 'emperor';
            } else if (wave <= 15) {
                if (rand < 0.05) return 'goblin';
                if (rand < 0.25) return 'demon';
                if (rand < 0.55) return 'general';
                if (rand < 0.85) return 'boss';
                if (rand < 0.99) return 'emperor';
                return 'god';
            } else if (wave <= 20) {
                if (rand < 0.15) return 'demon';
                if (rand < 0.4) return 'general';
                if (rand < 0.75) return 'boss';
                if (rand < 0.95) return 'emperor';
                return 'god';
            } else {
                if (rand < 0.1) return 'demon';
                if (rand < 0.3) return 'general';
                if (rand < 0.6) return 'boss';
                if (rand < 0.9) return 'emperor';
                return 'god';
            }
        }

        function getWaveEnemyCount() {
            if (wave <= 5) return 3 + wave;
            if (wave <= 10) return 5 + wave;
            if (wave <= 15) return 8 + wave;
            if (wave <= 20) return 10 + wave;
            return 15 + Math.floor(wave / 2);
        }

        function spawnWave() {
            const count = getWaveEnemyCount();
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    if (!gameRunning) return;
                    const type = getEnemyTypeByWave();
                    spawnEnemy(type);
                }, i * 600);
            }
        }

        function createSwordQi(from, to, damage) {
            const angle = Math.atan2(to.y - from.y, to.x - from.x);
            projectiles.push({
                x: from.x, y: from.y,
                vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8,
                isPlayer: true, damage: damage, life: 50, angle: angle, type: 'sword'
            });
        }

        function createDemonQi(from, to, damage) {
            const angle = Math.atan2(to.y - from.y, to.x - from.x);
            projectiles.push({
                x: from.x, y: from.y,
                vx: Math.cos(angle) * 5, vy: Math.sin(angle) * 5,
                isPlayer: false, damage: damage, life: 60, type: 'demon'
            });
        }

        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * (2 + Math.random() * 3),
                    vy: Math.sin(angle) * (2 + Math.random() * 3),
                    life: 25, color: color, size: 2 + Math.random() * 3,
                    type: Math.random() > 0.5 ? 'spark' : 'smoke'
                });
            }
        }

        function createDamageText(x, y, damage, isPlayer) {
            damageTexts.push({
                x: x, y: y, text: damage, life: 35,
                color: isPlayer ? '#ff6b6b' : '#ffd93d'
            });
        }

        function createFloatingText(x, y, text, color) {
            floatingTexts.push({ x: x, y: y, text: text, life: 40, color: color, vy: -0.8 });
        }

        function drawBackground() {
            ctx.fillStyle = 'rgba(13, 7, 5, 0.98)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(139, 69, 19, 0.3)';
            ctx.lineWidth = 2;
            for (let r = 60; r <= radarRadius; r += 60) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    ctx.fillStyle = 'rgba(139, 69, 19, 0.4)';
                    ctx.font = '12px serif';
                    ctx.fillText('◆', centerX + Math.cos(angle) * r - 4, centerY + Math.sin(angle) * r + 4);
                }
            }

            ctx.strokeStyle = 'rgba(139, 69, 19, 0.25)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + Math.cos(angle) * radarRadius, centerY + Math.sin(angle) * radarRadius);
                ctx.stroke();
            }

            const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            ctx.fillStyle = 'rgba(212, 175, 55, 0.5)';
            ctx.font = '12px SimSun';
            directions.forEach((dir, i) => {
                const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                const x = centerX + Math.cos(angle) * (radarRadius + 15);
                const y = centerY + Math.sin(angle) * (radarRadius + 15);
                ctx.fillText(dir, x - 6, y + 4);
            });

            ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radarRadius, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawAttackRange() {
            if (!playerAlive) return;
            const gradient = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.attackRange);
            gradient.addColorStop(0, 'rgba(255, 215, 0, 0.05)');
            gradient.addColorStop(1, 'rgba(255, 215, 0, 0.15)');
            ctx.fillStyle = gradient;
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.attackRange, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.15)';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.attackRange * 0.7, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawPlayer() {
            if (!playerAlive) return;
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
            ctx.stroke();

            ctx.fillStyle = '#ffd700';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ffd700';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#fff8dc';
            ctx.beginPath();
            ctx.arc(player.x, player.y, 7, 0, Math.PI * 2);
            ctx.fill();

            player.swordAngle += 0.08;
            for (let i = 0; i < 3; i++) {
                const angle = player.swordAngle + (i * Math.PI * 2 / 3);
                const sx = player.x + Math.cos(angle) * 20;
                const sy = player.y + Math.sin(angle) * 20;
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(sx - 6, sy);
                ctx.lineTo(sx + 6, sy);
                ctx.stroke();
            }

            const barWidth = 36, barHeight = 5;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth, barHeight);
            const hpPercent = player.hp / player.maxHp;
            ctx.fillStyle = hpPercent > 0.5 ? '#22c55e' : (hpPercent > 0.25 ? '#eab308' : '#dc2626');
            ctx.fillRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth * hpPercent, barHeight);
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 1;
            ctx.strokeRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth, barHeight);
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                const distToPlayer = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                const sizeMod = sizeModifiers[enemy.sizeType];
                const scale = sizeMod.scale;
                const scaledRadius = enemy.radius * scale;
                
                if (distToPlayer < enemy.attackRange + 50 && playerAlive) {
                    ctx.strokeStyle = 'rgba(139, 0, 0, 0.15)';
                    ctx.fillStyle = 'rgba(139, 0, 0, 0.03)';
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, enemy.attackRange, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }

                ctx.fillStyle = enemy.color;
                ctx.shadowBlur = 12;
                ctx.shadowColor = enemy.color;
                if (enemy.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, scaledRadius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (enemy.shape === 'triangle') {
                    ctx.beginPath();
                    ctx.moveTo(enemy.x, enemy.y - scaledRadius);
                    ctx.lineTo(enemy.x - scaledRadius, enemy.y + scaledRadius);
                    ctx.lineTo(enemy.x + scaledRadius, enemy.y + scaledRadius);
                    ctx.closePath();
                    ctx.fill();
                } else if (enemy.shape === 'square') {
                    ctx.fillRect(enemy.x - scaledRadius, enemy.y - scaledRadius, scaledRadius * 2, scaledRadius * 2);
                } else if (enemy.shape === 'diamond') {
                    ctx.beginPath();
                    ctx.moveTo(enemy.x, enemy.y - scaledRadius);
                    ctx.lineTo(enemy.x + scaledRadius, enemy.y);
                    ctx.lineTo(enemy.x, enemy.y + scaledRadius);
                    ctx.lineTo(enemy.x - scaledRadius, enemy.y);
                    ctx.closePath();
                    ctx.fill();
                } else if (enemy.shape === 'star') {
                    drawStar(ctx, enemy.x, enemy.y, 5, scaledRadius, scaledRadius * 0.5);
                } else if (enemy.shape === 'hexstar') {
                    drawStar(ctx, enemy.x, enemy.y, 6, scaledRadius, scaledRadius * 0.6);
                }
                ctx.shadowBlur = 0;

                ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, scaledRadius * 0.5, 0, Math.PI * 2);
                ctx.stroke();

                // 体型标识 S/M/L
                const sizeColors = { 'S': '#90EE90', 'M': '#FFD700', 'L': '#FF6347' };
                ctx.fillStyle = sizeColors[enemy.sizeType];
                ctx.font = 'bold 10px SimSun';
                ctx.fillText(enemy.sizeType, enemy.x - 4, enemy.y - scaledRadius - 18);

                // 血条
                const barWidth = 28, barHeight = 4;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(enemy.x - barWidth/2, enemy.y - scaledRadius - 12, barWidth, barHeight);
                const hpPercent = enemy.hp / enemy.maxHp;
                ctx.fillStyle = hpPercent > 0.5 ? '#22c55e' : (hpPercent > 0.25 ? '#eab308' : '#dc2626');
                ctx.fillRect(enemy.x - barWidth/2, enemy.y - scaledRadius - 12, barWidth * hpPercent, barHeight);
            });
        }

        // 绿武成长系统
        function addGreenWeaponGrowth(enemyTier) {
            const gw = player.greenWeapon;
            if (gw.stage >= 5) return; // 已满级
            
            // 根据怪物等级给予成长值
            const growthValue = enemyTier;
            gw.growth += growthValue;
            
            // 检查是否突破
            if (gw.growth >= gw.maxGrowth) {
                levelUpGreenWeapon();
            }
        }

        function levelUpGreenWeapon() {
            const gw = player.greenWeapon;
            if (gw.stage >= 5) return;
            
            gw.stage++;
            const stageConfig = greenWeaponStages[gw.stage];
            gw.stageName = stageConfig.name;
            gw.color = stageConfig.color;
            gw.maxGrowth = stageConfig.maxGrowth;
            gw.bonusAttack = stageConfig.attackBonus;
            gw.bonusCrit = stageConfig.critBonus;
            gw.skill = stageConfig.skill;
            gw.growth = 0;
            
            // 显示突破提示
            showGreenWeaponLevelUp(gw.stageName, gw.color);
        }

        function showGreenWeaponLevelUp(stageName, color) {
            const levelUpDiv = document.createElement('div');
            levelUpDiv.style.cssText = `
                position: fixed;
                top: 30%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 36px;
                font-weight: bold;
                color: ${color};
                text-shadow: 0 0 20px ${color}, 0 0 40px ${color};
                z-index: 10001;
                text-align: center;
                animation: levelUpPulse 2s ease-out forwards;
            `;
            levelUpDiv.innerHTML = `🌿 绿武突破 🌿<br><span style="font-size: 28px;">${stageName}</span>`;
            
            document.body.appendChild(levelUpDiv);
            
            setTimeout(() => {
                levelUpDiv.remove();
            }, 2000);
        }

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        function drawProjectiles() {
            projectiles.forEach(p => {
                if (p.type === 'sword') {
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ffd700';
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 3, p.y - p.vy * 3);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 6, p.y - p.vy * 6);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = '#8b0000';
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#8b0000';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 25;
                if (p.type === 'spark') {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = 'rgba(100, 100, 100, 0.5)';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            });
        }

        function drawDamageTexts() {
            damageTexts.forEach(d => {
                ctx.fillStyle = d.color;
                ctx.font = 'bold 14px SimSun';
                ctx.globalAlpha = d.life / 35;
                ctx.fillText('-' + d.text, d.x - 8, d.y);
                ctx.globalAlpha = 1;
            });
        }

        function drawFloatingTexts() {
            floatingTexts.forEach(f => {
                ctx.fillStyle = f.color;
                ctx.font = 'bold 16px SimSun';
                ctx.globalAlpha = f.life / 40;
                ctx.fillText(f.text, f.x - 20, f.y);
                ctx.globalAlpha = 1;
            });
        }

        function updatePlayer() {
            if (!playerAlive) return;
            if (player.isMoving) {
                const dx = player.targetX - player.x;
                const dy = player.targetY - player.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 3) {
                    player.x += (dx / dist) * player.moveSpeed;
                    player.y += (dy / dist) * player.moveSpeed;
                } else {
                    player.isMoving = false;
                }
                const centerDist = Math.hypot(player.x - centerX, player.y - centerY);
                if (centerDist > radarRadius - player.radius) {
                    const angle = Math.atan2(player.y - centerY, player.x - centerX);
                    player.x = centerX + Math.cos(angle) * (radarRadius - player.radius);
                    player.y = centerY + Math.sin(angle) * (radarRadius - player.radius);
                }
            }
        }

        function playerAutoAttack() {
            if (!playerAlive) return;
            player.attackTimer++;
            if (player.attackTimer >= player.attackInterval) {
                player.attackTimer = 0;
                let targetsInRange = [];
                enemies.forEach(enemy => {
                    const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (dist <= player.attackRange) targetsInRange.push(enemy);
                });
                targetsInRange.forEach((target, index) => {
                    setTimeout(() => {
                        if (playerAlive && enemies.includes(target)) createSwordQi(player, target, player.attackDamage);
                    }, index * 80);
                });
            }
        }

        function updateEnemies() {
            enemies.forEach(enemy => {
                if (playerAlive) {
                    const distToPlayer = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (distToPlayer > enemy.attackRange - 10) {
                        const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                        enemy.x += Math.cos(angle) * enemy.moveSpeed;
                        enemy.y += Math.sin(angle) * enemy.moveSpeed;
                    }
                    if (distToPlayer <= enemy.attackRange && enemy.attackCooldown <= 0) {
                        createDemonQi(enemy, player, enemy.damage);
                        enemy.attackCooldown = enemy.attackSpeed;
                    }
                }
                if (enemy.attackCooldown > 0) enemy.attackCooldown--;
            });
        }

        function updateProjectiles() {
            projectiles = projectiles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.isPlayer) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        const dist = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                        if (dist < enemy.radius + 6) {
                            enemy.hp -= p.damage;
                            createDamageText(enemy.x, enemy.y - 20, p.damage, true);
                            createParticles(p.x, p.y, '#ffd700', 6);
                            if (enemy.hp <= 0) {
                                createParticles(enemy.x, enemy.y, enemy.color, 18);
                                createFloatingText(enemy.x, enemy.y - 30, '斩!', '#ffd700');
                                score += enemy.score;
                                kills++;
                                enemies.splice(i, 1);
                                // 增加绿武成长值
                                addGreenWeaponGrowth(enemy.tier);
                                // 掉落装备
                                if (Math.random() < 0.3) {
                                    const drop = generateRandomEquip();
                                    addToBag(drop);
                                    createFloatingText(enemy.x, enemy.y - 50, `掉落${itemQualities[drop.quality].name}${equipTypes[drop.type].name}`, itemQualities[drop.quality].color);
                                }
                                updateUI();
                            }
                            return false;
                        }
                    }
                } else {
                    if (playerAlive) {
                        const dist = Math.hypot(p.x - player.x, p.y - player.y);
                        if (dist < player.radius + 6) {
                            player.hp -= p.damage;
                            createDamageText(player.x, player.y - 28, p.damage, false);
                            createParticles(p.x, p.y, '#8b0000', 6);
                            updateUI();
                            if (player.hp <= 0) playerDied();
                            return false;
                        }
                    }
                }
                return p.life > 0;
            });
        }

        function playerDied() {
            playerAlive = false;
            reviveTimer = 5;
            createParticles(player.x, player.y, '#ffd700', 35);
            createFloatingText(player.x, player.y - 40, '道消身殒', '#dc143c');
            document.getElementById('reviveOverlay').style.display = 'block';
            document.getElementById('reviveCountdown').textContent = reviveTimer;
            const countdownInterval = setInterval(() => {
                reviveTimer--;
                document.getElementById('reviveCountdown').textContent = reviveTimer;
                if (reviveTimer <= 0) {
                    clearInterval(countdownInterval);
                    revivePlayer();
                }
            }, 1000);
        }

        function revivePlayer() {
            playerAlive = true;
            player.hp = player.maxHp;
            player.x = centerX;
            player.y = centerY;
            player.targetX = centerX;
            player.targetY = centerY;
            player.isMoving = false;
            document.getElementById('reviveOverlay').style.display = 'none';
            updateUI();
            createParticles(player.x, player.y, '#ffd700', 25);
            createFloatingText(player.x, player.y - 30, '重塑肉身', '#22c55e');
            // 复活后重新刷新怪物
            enemies = [];
            projectiles = [];
            spawnWave();
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.94;
                p.vy *= 0.94;
                p.life--;
                return p.life > 0;
            });
        }

        function updateDamageTexts() {
            damageTexts = damageTexts.filter(d => {
                d.y -= 0.6;
                d.life--;
                return d.life > 0;
            });
        }

        function updateFloatingTexts() {
            floatingTexts = floatingTexts.filter(f => {
                f.y += f.vy;
                f.life--;
                return f.life > 0;
            });
        }

        function updateUI() {
            document.getElementById('playerHp').textContent = Math.max(0, Math.floor(player.hp));
            document.getElementById('kills').textContent = kills;
            document.getElementById('wave').textContent = wave;
            document.getElementById('score').textContent = score;
        }

        canvas.addEventListener('click', (e) => {
            if (!playerAlive) return;
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            const dist = Math.hypot(clickX - centerX, clickY - centerY);
            if (dist <= radarRadius) {
                player.targetX = clickX;
                player.targetY = clickY;
                player.isMoving = true;
            }
        });

        // 装备栏交互
        const equipBtn = document.getElementById('equipBtn');
        const equipPanel = document.getElementById('equipPanel');
        const closeEquip = document.getElementById('closeEquip');

        equipBtn.addEventListener('click', () => {
            equipPanel.style.display = 'block';
            updateEquipPanel();
        });

        closeEquip.addEventListener('click', () => {
            equipPanel.style.display = 'none';
        });

        // 点击装备栏外部关闭
        equipPanel.addEventListener('click', (e) => {
            if (e.target === equipPanel) {
                equipPanel.style.display = 'none';
            }
        });

        // 更新装备栏显示
        function updateEquipPanel() {
            const gw = player.greenWeapon;
            document.getElementById('gwStage').textContent = gw.stageName;
            document.getElementById('gwStage').style.color = gw.color;
            document.getElementById('gwGrowth').textContent = gw.growth;
            document.getElementById('gwMaxGrowth').textContent = gw.maxGrowth;
            document.getElementById('gwBar').style.width = (gw.growth / gw.maxGrowth * 100) + '%';
            document.getElementById('gwAtk').textContent = '+' + Math.floor(gw.bonusAttack * 100) + '%';
            document.getElementById('gwCrit').textContent = '+' + Math.floor(gw.bonusCrit * 100) + '%';
            
            const skillNames = {
                null: '无',
                'lifeSteal': '回春剑气(吸血5%)',
                'slow': '缠绕斩(减速20%)',
                'defense': '坚韧之刃(防御+30%)',
                'ultimate': '万木归宗(范围+50%,伤害+50%)'
            };
            document.getElementById('gwSkill').textContent = skillNames[gw.skill] || '无';
            
            // 更新武器槽边框颜色

            weaponSlot.style.boxShadow = '0 0 10px ' + gw.color;

        // 定期更新装备栏（如果打开状态）
        setInterval(() => {
            if (equipPanel.style.display === 'block') {
                updateEquipPanel();
            }
        }, 500);

        // 背包系统交互
        const bagBtn = document.getElementById('bagBtn');
        const bagPanel = document.getElementById('bagPanel');
        const closeBag = document.getElementById('closeBag');
        const sortBag = document.getElementById('sortBag');
        const bagGrid = document.getElementById('bagGrid');

        // 初始化背包格子
        function initBagGrid() {
            bagGrid.innerHTML = '';
            for (let i = 0; i < bag.maxSize; i++) {
                const slot = document.createElement('div');
                slot.className = 'bag-slot';
                slot.style.cssText = 'width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #555;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;position:relative;';
                slot.dataset.index = i;
                slot.addEventListener('click', () => useBagItem(i));
                bagGrid.appendChild(slot);
            }
            updateBagDisplay();
        }

        // 更新背包显示
        function updateBagDisplay() {
            const slots = bagGrid.querySelectorAll('.bag-slot');
            slots.forEach((slot, i) => {
                const item = bag.items[i];
                if (item) {
                    const equipType = equipTypes[item.type];
                    const quality = itemQualities[item.quality];
                    slot.innerHTML = equipType.icon;
                    slot.style.borderColor = quality.color;
                    slot.style.boxShadow = '0 0 5px ' + quality.color;
                    slot.title = `${quality.name}${equipType.name}`;
                } else {
                    slot.innerHTML = '';
                    slot.style.borderColor = '#555';
                    slot.style.boxShadow = 'none';
                    slot.title = '空';
                }
            });
            document.getElementById('bagCount').textContent = `${bag.items.length}/${bag.maxSize}`;
        }

        // 使用背包物品
        function useBagItem(index) {
            const item = bag.items[index];
            if (!item) return;

            // 装备物品
            const currentEquip = player.equipped[item.type];
            if (currentEquip) {
                // 卸下当前装备，放回背包
                bag.items.push(currentEquip);
            }
            player.equipped[item.type] = item;
            bag.items.splice(index, 1);

            createFloatingText(player.x, player.y - 40, `装备${itemQualities[item.quality].name}${equipTypes[item.type].name}`, itemQualities[item.quality].color);
            updateBagDisplay();
            updateEquipSlots();
        }

        // 更新装备栏显示
        function updateEquipSlots() {
            const slots = document.querySelectorAll('.equip-slot');
            slots.forEach(slot => {
                const type = slot.dataset.slot;
                const item = player.equipped[type];
                if (item) {
                    const quality = itemQualities[item.quality];
                    slot.style.borderColor = quality.color;
                    slot.style.boxShadow = '0 0 8px ' + quality.color;
                } else {
                    if (type === 'weapon') {
                        slot.style.borderColor = player.greenWeapon.color;
                        slot.style.boxShadow = '0 0 10px ' + player.greenWeapon.color;
                    } else {
                        slot.style.borderColor = '#666';
                        slot.style.boxShadow = 'none';
                    }
                }
            });
        }

        // 自动整理背包
        function sortBagItems() {
            bag.items.sort((a, b) => {
                const qualityOrder = ['mythic', 'legendary', 'epic', 'rare', 'uncommon', 'common'];
                const typeOrder = ['helmet', 'armor', 'shoes', 'necklace', 'ring', 'leftHand'];
                const qualityDiff = qualityOrder.indexOf(a.quality) - qualityOrder.indexOf(b.quality);
                if (qualityDiff !== 0) return qualityDiff;
                return typeOrder.indexOf(a.type) - typeOrder.indexOf(b.type);
            });
            updateBagDisplay();
            createFloatingText(centerX, centerY - 50, '背包已整理', '#4CAF50');
        }

        // 生成随机装备（测试用）
        function generateRandomEquip() {
            const types = ['helmet', 'armor', 'shoes', 'necklace', 'ring', 'leftHand'];
            const qualities = ['common', 'uncommon', 'rare', 'epic', 'legendary', 'mythic'];
            const qualityWeights = [0.4, 0.3, 0.15, 0.1, 0.04, 0.01];

            const type = types[Math.floor(Math.random() * types.length)];
            let rand = Math.random();
            let quality = 'common';
            for (let i = 0; i < qualities.length; i++) {
                rand -= qualityWeights[i];
                if (rand <= 0) {
                    quality = qualities[i];
                    break;
                }
            }

            return { type, quality };
        }

        // 添加物品到背包
        function addToBag(item) {
            if (bag.items.length >= bag.maxSize) {
                createFloatingText(player.x, player.y - 40, '背包已满!', '#ff0000');
                return false;
            }
            bag.items.push(item);
            updateBagDisplay();
            return true;
        }

        bagBtn.addEventListener('click', () => {
            bagPanel.style.display = 'block';
            initBagGrid();
        });

        closeBag.addEventListener('click', () => {
            bagPanel.style.display = 'none';
        });

        bagPanel.addEventListener('click', (e) => {
            if (e.target === bagPanel) {
                bagPanel.style.display = 'none';
            }
        });

        sortBag.addEventListener('click', sortBagItems);

        // 点击装备槽卸下装备
        document.querySelectorAll('.equip-slot').forEach(slot => {
            slot.addEventListener('click', () => {
                const type = slot.dataset.slot;
                if (type === 'weapon') return; // 绿武不能卸下

                const item = player.equipped[type];
                if (item) {
                    if (addToBag(item)) {
                        player.equipped[type] = null;
                        updateEquipSlots();
                        createFloatingText(player.x, player.y - 40, `卸下${equipTypes[type].name}`, '#888');
                    }
                }
            });
        });

        function gameLoop() {
            frameCount++;
            updatePlayer();
            playerAutoAttack();
            updateEnemies();
            updateProjectiles();
            updateParticles();
            updateDamageTexts();
            updateFloatingTexts();
            if (playerAlive && enemies.length === 0 && frameCount % 60 === 0) {
                wave++;
                updateUI();
                spawnWave();
            }
            drawBackground();
            drawAttackRange();
            drawEnemies();
            drawPlayer();
            drawProjectiles();
            drawParticles();
            drawDamageTexts();
            drawFloatingTexts();
            requestAnimationFrame(gameLoop);
        }

        updateUI();
        spawnWave();
        gameLoop();
    </script>
</body>
</html>
