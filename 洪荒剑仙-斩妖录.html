<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洪荒剑仙 - 斩妖录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @keyframes bossWarning {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        @keyframes bossTextPulse {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.5);
            }
            20% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.2);
            }
            40% { 
                transform: translate(-50%, -50%) scale(1);
            }
            80% { 
                opacity: 1; 
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        @keyframes levelUpPulse {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.3);
            }
            30% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.1);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1);
            }
            80% { 
                opacity: 1; 
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.9);
            }
        }
        
        body {
            background: linear-gradient(135deg, #1a0f0a 0%, #2d1810 50%, #1a0f0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'SimSun', '宋体', serif;
            overflow: hidden;
            user-select: none;
        }
        
        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 32px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.8);
            margin-bottom: 8px;
            letter-spacing: 6px;
        }
        
        .subtitle {
            color: #8b7355;
            font-size: 14px;
            letter-spacing: 3px;
        }
        
        .stats {
            display: flex;
            gap: 25px;
            font-size: 14px;
            color: #d4af37;
            margin-top: 10px;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .canvas-wrapper {
            position: relative;
            border: 3px solid #8b4513;
            border-radius: 50%;
            box-shadow: 
                0 0 40px rgba(139, 69, 19, 0.4),
                inset 0 0 60px rgba(0, 0, 0, 0.5),
                0 0 0 2px #d4af37,
                0 0 0 4px #8b4513;
            background: radial-gradient(circle at center, #1a0f0a 0%, #0d0705 100%);
            margin-top: 15px;
        }
        
        canvas {
            border-radius: 50%;
            cursor: crosshair;
            display: block;
        }
        
        .controls {
            color: #8b7355;
            margin-top: 20px;
            font-size: 13px;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .revive-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }
        
        .revive-text {
            font-size: 40px;
            color: #dc143c;
            text-shadow: 0 0 30px #dc143c;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 10px;
        }
        
        .revive-countdown {
            font-size: 60px;
            color: #ffd700;
            text-shadow: 0 0 40px #ffd700;
            font-family: 'Courier New', monospace;
        }
        
        .revive-subtext {
            color: #8b7355;
            font-size: 16px;
            margin-top: 15px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>洪荒剑仙</h1>
            <div class="subtitle">上古战场 · 斩妖除魔</div>
            <div class="stats">
                <div class="stat-item">
                    <span>剑客 Lv.<span id="playerLevel">1</span></span>
                </div>
                <div class="stat-item">
                    <span>气血: <span id="playerHp">100</span>/<span id="playerMaxHp">100</span></span>
                </div>
                <div class="stat-item">
                    <span>斩妖: <span id="kills">0</span></span>
                </div>
                <div class="stat-item">
                    <span>波次: <span id="wave">1</span></span>
                </div>
                <div class="stat-item">
                    <span>修为: <span id="score">0</span></span>
                </div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="500" height="500"></canvas>
            <div class="revive-overlay" id="reviveOverlay">
                <div class="revive-text">道消身殒</div>
                <div class="revive-countdown" id="reviveCountdown">5</div>
                <div class="revive-subtext">元神重塑中...</div>
            </div>
        </div>
        
        <div class="controls">
            点击地面御剑飞行 | 剑气自动斩妖 | 死亡后5秒重塑肉身 | <button id="equipBtn" style="background:#8b4513;color:#ffd700;border:1px solid #d4af37;padding:2px 8px;cursor:pointer;font-family:inherit;">装备栏</button> | <button id="bagBtn" style="background:#4a7c59;color:#ffd700;border:1px solid #d4af37;padding:2px 8px;cursor:pointer;font-family:inherit;">背包</button>
        </div>
        
        <!-- 装备栏界面 -->
        <div id="equipPanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:3px solid #8b4513;border-radius:15px;padding:20px;z-index:10000;box-shadow:0 0 30px rgba(139,69,19,0.5);width:520px;">
            <div style="text-align:center;color:#ffd700;font-size:20px;margin-bottom:15px;">装备栏</div>
            <div style="display:flex;gap:20px;">
                <!-- 左侧：人物和装备 -->
                <div style="position:relative;width:200px;height:280px;background:rgba(139,69,19,0.2);border-radius:10px;border:2px solid #8b4513;">
                    <!-- 头盔 -->
                    <div class="equip-slot" data-slot="helmet" style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;" title="头盔">🪖</div>
                    <!-- 左手法宝 -->
                    <div class="equip-slot" data-slot="leftHand" style="position:absolute;top:80px;left:10px;width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;" title="法宝">📿</div>
                    <!-- 人物 -->
                    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;">👤</div>
                    <!-- 右手武器 -->
                    <div class="equip-slot" data-slot="weapon" id="weaponSlot" style="position:absolute;top:80px;right:10px;width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #90EE90;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 10px #90EE90;" title="武器">🗡️</div>
                    <!-- 衣服 -->
                    <div class="equip-slot" data-slot="armor" style="position:absolute;top:150px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;" title="衣服">👘</div>
                    <!-- 鞋子 -->
                    <div class="equip-slot" data-slot="shoes" style="position:absolute;top:220px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;" title="鞋子">👢</div>
                    <!-- 项链 -->
                    <div class="equip-slot" data-slot="necklace" style="position:absolute;top:150px;left:10px;width:40px;height:40px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;" title="项链">📿</div>
                    <!-- 戒指 -->
                    <div class="equip-slot" data-slot="ring" style="position:absolute;top:150px;right:10px;width:40px;height:40px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;" title="戒指">💍</div>
                </div>
                <!-- 右侧：武器详细信息 -->
                <div id="weaponInfoPanel" style="width:280px;color:#d4af37;font-size:12px;max-height:280px;overflow-y:auto;">
                    <div id="weaponInfoContent" style="color:#888;">未装备武器</div>
                </div>
            </div>
            <button id="closeEquip" style="position:absolute;top:10px;right:10px;background:#8b4513;color:#ffd700;border:1px solid #d4af37;padding:5px 10px;cursor:pointer;font-family:inherit;border-radius:5px;">✕</button>
        </div>
        
        <!-- 背包界面 -->
        <div id="bagPanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:3px solid #8b4513;border-radius:15px;padding:20px;z-index:10000;box-shadow:0 0 30px rgba(139,69,19,0.5);width:400px;">
            <div style="text-align:center;color:#ffd700;font-size:20px;margin-bottom:15px;">背包</div>
            <div id="bagGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:15px;">
                <!-- 背包格子由JS生成 -->
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span id="bagCount" style="color:#888;font-size:12px;">0/20</span>
                <button id="sortBag" style="background:#4a7c59;color:#fff;border:none;padding:5px 15px;cursor:pointer;font-family:inherit;border-radius:5px;font-size:12px;">自动整理</button>
            </div>
            <button id="closeBag" style="position:absolute;top:10px;right:10px;background:#8b4513;color:#ffd700;border:1px solid #d4af37;padding:5px 10px;cursor:pointer;font-family:inherit;border-radius:5px;">✕</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radarRadius = 230;

        let gameRunning = true;
        let playerAlive = true;
        let reviveTimer = 0;
        let wave = 1;
        let kills = 0;
        let score = 0;
        let frameCount = 0;

        // ========== 职业系统 ==========
        
        // 职业配置
        const classes = {
            jianke: {
                name: '剑客',
                nameEn: 'Swordsman',
                bodyType: 'M', // 中体型
                growth: {
                    strength: 3.2,
                    constitution: 2.0,
                    agility: 1.8,
                    spirit: 1.0
                },
                passives: [
                    { name: '剑术精通', desc: '穿刀/剑类武器，基础物攻+8%', effect: 'swordMastery' },
                    { name: '稳击', desc: '普攻不会伤害浮动下限', effect: 'stableStrike' },
                    { name: '身法格挡', desc: '受近战伤害减免3%', effect: 'evasiveBlock' }
                ],
                weapons: ['ruyidao', 'qiankun'],
                weaponTypes: ['blade', 'sword'],
                tags: ['均衡爆发', '连击成长']
            }
        };

        // 属性效果配置
        const attributeEffects = {
            strength: {
                name: '力量',
                physicalAtk: 1.2,
                skillDamage: 0.008,
                meleeHit: 0.001
            },
            constitution: {
                name: '体质',
                maxHp: 25,
                physicalDef: 0.7,
                damageReduce: 0.0015
            },
            agility: {
                name: '敏捷',
                attackSpeed: 0.003,
                moveSpeed: 0.002,
                dodge: 0.0025,
                crit: 0.0018
            },
            spirit: {
                name: '灵力',
                maxMp: 20,
                elementalAtk: 1.1,
                elementalDef: 0.6,
                cdReduce: 0.001
            }
        };

        const player = {
            x: centerX,
            y: centerY,
            radius: 14,
            hp: 100,
            maxHp: 100,
            attackRange: 90,
            attackDamage: 30,
            attackInterval: 6,
            attackTimer: 0,
            moveSpeed: 3,
            targetX: centerX,
            targetY: centerY,
            isMoving: false,
            color: '#ffd700',
            swordAngle: 0,
            // 职业系统
            classId: 'jianke',
            playerLevel: 1,
            playerExp: 0,
            expToNext: 100,
            // 基础属性
            attributes: {
                strength: 10,
                constitution: 10,
                agility: 10,
                spirit: 10
            },
            // 计算后的战斗属性
            computedStats: {
                physicalAtk: 0,
                maxHp: 100,
                maxMp: 50,
                physicalDef: 0,
                elementalAtk: 0,
                elementalDef: 0,
                attackSpeed: 1.0,
                moveSpeed: 3,
                dodge: 0,
                crit: 0,
                critDamage: 1.5,
                damageReduce: 0
            },
            // 当前装备的绿武实例（null表示未装备）
            equippedWeapon: null,
            // 已装备防具
            equipped: {
                helmet: null,
                armor: null,
                shoes: null,
                necklace: null,
                ring: null,
                leftHand: null
            }
        };

        // ========== 绿武系统数据 ==========

        // 深绿武器模板
        const greenWeapons = {
            ruyidao: { name: '如意刀', class: '剑客', minAtk: 38, maxAtk: 48, element: null, growth: 1.08, totalGrowth: 97.2, reqLevel: 9, maxLevel: 99 },
            qiankun: { name: '乾坤剑', class: '剑客', minAtk: 32, maxAtk: 42, element: '火攻', growth: 0.72, totalGrowth: 64.8, reqLevel: 9, maxLevel: 99 },
            emeici: { name: '峨眉刺', class: '游侠', minAtk: 30, maxAtk: 40, element: null, growth: 0.95, totalGrowth: 85.5, reqLevel: 9, maxLevel: 99 },
            yuanyang: { name: '鸳鸯双环', class: '游侠', minAtk: 29, maxAtk: 39, element: '毒攻', growth: 0.92, totalGrowth: 82.8, reqLevel: 9, maxLevel: 99 },
            zhenhun: { name: '镇魂锤', class: '力士', minAtk: 45, maxAtk: 55, element: null, growth: 1.57, totalGrowth: 141.3, reqLevel: 9, maxLevel: 99 },
            lieshan: { name: '裂山斧', class: '力士', minAtk: 43, maxAtk: 53, element: '冰攻', growth: 1.52, totalGrowth: 136.8, reqLevel: 9, maxLevel: 99 },
            hanying: { name: '寒影长枪', class: '武尊', minAtk: 35, maxAtk: 45, element: null, growth: 1.02, totalGrowth: 91.8, reqLevel: 9, maxLevel: 99 },
            zhenyue: { name: '镇岳战旗', class: '武尊', minAtk: 33, maxAtk: 43, element: '火攻', growth: 0.88, totalGrowth: 79.2, reqLevel: 9, maxLevel: 99 },
            biyu: { name: '碧玉短杖', class: '散仙', minAtk: 18, maxAtk: 26, element: '冰攻', growth: 0.55, totalGrowth: 49.5, reqLevel: 9, maxLevel: 99 },
            tianpu: { name: '天瀑长杖', class: '散仙', minAtk: 16, maxAtk: 24, element: '火攻', growth: 0.50, totalGrowth: 45.0, reqLevel: 9, maxLevel: 99 }
        };

        // 浅绿武器模板
        const lightGreenWeapons = {
            lgsword: { name: '青锋剑', class: '通用', minAtk: 15, maxAtk: 20, growth: 0.4, reqLevel: 20, maxLevel: 45 },
            lgsaber: { name: '碧水刀', class: '通用', minAtk: 15, maxAtk: 20, growth: 0.4, reqLevel: 20, maxLevel: 45 }
        };

        // 进阶阶段配置
        const weaponStages = {
            0: { name: '深绿', color: '#2E8B57', bonusPercent: 0, atkRangeBonus: 0 },
            1: { name: '新绿', color: '#32CD32', bonusPercent: 5, atkRangeBonus: 3 },
            2: { name: '精工', color: '#7B68EE', bonusPercent: 12, atkRangeBonus: 6 },
            3: { name: '至尊', color: '#FFD700', bonusPercent: 20, atkRangeBonus: 10 },
            4: { name: '神武', color: '#FF4500', bonusPercent: 35, atkRangeBonus: 15 }
        };

        // 进阶条件
        const stageRequirements = {
            1: { reqLevel: 30, successRate: 0.85 },
            2: { reqLevel: 50, successRate: 0.45 },
            3: { reqLevel: 70, successRate: 0.20 },
            4: { reqLevel: 90, successRate: 0.10 }
        };

        // 词条品质配置
        const inscriptionQualities = {
            common: { name: '普通', color: '#FFFFFF' },
            fine: { name: '优秀', color: '#4169E1' },
            excellent: { name: '精良', color: '#9370DB' },
            perfect: { name: '极品', color: '#FFD700' }
        };

        // 词条类型定义 - 格式: {name, category, maxValue, scorePerUnit, unit}
        // 数值上限2倍版本
        const inscriptionTypes = {
            // 输出类
            pierceDef: { name: '锋利破防', category: '输出', maxValue: 90, scorePerUnit: 100/90, unit: '' },
            largeDmg: { name: '大体型增伤', category: '输出', maxValue: 30, scorePerUnit: 100/30, unit: '%' },
            mediumDmg: { name: '中体型增伤', category: '输出', maxValue: 30, scorePerUnit: 100/30, unit: '%' },
            smallDmg: { name: '小体型增伤', category: '输出', maxValue: 30, scorePerUnit: 100/30, unit: '%' },
            critChance: { name: '暴击几率', category: '输出', maxValue: 16, scorePerUnit: 100/16, unit: '%' },
            critDmg: { name: '暴击伤害', category: '输出', maxValue: 80, scorePerUnit: 100/80, unit: '%' },
            atkSpeed: { name: '攻击速度', category: '输出', maxValue: 22, scorePerUnit: 100/22, unit: '%' },
            atkRange: { name: '攻击范围', category: '输出', maxValue: 50, scorePerUnit: 100/50, unit: '%' },
            fireDmg: { name: '附加火伤', category: '输出', maxValue: 136, scorePerUnit: 100/136, unit: '' },
            iceDmg: { name: '附加冰伤', category: '输出', maxValue: 124, scorePerUnit: 100/124, unit: '' },
            poisonDmg: { name: '附加毒伤', category: '输出', maxValue: 116, scorePerUnit: 100/116, unit: '' },
            // 续航类
            hpSteal: { name: '生命汲取', category: '续航', maxValue: 16, scorePerUnit: 100/16, unit: '%' },
            mpSteal: { name: '精气汲取', category: '续航', maxValue: 15, scorePerUnit: 100/15, unit: '%' },
            staSteal: { name: '体力汲取', category: '续航', maxValue: 18, scorePerUnit: 100/18, unit: '%' },
            dmgReduce: { name: '伤害减免', category: '续航', maxValue: 20, scorePerUnit: 100/20, unit: '%' },
            hpBonus: { name: '生命上限', category: '续航', maxValue: 700, scorePerUnit: 100/700, unit: '' },
            // 养成类
            expBonus: { name: '人物经验加成', category: '养成', maxValue: 20, scorePerUnit: 100/20, unit: '%' },
            weaponExpBonus: { name: '武具经验加成', category: '养成', maxValue: 26, scorePerUnit: 100/26, unit: '%' },
            duraReduce: { name: '耐久消耗降低', category: '养成', maxValue: 56, scorePerUnit: 100/56, unit: '%' }
        };

        // 攻击范围全局上限
        const ATK_RANGE_MAX = 0.25; // 25%

        // 词条最大叠加次数（每种类型）
        const INSCRIPTION_MAX_STACK = 10;

        // 武器最大词条数量（总词条槽数）
        const WEAPON_MAX_INSCRIPTIONS = 10;

        // ========== 测试用常量 ==========
        const WEAPON_EXP_MULTIPLIER = 100; // 武器经验倍率（测试用，100倍）

        // 品质波动系数（更集中在中间值）
        const qualityFluctuation = {
            common: { min: 0.75, max: 0.95 },  // 普通：范围0.2，更集中
            fine: { min: 0.88, max: 1.08 },    // 优秀：范围0.2
            excellent: { min: 1.0, max: 1.2 }, // 精良：范围0.2
            perfect: { min: 1.15, max: 1.35 }  // 极品：范围0.2
        };

        // 连击计数器
        let comboCount = 0;
        let comboTimer = 0;

        // ========== 职业系统函数 ==========

        // 计算角色属性
        function calculatePlayerStats() {
            const cls = classes[player.classId];
            const attr = player.attributes;
            const effects = attributeEffects;
            
            // 基础值 + 属性加成
            let physicalAtk = 30 + attr.strength * effects.strength.physicalAtk;
            
            // 绿武攻击加成
            if (player.equippedWeapon) {
                const weapon = player.equippedWeapon;
                const template = greenWeapons[weapon.weaponId];
                if (template) {
                    // 计算武器攻击力（基础+成长+爆攻）
                    const levelDiff = weapon.level - template.reqLevel;
                    const baseMinAtk = template.minAtk + template.growth * levelDiff;
                    const baseMaxAtk = template.maxAtk + template.growth * levelDiff;
                    const finalMinAtk = baseMinAtk + weapon.totalBurstAtk;
                    const finalMaxAtk = baseMaxAtk + weapon.totalBurstAtk;
                    const avgAtk = (finalMinAtk + finalMaxAtk) / 2;
                    
                    // 进阶加成
                    const stageBonus = weaponStages[weapon.stage].bonusPercent / 100;
                    const finalAtk = avgAtk * (1 + stageBonus);
                    
                    physicalAtk += finalAtk;
                }
            }
            
            player.computedStats = {
                physicalAtk: physicalAtk,
                maxHp: 100 + attr.constitution * effects.constitution.maxHp,
                maxMp: 50 + attr.spirit * effects.spirit.maxMp,
                physicalDef: attr.constitution * effects.constitution.physicalDef,
                elementalAtk: attr.spirit * effects.spirit.elementalAtk,
                elementalDef: attr.spirit * effects.spirit.elementalDef,
                attackSpeed: 1.0 + attr.agility * effects.agility.attackSpeed,
                moveSpeed: 3 + attr.agility * effects.agility.moveSpeed * 10,
                dodge: attr.agility * effects.agility.dodge,
                crit: attr.agility * effects.agility.crit,
                critDamage: 1.5,
                damageReduce: attr.constitution * effects.constitution.damageReduce
            };
            
            // 剑客被动：剑术精通（物攻+8%）
            if (player.classId === 'jianke' && player.equippedWeapon) {
                const weapon = player.equippedWeapon;
                if (weapon && greenWeapons[weapon.weaponId]) {
                    const template = greenWeapons[weapon.weaponId];
                    if (template.name.includes('刀') || template.name.includes('剑')) {
                        player.computedStats.physicalAtk *= 1.08;
                    }
                }
            }
            
            // 同步到 player 的攻击属性
            player.attackDamage = Math.floor(player.computedStats.physicalAtk);
            player.maxHp = Math.floor(player.computedStats.maxHp);
            player.moveSpeed = player.computedStats.moveSpeed;
            
            // 计算攻击范围（词条+进阶）
            updatePlayerAttackRange();
        }
        
        // 计算攻击范围
        function updatePlayerAttackRange() {
            let baseRange = 90; // 基础攻击范围
            let rangeBonus = 0;
            
            // 词条加成
            if (player.equippedWeapon) {
                const weapon = player.equippedWeapon;
                weapon.inscriptions.forEach(ins => {
                    if (ins.type === 'atkRange') {
                        rangeBonus += ins.value / 100;
                    }
                });
                
                // 进阶加成
                const stageBonus = weaponStages[weapon.stage].atkRangeBonus / 100;
                rangeBonus += stageBonus;
            }
            
            // 限制上限25%
            if (rangeBonus > ATK_RANGE_MAX) {
                rangeBonus = ATK_RANGE_MAX;
            }
            
            player.attackRange = baseRange * (1 + rangeBonus);
            player.computedStats.atkRangeBonus = rangeBonus;
        }

        // 角色升级
        function levelUpPlayer() {
            player.playerLevel++;
            
            // 根据职业成长加点
            const cls = classes[player.classId];
            player.attributes.strength += cls.growth.strength;
            player.attributes.constitution += cls.growth.constitution;
            player.attributes.agility += cls.growth.agility;
            player.attributes.spirit += cls.growth.spirit;
            
            // 重新计算属性
            calculatePlayerStats();
            
            // 回满血
            player.hp = player.maxHp;
            
            // 显示升级提示
            showPlayerLevelUp();
        }

        function showPlayerLevelUp() {
            const levelUpDiv = document.createElement('div');
            levelUpDiv.style.cssText = `
                position: fixed;
                top: 40%;

            `;
            levelUpDiv.innerHTML = `⚔️ 升级 Lv.${player.playerLevel} ⚔️<br><span style="font-size:16px;color:#fff;">${classes[player.classId].name}</span>`;
            document.body.appendChild(levelUpDiv);
            setTimeout(() => levelUpDiv.remove(), 2000);
        }

        // 角色获取经验
        function addPlayerExp(baseExp) {
            player.playerExp += baseExp;
            while (player.playerExp >= player.expToNext) {
                player.playerExp -= player.expToNext;
                player.expToNext = Math.floor(player.expToNext * 1.2);
                levelUpPlayer();
            }
            updateUI();
        }

        // ========== 绿武系统函数 ==========

        // 创建深绿武器实例
        function createGreenWeaponInstance(weaponId) {
            const template = greenWeapons[weaponId];
            if (!template) return null;
            return {
                weaponId: weaponId,
                name: template.name,
                level: template.reqLevel,
                exp: 0,
                expToNext: getWeaponExpNeeded(template.reqLevel),
                totalBurstAtk: 0,
                durability: 24,
                maxDurability: 24,
                bound: false,
                stage: 0,
                inscriptions: [],
                totalScore: 0,
                scoreRating: getScoreRating(0),
                type: 'greenWeapon',
                quality: 'green'
            };
        }

        // 创建浅绿武器实例
        function createLightGreenWeaponInstance(weaponId) {
            const template = lightGreenWeapons[weaponId];
            if (!template) return null;
            return {
                weaponId: weaponId,
                name: template.name,
                level: template.reqLevel,
                exp: 0,
                expToNext: getWeaponExpNeeded(template.reqLevel),
                totalBurstAtk: 0,
                durability: 20,
                maxDurability: 20,
                bound: false,
                stage: 0,
                inscriptions: [],
                totalScore: 0,
                scoreRating: getScoreRating(0),
                type: 'lightGreenWeapon',
                quality: 'lightGreen'
            };
        }

        // 获取武器升级所需经验
        function getWeaponExpNeeded(level) {
            if (level < 30) return 80 + level * 5;       // 9-30级：低经验
            if (level < 60) return 200 + (level - 30) * 12; // 31-60级：中经验
            if (level < 90) return 560 + (level - 60) * 20; // 61-90级：高经验
            return 1160 + (level - 90) * 35;              // 91-99级：超高经验
        }

        // 计算武器当前攻击力
        function calcWeaponAtk(weapon) {
            if (!weapon) return { minAtk: 0, maxAtk: 0, finalMinAtk: 0, finalMaxAtk: 0 };
            let isDeepGreen = weapon.type === 'greenWeapon';
            let template = isDeepGreen ? greenWeapons[weapon.weaponId] : lightGreenWeapons[weapon.weaponId];
            if (!template) return { minAtk: 0, maxAtk: 0, finalMinAtk: 0, finalMaxAtk: 0 };

            let levelDiff = weapon.level - template.reqLevel;
            let currentMinAtk = template.minAtk + levelDiff * template.growth;
            let currentMaxAtk = template.maxAtk + levelDiff * template.growth;

            // 进阶加成（仅深绿）
            let stageBonus = 0;
            if (isDeepGreen && weapon.stage > 0) {
                stageBonus = weaponStages[weapon.stage].bonusPercent / 100;
            }

            // 绑定固定伤害加成
            let boundBonus = weapon.bound ? 15 : 0;

            let finalMinAtk = currentMinAtk * (1 + stageBonus) + boundBonus;
            let finalMaxAtk = currentMaxAtk * (1 + stageBonus) + boundBonus;

            // 爆攻加成
            finalMinAtk += weapon.totalBurstAtk;
            finalMaxAtk += weapon.totalBurstAtk;

            return {
                minAtk: Math.floor(currentMinAtk),
                maxAtk: Math.floor(currentMaxAtk),
                finalMinAtk: Math.floor(finalMinAtk),
                finalMaxAtk: Math.floor(finalMaxAtk)
            };
        }

        // 获取武器最大耐久
        function getWeaponMaxDurability(level) {
            return Math.min(24 + Math.floor((level - 9) * 0.3), 48);
        }

        // 武器获取经验
        function addWeaponExp(weapon, baseExp) {
            if (!weapon) return;
            let isDeepGreen = weapon.type === 'greenWeapon';
            let template = isDeepGreen ? greenWeapons[weapon.weaponId] : lightGreenWeapons[weapon.weaponId];
            if (!template) return;
            if (weapon.level >= template.maxLevel) return;

            // 连击加成
            let comboMultiplier = 1.0;
            if (comboCount >= 100) comboMultiplier = 1.3;
            else if (comboCount >= 50) comboMultiplier = 1.15;

            // 绑定经验加成
            let expMultiplier = comboMultiplier * (weapon.bound ? 1.08 : 1.0);

            // 武具经验加成词条
            let weaponExpBonus = 0;
            weapon.inscriptions.forEach(ins => {
                if (ins.type === 'weaponExpBonus') weaponExpBonus += ins.value;
            });
            expMultiplier *= (1 + weaponExpBonus / 100);

            // 测试用经验倍率
            expMultiplier *= WEAPON_EXP_MULTIPLIER;

            let finalExp = Math.floor(baseExp * expMultiplier);
            
            // 检查是否解锁新词条（每3级一次）
            const prevLevel = weapon.level;
            weapon.exp += finalExp;
            
            // 计算新等级
            let newLevel = prevLevel;
            while (weapon.exp >= weapon.expToNext && newLevel < template.maxLevel) {
                weapon.exp -= weapon.expToNext;
                newLevel++;
            }
            
            if (newLevel > prevLevel) {
                // 每3级获得一次词条
                for (let lvl = prevLevel + 1; lvl <= newLevel; lvl++) {
                    if (lvl >= 12 && (lvl - 12) % 3 === 0) {
                        unlockInscription(weapon);
                    }
                    
                    // 爆攻判定（深绿武器）
                    if (isDeepGreen) {
                        let burstChance = 0.20;
                        if (comboCount >= 100) burstChance += 0.05;
                        else if (comboCount >= 50) burstChance += 0.03;

                        let rand = Math.random();
                        if (rand < 0.01) {
                            weapon.totalBurstAtk += 3;
                            showWeaponBurstAtk(3);
                        } else if (rand < 0.05) {
                            weapon.totalBurstAtk += 2;
                            showWeaponBurstAtk(2);
                        } else if (rand < 0.25) {
                            weapon.totalBurstAtk += 1;
                            showWeaponBurstAtk(1);
                        }
                        // 累计爆攻上限60
                        weapon.totalBurstAtk = Math.min(weapon.totalBurstAtk, 60);
                    }
                }
                
                weapon.level = newLevel;
                weapon.expToNext = getWeaponExpNeeded(weapon.level);
                weapon.maxDurability = getWeaponMaxDurability(weapon.level);
                
                showWeaponLevelUp(weapon.name, weapon.level);
                
                // 重新计算角色属性（武器升级影响攻击力）
                calculatePlayerStats();
            }

            // 更新装备栏显示
            if (equipPanel.style.display === 'block') updateEquipPanel();
        }

        // 体型增伤词条类型
        const sizeDamageTypes = ['largeDmg', 'mediumDmg', 'smallDmg'];
        
        // 生成随机词条
        function generateInscription(weapon) {
            const types = Object.keys(inscriptionTypes);
            const qualities = ['common', 'fine', 'excellent', 'perfect'];
            const qualityWeights = [0.55, 0.30, 0.12, 0.03];
            
            let selectedType;
            
            // 检查是否已有10个词条
            if (weapon.inscriptions.length >= WEAPON_MAX_INSCRIPTIONS) {
                // 满10条后，从已有词条中随机选择一个类型进行叠加
                const randomIndex = Math.floor(Math.random() * weapon.inscriptions.length);
                selectedType = weapon.inscriptions[randomIndex].type;
            } else {
                // 未满10条，随机选择词条类型（排除已满10层的类型）
                let availableTypes = types.filter(type => {
                    const count = weapon.inscriptions.filter(i => i.type === type).length;
                    return count < INSCRIPTION_MAX_STACK;
                });
                
                // 检查已拥有的体型增伤词条数量
                const existingSizeDmgCount = weapon.inscriptions.filter(i => 
                    sizeDamageTypes.includes(i.type)
                ).length;
                
                // 如果已有2种体型增伤，排除剩余的体型增伤类型
                if (existingSizeDmgCount >= 2) {
                    availableTypes = availableTypes.filter(type => !sizeDamageTypes.includes(type));
                }
                
                // 如果没有可用类型（理论上不会发生，因为总词条数<10时必有空位），从已有类型中选择
                if (availableTypes.length === 0) {
                    const randomIndex = Math.floor(Math.random() * weapon.inscriptions.length);
                    selectedType = weapon.inscriptions[randomIndex].type;
                } else {
                    selectedType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
                }
            }
            
            const typeConfig = inscriptionTypes[selectedType];
            
            // 随机品质
            let rand = Math.random();
            let quality = 'common';
            for (let i = 0; i < qualities.length; i++) {
                rand -= qualityWeights[i];
                if (rand <= 0) {
                    quality = qualities[i];
                    break;
                }
            }
            
            // 计算波动值
            const fluctuation = qualityFluctuation[quality];
            const baseValue = typeConfig.maxValue / INSCRIPTION_MAX_STACK;
            const minValue = baseValue * fluctuation.min;
            const maxValue = baseValue * fluctuation.max;
            const actualValue = minValue + Math.random() * (maxValue - minValue);
            
            // 计算分数
            const score = actualValue * typeConfig.scorePerUnit;
            
            return {
                type: selectedType,
                quality: quality,
                value: actualValue,
                score: Math.floor(score)
            };
        }

        // 词条解锁函数
        function unlockInscription(weapon) {
            const newInscription = generateInscription(weapon);
            
            // 检查是否已有同类型词条
            const existingIndex = weapon.inscriptions.findIndex(i => i.type === newInscription.type);
            
            if (existingIndex >= 0) {
                // 合并叠加
                const existing = weapon.inscriptions[existingIndex];
                existing.value += newInscription.value;
                existing.score += newInscription.score;
                
                // 检查是否达到上限
                const typeConfig = inscriptionTypes[newInscription.type];
                if (existing.value > typeConfig.maxValue) {
                    existing.value = typeConfig.maxValue;
                    existing.score = 100; // 满分
                }
                
                showInscriptionMerge(weapon.name, typeConfig.name, existing.value, existing.score);
            } else if (weapon.inscriptions.length < WEAPON_MAX_INSCRIPTIONS) {
                // 新词条（未满10条时）
                weapon.inscriptions.push(newInscription);
                showInscriptionUnlock(weapon.name, inscriptionTypes[newInscription.type].name, newInscription.quality);
            } else {
                // 已满10条，但生成了新类型（理论上不会发生），强制叠加到第一个词条
                const existing = weapon.inscriptions[0];
                existing.value += newInscription.value;
                existing.score += newInscription.score;
                const typeConfig = inscriptionTypes[existing.type];
                if (existing.value > typeConfig.maxValue) {
                    existing.value = typeConfig.maxValue;
                    existing.score = 100;
                }
                showInscriptionMerge(weapon.name, typeConfig.name, existing.value, existing.score);
            }
            
            // 更新武器评分
            updateWeaponScore(weapon);
        }

        // 武器评分系统
        function updateWeaponScore(weapon) {
            let totalScore = 0;
            
            // 词条分数累计
            weapon.inscriptions.forEach(ins => {
                totalScore += ins.score || 0;
            });
            
            weapon.totalScore = totalScore;
            weapon.scoreRating = getScoreRating(totalScore);
        }

        function getScoreRating(score) {
            if (score >= 1500) return { name: '神话', color: '#FF0000', title: '圣物' };
            if (score >= 1200) return { name: '史诗', color: '#FFD700', title: '神器' };
            if (score >= 900) return { name: '传说', color: '#FF8C00', title: '仙兵' };
            if (score >= 600) return { name: '精良', color: '#9370DB', title: '灵器' };
            if (score >= 300) return { name: '优秀', color: '#4169E1', title: '精钢' };
            return { name: '普通', color: '#FFFFFF', title: '凡铁' };
        }

        // 武器进阶
        function attemptWeaponStageUp(weapon) {
            if (!weapon || weapon.type !== 'greenWeapon') return false;
            if (weapon.stage >= 4) return false;
            let nextStage = weapon.stage + 1;
            let req = stageRequirements[nextStage];
            if (!req) return false;
            if (weapon.level < req.reqLevel) return false;

            let success = Math.random() < req.successRate;
            if (success) {
                weapon.stage = nextStage;
                updatePlayerAttackRange(); // 更新攻击范围
                showWeaponStageUp(weapon.name, weaponStages[nextStage].name, weaponStages[nextStage].color);
            } else {
                showWeaponStageFail(weapon.name);
            }
            return success;
        }

        // 武器认主绑定
        function bindWeapon(weapon) {
            if (!weapon || weapon.bound) return false;
            weapon.bound = true;
            showWeaponBind(weapon.name);
            return true;
        }

        // 绿武重生（全部重置为全新绿武）
        function rebirthWeapon(weapon) {
            if (!weapon || weapon.type !== 'greenWeapon') return false;
            
            const template = greenWeapons[weapon.weaponId];
            if (!template) return false;
            
            // 保存武器模板ID
            const weaponId = weapon.weaponId;
            
            // 全部重置
            weapon.level = template.reqLevel;
            weapon.exp = 0;
            weapon.totalBurstAtk = 0;
            weapon.durability = 24;
            weapon.maxDurability = 24;
            weapon.bound = false;
            weapon.stage = 0;
            weapon.inscriptions = [];
            weapon.totalScore = 0;
            weapon.scoreRating = { name: '普通', color: '#FFFFFF', title: '凡铁' };
            weapon.attackCount = 0;
            
            showWeaponRebirth(template.name);
            updateWeaponScore(weapon);
            updatePlayerAttackRange();
            
            return true;
        }

            rebirthDiv.style.cssText = `

                z-index: 10001;

            `;

            document.body.appendChild(rebirthDiv);

        }

        // 消耗耐久
        function consumeWeaponDurability(weapon) {
            if (!weapon) return;
            // 每攻击100000次掉1点耐久
            if (!weapon.attackCount) weapon.attackCount = 0;
            weapon.attackCount++;
            
            // 耐久消耗降低词条
            let duraReduce = 0;
            weapon.inscriptions.forEach(ins => {
                if (ins.type === 'duraReduce') duraReduce += ins.value;
            });
            
            // 计算实际需要的攻击次数（考虑词条减免）
            let attacksPerDura = 100000;
            if (duraReduce > 0) {
                attacksPerDura = Math.floor(100000 * (1 + duraReduce / 100));
            }
            
            // 达到次数才扣耐久
            if (weapon.attackCount >= attacksPerDura) {
                weapon.attackCount = 0;
                weapon.durability--;
                if (weapon.durability < 0) weapon.durability = 0;
            }
        }

        // 修复武器耐久
        function repairWeapon(weapon) {
            if (!weapon) return;
            weapon.durability = weapon.maxDurability;
        }

        // 获取武器经验（击杀怪物时调用）
        function onEnemyKilled(enemy) {
            // 连击
            comboCount++;
            comboTimer = 120; // 2秒内没有击杀则连击重置

            // 给当前装备武器加经验
            if (player.equippedWeapon) {
                let baseExp = enemy.tier * 3 + 2;
                addWeaponExp(player.equippedWeapon, baseExp);
            }

            // 消耗耐久
            if (player.equippedWeapon) {
                consumeWeaponDurability(player.equippedWeapon);
            }

            // 角色获取经验
            let playerBaseExp = enemy.tier * 5 + 10;
            // 连击加成
            if (comboCount >= 100) {
                playerBaseExp *= 1.3;
            } else if (comboCount >= 50) {
                playerBaseExp *= 1.15;
            }
            addPlayerExp(Math.floor(playerBaseExp));
        }

        function drawBackground() {
            ctx.fillStyle = 'rgba(13, 7, 5, 0.98)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(139, 69, 19, 0.3)';
            ctx.lineWidth = 2;
            for (let r = 60; r <= radarRadius; r += 60) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    ctx.fillStyle = 'rgba(139, 69, 19, 0.4)';
                    ctx.font = '12px serif';
                    ctx.fillText('◆', centerX + Math.cos(angle) * r - 4, centerY + Math.sin(angle) * r + 4);
                }
            }

            ctx.strokeStyle = 'rgba(139, 69, 19, 0.25)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + Math.cos(angle) * radarRadius, centerY + Math.sin(angle) * radarRadius);
                ctx.stroke();
            }

            const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            ctx.fillStyle = 'rgba(212, 175, 55, 0.5)';
            ctx.font = '12px SimSun';
            directions.forEach((dir, i) => {
                const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                const x = centerX + Math.cos(angle) * (radarRadius + 15);
                const y = centerY + Math.sin(angle) * (radarRadius + 15);
                ctx.fillText(dir, x - 6, y + 4);
            });

            ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radarRadius, 0, Math.PI * 2);
            ctx.stroke();
        }

            ctx.fillStyle = '#ffd700';

            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#fff8dc';
            ctx.beginPath();
            ctx.arc(player.x, player.y, 7, 0, Math.PI * 2);
            ctx.fill();

            player.swordAngle += 0.08;
            for (let i = 0; i < 3; i++) {
                const angle = player.swordAngle + (i * Math.PI * 2 / 3);
                const sx = player.x + Math.cos(angle) * 20;
                const sy = player.y + Math.sin(angle) * 20;
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(sx - 6, sy);
                ctx.lineTo(sx + 6, sy);
                ctx.stroke();
            }

            const barWidth = 36, barHeight = 5;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth, barHeight);
            const hpPercent = player.hp / player.maxHp;
            ctx.fillStyle = hpPercent > 0.5 ? '#22c55e' : (hpPercent > 0.25 ? '#eab308' : '#dc2626');
            ctx.fillRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth * hpPercent, barHeight);
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 1;
            ctx.strokeRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth, barHeight);
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                const distToPlayer = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                const sizeMod = sizeModifiers[enemy.sizeType];
                const scale = sizeMod.scale;
                const scaledRadius = enemy.radius * scale;
                
                if (distToPlayer < enemy.attackRange + 50 && playerAlive) {
                    ctx.strokeStyle = 'rgba(139, 0, 0, 0.15)';
                    ctx.fillStyle = 'rgba(139, 0, 0, 0.03)';
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, enemy.attackRange, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }

                ctx.fillStyle = enemy.color;
                ctx.shadowBlur = 12;
                ctx.shadowColor = enemy.color;
                if (enemy.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, scaledRadius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (enemy.shape === 'triangle') {
                    ctx.beginPath();
                    ctx.moveTo(enemy.x, enemy.y - scaledRadius);
                    ctx.lineTo(enemy.x - scaledRadius, enemy.y + scaledRadius);
                    ctx.lineTo(enemy.x + scaledRadius, enemy.y + scaledRadius);
                    ctx.closePath();
                    ctx.fill();
                } else if (enemy.shape === 'square') {
                    ctx.fillRect(enemy.x - scaledRadius, enemy.y - scaledRadius, scaledRadius * 2, scaledRadius * 2);
                } else if (enemy.shape === 'diamond') {
                    ctx.beginPath();
                    ctx.moveTo(enemy.x, enemy.y - scaledRadius);
                    ctx.lineTo(enemy.x + scaledRadius, enemy.y);
                    ctx.lineTo(enemy.x, enemy.y + scaledRadius);
                    ctx.lineTo(enemy.x - scaledRadius, enemy.y);
                    ctx.closePath();
                    ctx.fill();
                } else if (enemy.shape === 'star') {
                    drawStar(ctx, enemy.x, enemy.y, 5, scaledRadius, scaledRadius * 0.5);
                } else if (enemy.shape === 'hexstar') {
                    drawStar(ctx, enemy.x, enemy.y, 6, scaledRadius, scaledRadius * 0.6);
                }
                ctx.shadowBlur = 0;

                ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, scaledRadius * 0.5, 0, Math.PI * 2);
                ctx.stroke();

                // 体型标识 S/M/L
                const sizeColors = { 'S': '#90EE90', 'M': '#FFD700', 'L': '#FF6347' };
                ctx.fillStyle = sizeColors[enemy.sizeType];
                ctx.font = 'bold 10px SimSun';
                ctx.fillText(enemy.sizeType, enemy.x - 4, enemy.y - scaledRadius - 18);

                // 血条
                const barWidth = 28, barHeight = 4;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(enemy.x - barWidth/2, enemy.y - scaledRadius - 12, barWidth, barHeight);
                const hpPercent = enemy.hp / enemy.maxHp;
                ctx.fillStyle = hpPercent > 0.5 ? '#22c55e' : (hpPercent > 0.25 ? '#eab308' : '#dc2626');
                ctx.fillRect(enemy.x - barWidth/2, enemy.y - scaledRadius - 12, barWidth * hpPercent, barHeight);
            });
        }

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        function updatePlayer() {
            if (!playerAlive) return;
            if (player.isMoving) {
                const dx = player.targetX - player.x;
                const dy = player.targetY - player.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 3) {
                    player.x += (dx / dist) * player.moveSpeed;
                    player.y += (dy / dist) * player.moveSpeed;
                } else {
                    player.isMoving = false;
                }
                const centerDist = Math.hypot(player.x - centerX, player.y - centerY);
                if (centerDist > radarRadius - player.radius) {
                    const angle = Math.atan2(player.y - centerY, player.x - centerX);
                    player.x = centerX + Math.cos(angle) * (radarRadius - player.radius);
                    player.y = centerY + Math.sin(angle) * (radarRadius - player.radius);
                }
            }
        }

        function playerAutoAttack() {
            if (!playerAlive) return;
            player.attackTimer++;
            if (player.attackTimer >= player.attackInterval) {
                player.attackTimer = 0;
                let targetsInRange = [];
                enemies.forEach(enemy => {
                    const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (dist <= player.attackRange) targetsInRange.push(enemy);
                });
                targetsInRange.forEach((target, index) => {
                    setTimeout(() => {
                        if (playerAlive && enemies.includes(target)) createSwordQi(player, target, player.attackDamage);
                    }, index * 80);
                });
            }
        }

        function updateEnemies() {
            enemies.forEach(enemy => {
                if (playerAlive) {
                    const distToPlayer = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (distToPlayer > enemy.attackRange - 10) {
                        const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                        enemy.x += Math.cos(angle) * enemy.moveSpeed;
                        enemy.y += Math.sin(angle) * enemy.moveSpeed;
                    }
                    if (distToPlayer <= enemy.attackRange && enemy.attackCooldown <= 0) {
                        createDemonQi(enemy, player, enemy.damage);
                        enemy.attackCooldown = enemy.attackSpeed;
                    }
                }
                if (enemy.attackCooldown > 0) enemy.attackCooldown--;
            });
        }

        function updateProjectiles() {
            projectiles = projectiles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.isPlayer) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        const dist = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                        if (dist < enemy.radius + 6) {
                            enemy.hp -= p.damage;
                            createDamageText(enemy.x, enemy.y - 20, p.damage, true);
                            createParticles(p.x, p.y, '#ffd700', 6);
                            if (enemy.hp <= 0) {
                                createParticles(enemy.x, enemy.y, enemy.color, 18);
                                createFloatingText(enemy.x, enemy.y - 30, '斩!', '#ffd700');
                                score += enemy.score;
                                kills++;
                                enemies.splice(i, 1);
                                // 绿武系统：击杀处理（经验、耐久消耗）
                                onEnemyKilled(enemy);
                                // 掉落装备
                                if (Math.random() < 0.3) {
                                    const drop = generateRandomEquip();
                                    addToBag(drop);
                                    createFloatingText(enemy.x, enemy.y - 50, `掉落${itemQualities[drop.quality].name}${equipTypes[drop.type].name}`, itemQualities[drop.quality].color);
                                }
                                updateUI();
                            }
                            return false;
                        }
                    }
                } else {
                    if (playerAlive) {
                        const dist = Math.hypot(p.x - player.x, p.y - player.y);
                        if (dist < player.radius + 6) {
                            player.hp -= p.damage;
                            createDamageText(player.x, player.y - 28, p.damage, false);
                            createParticles(p.x, p.y, '#8b0000', 6);
                            updateUI();
                            if (player.hp <= 0) playerDied();
                            return false;
                        }
                    }
                }
                return p.life > 0;
            });
        }

        function playerDied() {
            playerAlive = false;
            reviveTimer = 5;
            createParticles(player.x, player.y, '#ffd700', 35);
            createFloatingText(player.x, player.y - 40, '道消身殒', '#dc143c');
            document.getElementById('reviveOverlay').style.display = 'block';
            document.getElementById('reviveCountdown').textContent = reviveTimer;
            const countdownInterval = setInterval(() => {
                reviveTimer--;
                document.getElementById('reviveCountdown').textContent = reviveTimer;
                if (reviveTimer <= 0) {
                    clearInterval(countdownInterval);
                    revivePlayer();
                }
            }, 1000);
        }

        function revivePlayer() {
            playerAlive = true;
            player.hp = player.maxHp;
            player.x = centerX;
            player.y = centerY;
            player.targetX = centerX;
            player.targetY = centerY;
            player.isMoving = false;
            document.getElementById('reviveOverlay').style.display = 'none';
            updateUI();
            createParticles(player.x, player.y, '#ffd700', 25);
            createFloatingText(player.x, player.y - 30, '重塑肉身', '#22c55e');
            // 复活后重新刷新怪物
            enemies = [];
            projectiles = [];
            spawnWave();
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.94;
                p.vy *= 0.94;
                p.life--;
                return p.life > 0;
            });
        }

        function updateDamageTexts() {
            damageTexts = damageTexts.filter(d => {
                d.y -= 0.6;
                d.life--;
                return d.life > 0;
            });
        }

        function updateFloatingTexts() {
            floatingTexts = floatingTexts.filter(f => {
                f.y += f.vy;
                f.life--;
                return f.life > 0;
            });
        }

        function updateUI() {
            document.getElementById('playerLevel').textContent = player.playerLevel;
            document.getElementById('playerHp').textContent = Math.max(0, Math.floor(player.hp));
            document.getElementById('playerMaxHp').textContent = player.maxHp;
            document.getElementById('kills').textContent = kills;
            document.getElementById('wave').textContent = wave;
            document.getElementById('score').textContent = score;
        }

        canvas.addEventListener('click', (e) => {
            if (!playerAlive) return;
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            const dist = Math.hypot(clickX - centerX, clickY - centerY);
            if (dist <= radarRadius) {
                player.targetX = clickX;
                player.targetY = clickY;
                player.isMoving = true;
            }
        });

        // 装备栏交互
        const equipBtn = document.getElementById('equipBtn');
        const equipPanel = document.getElementById('equipPanel');
        const closeEquip = document.getElementById('closeEquip');

        equipBtn.addEventListener('click', () => {
            equipPanel.style.display = 'block';
            updateEquipPanel();
        });

        closeEquip.addEventListener('click', () => {
            equipPanel.style.display = 'none';
        });

        // 点击装备栏外部关闭
        equipPanel.addEventListener('click', (e) => {
            if (e.target === equipPanel) {
                equipPanel.style.display = 'none';
            }
        });

        // 更新装备栏显示
        function updateEquipPanel() {
            const weapon = player.equippedWeapon;
            const content = document.getElementById('weaponInfoContent');
            const weaponSlot = document.getElementById('weaponSlot');

            if (!weapon) {
                content.innerHTML = '<div style="color:#888;">未装备武器</div>';
                weaponSlot.style.borderColor = '#666';
                weaponSlot.style.boxShadow = 'none';
                weaponSlot.innerHTML = '🗡️';
                return;
            }

            // 更新武器槽外观
            let stageColor = '#2E8B57';
            if (weapon.type === 'greenWeapon' && weapon.stage > 0) {
                stageColor = weaponStages[weapon.stage].color;
            } else if (weapon.type === 'lightGreenWeapon') {
                stageColor = '#90EE90';
            }
            weaponSlot.style.borderColor = stageColor;
            weaponSlot.style.boxShadow = '0 0 10px ' + stageColor;
            weaponSlot.innerHTML = '🗡️';

            // 计算攻击力
            let atkInfo = calcWeaponAtk(weapon);
            let isDeepGreen = weapon.type === 'greenWeapon';
            let template = isDeepGreen ? greenWeapons[weapon.weaponId] : lightGreenWeapons[weapon.weaponId];

            let html = '';
            // 武器名称
            html += `<div style="font-size:16px;color:${stageColor};margin-bottom:8px;font-weight:bold;">${weapon.name}</div>`;

            // 等级和经验
            html += `<div style="margin-bottom:5px;">等级: <span style="color:#fff;">${weapon.level}</span>/${template ? template.maxLevel : '?'}</div>`;
            let expPercent = weapon.expToNext > 0 ? (weapon.exp / weapon.expToNext * 100) : 0;
            html += `<div style="margin-bottom:5px;">经验: ${weapon.exp}/${weapon.expToNext}</div>`;
            html += `<div style="width:100%;height:8px;background:#333;border-radius:4px;margin:5px 0 10px 0;overflow:hidden;">
                <div style="width:${expPercent}%;height:100%;background:linear-gradient(90deg,#90EE90,#4CAF50);transition:width 0.3s;"></div>
            </div>`;

            // 攻击力
            html += `<div style="margin-bottom:3px;">基础攻击: <span style="color:#FF6347;">${atkInfo.minAtk}~${atkInfo.maxAtk}</span></div>`;
            html += `<div style="margin-bottom:3px;">最终攻击: <span style="color:#FF4500;font-weight:bold;">${atkInfo.finalMinAtk}~${atkInfo.finalMaxAtk}</span></div>`;

            // 爆攻（仅深绿）
            if (isDeepGreen) {
                html += `<div style="margin-bottom:3px;">爆攻: <span style="color:#FF8C00;">+${weapon.totalBurstAtk}</span>/60</div>`;
            }

            // 耐久
            let duraColor = weapon.durability > weapon.maxDurability * 0.3 ? '#22c55e' : '#dc2626';
            html += `<div style="margin-bottom:3px;">耐久: <span style="color:${duraColor};">${weapon.durability}</span>/${weapon.maxDurability}</div>`;

            // 进阶（仅深绿）
            if (isDeepGreen) {
                let stageName = weaponStages[weapon.stage].name;
                let nextReq = stageRequirements[weapon.stage + 1];
                html += `<div style="margin-bottom:3px;">进阶: <span style="color:${stageColor};">${stageName}</span>`;
                if (nextReq && weapon.level < nextReq.reqLevel) {
                    html += ` <span style="color:#888;font-size:11px;">(需${nextReq.reqLevel}级)</span>`;
                } else if (nextReq) {
                    html += ` <span style="color:#FFD700;font-size:11px;">(可进阶 ${Math.floor(nextReq.successRate*100)}%)</span>`;
                }
                html += `</div>`;
            }

            // 绑定状态
            html += `<div style="margin-bottom:3px;">绑定: <span style="color:${weapon.bound ? '#FFD700' : '#888'};">${weapon.bound ? '已认主' : '未绑定'}</span></div>`;

            // 元素属性
            if (template && template.element) {
                let elemColor = template.element === '火攻' ? '#FF4500' : (template.element === '冰攻' ? '#00BFFF' : '#32CD32');
                html += `<div style="margin-bottom:3px;">元素: <span style="color:${elemColor};">${template.element}</span></div>`;
            }

            // 武器评分
            if (isDeepGreen) {
                let rating = weapon.scoreRating || getScoreRating(weapon.totalScore || 0);
                html += `<div style="margin-top:8px;border-top:1px solid #333;padding-top:5px;">
                    <div style="color:#d4af37;">武器评分: <span style="color:${rating.color};font-weight:bold;">${weapon.totalScore || 0}</span> <span style="color:${rating.color};">[${rating.name}]</span></div>
                    <div style="color:#888;font-size:11px;">称号: ${rating.title}</div>
                </div>`;
            }

            // 词条（仅深绿）
            if (isDeepGreen && weapon.inscriptions && weapon.inscriptions.length > 0) {
                html += `<div style="margin-top:8px;border-top:1px solid #333;padding-top:5px;color:#d4af37;">词条 (${weapon.inscriptions.length}种):</div>`;
                weapon.inscriptions.forEach((ins, idx) => {
                    let typeDef = inscriptionTypes[ins.type];
                    let qualityDef = inscriptionQualities[ins.quality];
                    html += `<div style="color:${qualityDef.color};font-size:11px;margin-left:8px;">[${qualityDef.name}] ${typeDef.name} +${ins.value.toFixed(1)}${typeDef.unit} [${ins.score}分]</div>`;
                });
            } else if (isDeepGreen) {
                html += `<div style="margin-top:8px;border-top:1px solid #333;padding-top:5px;color:#555;">词条: 12级开始解锁，每3级获得一次</div>`;
            }

            // 操作按钮
            html += `<div style="margin-top:10px;display:flex;gap:8px;">`;
            if (isDeepGreen && !weapon.bound) {
                html += `<button onclick="bindWeapon(player.equippedWeapon);updateEquipPanel();" style="background:#8b4513;color:#FFD700;border:1px solid #d4af37;padding:3px 10px;cursor:pointer;font-family:inherit;border-radius:3px;font-size:11px;">认主绑定</button>`;
            }
            if (isDeepGreen) {
                html += `<button onclick="if(confirm('确认重生？等级、词条、爆攻、进阶将全部重置！')){rebirthWeapon(player.equippedWeapon);updateEquipPanel();}" style="background:#8B0000;color:#00FFAA;border:1px solid #00FFAA;padding:3px 10px;cursor:pointer;font-family:inherit;border-radius:3px;font-size:11px;">🔄重生</button>`;
            }
            if (isDeepGreen && stageRequirements[weapon.stage + 1] && weapon.level >= stageRequirements[weapon.stage + 1].reqLevel) {
                html += `<button onclick="attemptWeaponStageUp(player.equippedWeapon);updateEquipPanel();" style="background:#4a7c59;color:#fff;border:none;padding:3px 10px;cursor:pointer;font-family:inherit;border-radius:3px;font-size:11px;">尝试进阶</button>`;
            }
            // 卸下武器
            html += `<button onclick="unequipWeapon();" style="background:#555;color:#fff;border:none;padding:3px 10px;cursor:pointer;font-family:inherit;border-radius:3px;font-size:11px;">卸下</button>`;
            html += `</div>`;

            content.innerHTML = html;
        }

        // 卸下武器
        function unequipWeapon() {
            if (!player.equippedWeapon) return;
            if (addToBag(player.equippedWeapon)) {
                player.equippedWeapon = null;
                updateEquipPanel();
                updateEquipSlots();
                createFloatingText(player.x, player.y - 40, '卸下武器', '#888');
            }
        }

        // 定期更新装备栏（如果打开状态）
        setInterval(() => {
            if (equipPanel.style.display === 'block') {
                updateEquipPanel();
            }
        }, 500);

        // ========== 后台运行支持 ==========
        let isPageVisible = true;
        let backgroundInterval = null;
        const BACKUP_FPS = 10; // 后台运行帧率
        const BACKUP_INTERVAL = 1000 / BACKUP_FPS;

        // 页面可见性变化处理
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面隐藏：切换到 setInterval 模式
                isPageVisible = false;
                if (!backgroundInterval) {
                    backgroundInterval = setInterval(gameLoopBackup, BACKUP_INTERVAL);
                }
            } else {
                // 页面显示：切回 requestAnimationFrame 模式
                isPageVisible = true;
                if (backgroundInterval) {
                    clearInterval(backgroundInterval);
                    backgroundInterval = null;
                }
                // 重新启动 RAF 循环
                requestAnimationFrame(gameLoop);
            }
        });

        // 背包系统交互
        const bagBtn = document.getElementById('bagBtn');
        const bagPanel = document.getElementById('bagPanel');
        const closeBag = document.getElementById('closeBag');
        const sortBag = document.getElementById('sortBag');
        const bagGrid = document.getElementById('bagGrid');

        // 初始化背包格子
        function initBagGrid() {
            bagGrid.innerHTML = '';
            for (let i = 0; i < bag.maxSize; i++) {
                const slot = document.createElement('div');
                slot.className = 'bag-slot';
                slot.style.cssText = 'width:55px;height:55px;background:rgba(0,0,0,0.5);border:2px solid #555;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:18px;position:relative;overflow:hidden;';
                slot.dataset.index = i;
                slot.addEventListener('click', () => useBagItem(i));
                bagGrid.appendChild(slot);
            }
            updateBagDisplay();
        }

        // 更新背包显示
        function updateBagDisplay() {
            const slots = bagGrid.querySelectorAll('.bag-slot');
            slots.forEach((slot, i) => {
                const item = bag.items[i];
                if (item) {
                    // 判断是否是绿武/浅绿武
                    if (item.type === 'greenWeapon' || item.type === 'lightGreenWeapon') {
                        let borderColor = item.type === 'greenWeapon' ? '#2E8B57' : '#90EE90';
                        let glowColor = item.type === 'greenWeapon' ? '#2E8B57' : '#90EE90';
                        if (item.type === 'greenWeapon' && item.stage > 0) {
                            borderColor = weaponStages[item.stage].color;
                            glowColor = weaponStages[item.stage].color;
                        }
                        // 获取评分颜色
                        let rating = item.scoreRating || getScoreRating(item.totalScore || 0);
                        let scoreHtml = '';
                        if (item.type === 'greenWeapon' && item.totalScore > 0) {
                            scoreHtml = `<span style="font-size:8px;color:${rating.color};position:absolute;top:2px;right:2px;font-weight:bold;">${item.totalScore}</span>`;
                        }
                        slot.innerHTML = `<span style="font-size:18px;">🗡️</span>${scoreHtml}<span style="font-size:8px;color:${borderColor};position:absolute;bottom:2px;">Lv.${item.level}</span>`;
                        slot.style.borderColor = borderColor;
                        slot.style.boxShadow = `0 0 8px ${glowColor}, inset 0 0 5px ${glowColor}40`;
                        let titleText = `${item.name} Lv.${item.level}${item.bound ? ' [已绑定]' : ''}`;
                        if (item.type === 'greenWeapon' && item.totalScore > 0) {
                            titleText += `\n评分: ${item.totalScore} [${rating.name}] - ${rating.title}`;
                        }
                        slot.title = titleText;
                    } else {
                        // 普通装备
                        const equipType = equipTypes[item.type];
                        const quality = itemQualities[item.quality];
                        slot.innerHTML = equipType.icon;
                        slot.style.borderColor = quality.color;
                        slot.style.boxShadow = '0 0 5px ' + quality.color;
                        slot.title = `${quality.name}${equipType.name}`;
                    }
                } else {
                    slot.innerHTML = '';
                    slot.style.borderColor = '#555';
                    slot.style.boxShadow = 'none';
                    slot.title = '空';
                }
            });
            document.getElementById('bagCount').textContent = `${bag.items.length}/${bag.maxSize}`;
        }

        // 使用背包物品
        function useBagItem(index) {
            const item = bag.items[index];
            if (!item) return;

            // 绿武/浅绿武：装备到武器栏
            if (item.type === 'greenWeapon' || item.type === 'lightGreenWeapon') {
                // 卸下当前武器放回背包
                if (player.equippedWeapon) {
                    bag.items.push(player.equippedWeapon);
                }
                player.equippedWeapon = item;
                bag.items.splice(index, 1);
                createFloatingText(player.x, player.y - 40, `装备${item.name}`, '#90EE90');
                updatePlayerAttackRange(); // 更新攻击范围
                updateBagDisplay();
                updateEquipSlots();
                updateEquipPanel();
                return;
            }

            // 普通装备
            const currentEquip = player.equipped[item.type];
            if (currentEquip) {
                bag.items.push(currentEquip);
            }
            player.equipped[item.type] = item;
            bag.items.splice(index, 1);

            createFloatingText(player.x, player.y - 40, `装备${itemQualities[item.quality].name}${equipTypes[item.type].name}`, itemQualities[item.quality].color);
            updateBagDisplay();
            updateEquipSlots();
        }

        // 更新装备栏显示
        function updateEquipSlots() {
            const slots = document.querySelectorAll('.equip-slot');
            slots.forEach(slot => {
                const type = slot.dataset.slot;
                if (type === 'weapon') {
                    // 武器槽
                    const weapon = player.equippedWeapon;
                    if (weapon) {
                        let borderColor = '#2E8B57';
                        if (weapon.type === 'greenWeapon' && weapon.stage > 0) {
                            borderColor = weaponStages[weapon.stage].color;
                        } else if (weapon.type === 'lightGreenWeapon') {
                            borderColor = '#90EE90';
                        }
                        slot.style.borderColor = borderColor;
                        slot.style.boxShadow = '0 0 10px ' + borderColor;
                    } else {
                        slot.style.borderColor = '#666';
                        slot.style.boxShadow = 'none';
                    }
                    return;
                }
                const item = player.equipped[type];
                if (item) {
                    const quality = itemQualities[item.quality];
                    slot.style.borderColor = quality.color;
                    slot.style.boxShadow = '0 0 8px ' + quality.color;
                } else {
                    slot.style.borderColor = '#666';
                    slot.style.boxShadow = 'none';
                }
            });
        }

        // 自动整理背包
        function sortBagItems() {
            bag.items.sort((a, b) => {
                // 绿武优先
                const typeOrder = { greenWeapon: 0, lightGreenWeapon: 1 };
                const aTypeOrder = typeOrder[a.type] !== undefined ? typeOrder[a.type] : 2;
                const bTypeOrder = typeOrder[b.type] !== undefined ? typeOrder[b.type] : 2;
                if (aTypeOrder !== bTypeOrder) return aTypeOrder - bTypeOrder;

                // 同类型按品质排
                if (a.type === 'greenWeapon' || a.type === 'lightGreenWeapon') {
                    return b.level - a.level;
                }
                const qualityOrder = ['mythic', 'legendary', 'epic', 'rare', 'uncommon', 'common'];
                const equipTypeOrder = ['helmet', 'armor', 'shoes', 'necklace', 'ring', 'leftHand'];
                const qualityDiff = qualityOrder.indexOf(a.quality) - qualityOrder.indexOf(b.quality);
                if (qualityDiff !== 0) return qualityDiff;
                return equipTypeOrder.indexOf(a.type) - equipTypeOrder.indexOf(b.type);
            });
            updateBagDisplay();
            createFloatingText(centerX, centerY - 50, '背包已整理', '#4CAF50');
        }

        // 生成随机装备（测试用）
        function generateRandomEquip() {
            const types = ['helmet', 'armor', 'shoes', 'necklace', 'ring', 'leftHand'];
            const qualities = ['common', 'uncommon', 'rare', 'epic', 'legendary', 'mythic'];
            const qualityWeights = [0.4, 0.3, 0.15, 0.1, 0.04, 0.01];

            const type = types[Math.floor(Math.random() * types.length)];
            let rand = Math.random();
            let quality = 'common';
            for (let i = 0; i < qualities.length; i++) {
                rand -= qualityWeights[i];
                if (rand <= 0) {
                    quality = qualities[i];
                    break;
                }
            }

            return { type, quality };
        }

        // 添加物品到背包
        function addToBag(item) {
            if (bag.items.length >= bag.maxSize) {
                createFloatingText(player.x, player.y - 40, '背包已满!', '#ff0000');
                return false;
            }
            bag.items.push(item);
            updateBagDisplay();
            return true;
        }

        bagBtn.addEventListener('click', () => {
            bagPanel.style.display = 'block';
            initBagGrid();
        });

        closeBag.addEventListener('click', () => {
            bagPanel.style.display = 'none';
        });

        bagPanel.addEventListener('click', (e) => {
            if (e.target === bagPanel) {
                bagPanel.style.display = 'none';
            }
        });

        sortBag.addEventListener('click', sortBagItems);

        // 点击装备槽卸下装备
        document.querySelectorAll('.equip-slot').forEach(slot => {
            slot.addEventListener('click', () => {
                const type = slot.dataset.slot;
                if (type === 'weapon') {
                    // 卸下武器
                    unequipWeapon();
                    return;
                }

                const item = player.equipped[type];
                if (item) {
                    if (addToBag(item)) {
                        player.equipped[type] = null;
                        updateEquipSlots();
                        createFloatingText(player.x, player.y - 40, `卸下${equipTypes[type].name}`, '#888');
                    }
                }
            });
        });

        // 游戏主循环逻辑（与渲染分离）
        function gameLogic() {
            frameCount++;
            updatePlayer();
            playerAutoAttack();
            updateEnemies();
            updateProjectiles();
            updateParticles();
            updateDamageTexts();
            updateFloatingTexts();
            // 连击计时器更新
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer <= 0) {
                    comboCount = 0;
                }
            }
            if (playerAlive && enemies.length === 0 && frameCount % 60 === 0) {
                wave++;
                updateUI();
                spawnWave();
            }
        }

        // 前台渲染循环（使用 requestAnimationFrame）
        function gameLoop() {
            if (!isPageVisible) return; // 后台时不执行 RAF
            
            gameLogic();
            drawBackground();
            drawAttackRange();
            drawEnemies();
            drawPlayer();
            drawProjectiles();
            drawParticles();
            drawDamageTexts();
            drawFloatingTexts();
            requestAnimationFrame(gameLoop);
        }

        // 后台运行循环（使用 setInterval）
        function gameLoopBackup() {
            gameLogic();
            // 后台模式下不渲染，只更新游戏逻辑
        }

        // 初始化：自动创建如意刀放入背包
        const initialWeapon = createGreenWeaponInstance('ruyidao');
        addToBag(initialWeapon);

        // 初始化角色属性
        calculatePlayerStats();
        updateUI();
        spawnWave();
        gameLoop();
    </script>
</body>
</html>
