            });
            document.getElementById('storageCount').textContent = `${storage.items.length}/${storage.maxSize}`;
        }

        // 背包→储物箱
        function bagToStorage(bagIndex) {
            const item = bag.items[bagIndex];
            if (!item) return;
            if (storage.items.length >= storage.maxSize) {
                createFloatingText(player.x, player.y - 40, '储物箱已满!', '#ff0000');
                return;
            }
            storage.items.push(item);
            bag.items.splice(bagIndex, 1);
            createFloatingText(player.x, player.y - 40, `存入${item.name || '物品'}`, '#4169E1');
            updateBagDisplay();
            updateStorageDisplay();
        }

        // 储物箱→背包
        function storageToBag(storageIndex) {
            const item = storage.items[storageIndex];
            if (!item) return;
            if (bag.items.length >= bag.maxSize) {
                createFloatingText(player.x, player.y - 40, '背包已满!', '#ff0000');
                return;
            }
            bag.items.push(item);
            storage.items.splice(storageIndex, 1);
            createFloatingText(player.x, player.y - 40, `取出${item.name || '物品'}`, '#FFD700');
            updateBagDisplay();
            updateStorageDisplay();
        }

        // 更新背包显示
        function updateBagDisplay() {
            const slots = bagGrid.querySelectorAll('.bag-slot');
            slots.forEach((slot, i) => {
                const item = bag.items[i];
                if (item) {
                    // 上古石
                    if (item.type === 'ancientStone') {
                        slot.innerHTML = `<span style="font-size:24px;">🗿</span><span style="font-size:9px;color:#FFD700;position:absolute;bottom:1px;right:2px;font-weight:bold;text-shadow:0 0 3px #000;">×${item.count}</span>`;
                        slot.style.borderColor = '#FF8C00';
                        slot.style.boxShadow = '0 0 12px #FF8C00, inset 0 0 6px rgba(255,140,0,0.4)';
                        slot.title = `上古石 ×${item.count}\n提升词条品质概率`;
                    }
                    // 判断是否是绿武/浅绿武
                    else if (item.type === 'greenWeapon' || item.type === 'lightGreenWeapon') {
                        let borderColor = item.type === 'greenWeapon' ? '#2E8B57' : '#90EE90';
                        let glowColor = item.type === 'greenWeapon' ? '#2E8B57' : '#90EE90';
                        // 优先用评分等级颜色作为发光
                        let rating = item.scoreRating || getScoreRating(item.totalScore || 0);
                        if (item.type === 'greenWeapon' && item.totalScore > 0) {
                            borderColor = rating.color;
                            glowColor = rating.color;
                        } else if (item.type === 'greenWeapon' && item.stage > 0) {
                            borderColor = weaponStages[item.stage].color;
                            glowColor = weaponStages[item.stage].color;
                        }
                        // 评分等级越高，光晕越强（圣物/神兵特别炫）
                        const isMythic = item.mythicSkillId; // 圣物有神话技能
                        const isShenBing = (item.totalScore || 0) >= 1500;
                        const glowSize = isMythic ? 18 : (isShenBing ? 14 : 10);
                        const glowAlpha = isMythic ? 0.8 : 0.6;
                        let scoreHtml = '';
                        if (item.type === 'greenWeapon' && item.totalScore > 0) {
                            scoreHtml = `<span style="font-size:8px;color:${rating.color};position:absolute;top:1px;right:2px;font-weight:bold;text-shadow:0 0 2px #000;">${item.totalScore}</span>`;
                        }
                        // 神话技能图标（圣物专属）
                        let mythicIcon = '';
                        if (item.mythicSkillId) {
                            const skill = mythicSkills.find(s => s.id === item.mythicSkillId);
                            if (skill) mythicIcon = `<span style="font-size:10px;position:absolute;top:1px;left:1px;filter:drop-shadow(0 0 3px ${skill.color});">${skill.icon}</span>`;
                        }
                        slot.innerHTML = `<span style="font-size:22px;">🗡️</span>${scoreHtml}${mythicIcon}<span style="font-size:8px;color:${borderColor};position:absolute;bottom:1px;left:2px;font-weight:bold;text-shadow:0 0 2px #000;">Lv${item.level}</span>`;
                        slot.style.borderColor = borderColor;
                        slot.style.boxShadow = `0 0 ${glowSize}px ${glowColor}, inset 0 0 6px ${glowColor}${Math.floor(glowAlpha*255).toString(16)}`;
                        // 圣物加额外脉冲动画
                        if (isMythic) {
                            slot.style.animation = 'mythicPulse 2s ease-in-out infinite';
                        } else {
                            slot.style.animation = '';
                        }
                        let titleText = `${item.name} Lv.${item.level}${item.bound ? ' [已绑定]' : ''}`;
                        if (item.type === 'greenWeapon' && item.totalScore > 0) {
                            titleText += `\n评分: ${item.totalScore} [${rating.name}] - ${rating.title}`;
                        }
                        slot.title = titleText;
                    } else {
                        // 普通装备
                        const equipType = equipTypes[item.type];
                        const quality = itemQualities[item.quality];
                        slot.innerHTML = `<span style="font-size:22px;">${equipType.icon}</span>`;
                        slot.style.borderColor = quality.color;
                        slot.style.boxShadow = `0 0 10px ${quality.color}, inset 0 0 4px ${quality.color}40`;
                        slot.style.animation = '';
                        slot.title = `${quality.name}${equipType.name}`;
                    }
                } else {
                    slot.innerHTML = '';
                    slot.style.borderColor = '#5a4530';
                    slot.style.boxShadow = 'none';
                    slot.style.animation = '';
                    slot.title = '空';
                }
            });
            document.getElementById('bagCount').textContent = `${bag.items.length}/${bag.maxSize}`;
        }

        // 使用背包物品
        function useBagItem(index) {
            const item = bag.items[index];
            if (!item) return;

            // 上古石：左键放入上古石槽位
            if (item.type === 'ancientStone') {
                const addCount = Math.min(item.count, ancientStone.maxStack - ancientStone.count);
                if (addCount <= 0) {
                    createFloatingText(player.x, player.y - 40, '上古石槽位已满!', '#ff0000');
                    return;
                }
                ancientStone.count += addCount;
                item.count -= addCount;
                if (item.count <= 0) {
                    bag.items.splice(index, 1);
                }
                createFloatingText(player.x, player.y - 40, `放入${addCount}个上古石`, '#FF8C00');
                updateAncientStoneDisplay();
                updateBagDisplay();
                return;
            }

            // 绿武/浅绿武：装备到武器栏
            if (item.type === 'greenWeapon' || item.type === 'lightGreenWeapon') {
                // 卸下当前武器放回背包
                if (player.equippedWeapon) {
                    bag.items.push(player.equippedWeapon);
                }
                player.equippedWeapon = item;
                bag.items.splice(index, 1);
                activateMythicSkill(); // 装备新武器：激活神话技能
                createFloatingText(player.x, player.y - 40, `装备${item.name}`, '#90EE90');
                updatePlayerAttackRange(); // 更新攻击范围
                updateBagDisplay();
                updateEquipSlots();
                updateEquipPanel();
                return;
            }

            // 普通装备
            const currentEquip = player.equipped[item.type];
            if (currentEquip) {
                bag.items.push(currentEquip);
            }
            player.equipped[item.type] = item;
            bag.items.splice(index, 1);

            createFloatingText(player.x, player.y - 40, `装备${itemQualities[item.quality].name}${equipTypes[item.type].name}`, itemQualities[item.quality].color);
            updateBagDisplay();
            updateEquipSlots();
        }

        // 更新装备栏显示
        function updateEquipSlots() {
            const slots = document.querySelectorAll('.equip-slot');
            slots.forEach(slot => {
                const type = slot.dataset.slot;
                if (type === 'weapon') {
                    // 武器槽
                    const weapon = player.equippedWeapon;
                    if (weapon) {
                        let borderColor = '#2E8B57';
                        if (weapon.type === 'greenWeapon' && weapon.stage > 0) {
                            borderColor = weaponStages[weapon.stage].color;
                        } else if (weapon.type === 'lightGreenWeapon') {
                            borderColor = '#90EE90';
                        }
                        slot.style.borderColor = borderColor;
                        slot.style.boxShadow = '0 0 10px ' + borderColor;
                    } else {
                        slot.style.borderColor = '#666';
                        slot.style.boxShadow = 'none';
                    }
                    return;
                }
                const item = player.equipped[type];
                if (item) {
                    const quality = itemQualities[item.quality];
                    slot.style.borderColor = quality.color;
                    slot.style.boxShadow = '0 0 8px ' + quality.color;
                } else {
                    slot.style.borderColor = '#666';
                    slot.style.boxShadow = 'none';
                }
            });
        }

        // 自动整理背包
        function sortBagItems() {
            bag.items.sort((a, b) => {
                // 绿武优先
                const typeOrder = { greenWeapon: 0, lightGreenWeapon: 1 };
                const aTypeOrder = typeOrder[a.type] !== undefined ? typeOrder[a.type] : 2;
                const bTypeOrder = typeOrder[b.type] !== undefined ? typeOrder[b.type] : 2;
                if (aTypeOrder !== bTypeOrder) return aTypeOrder - bTypeOrder;

                // 同类型按品质排
                if (a.type === 'greenWeapon' || a.type === 'lightGreenWeapon') {
                    return b.level - a.level;
                }
                const qualityOrder = ['mythic', 'legendary', 'epic', 'rare', 'uncommon', 'common'];
                const equipTypeOrder = ['helmet', 'armor', 'shoes', 'necklace', 'ring', 'leftHand'];
                const qualityDiff = qualityOrder.indexOf(a.quality) - qualityOrder.indexOf(b.quality);
                if (qualityDiff !== 0) return qualityDiff;
                return equipTypeOrder.indexOf(a.type) - equipTypeOrder.indexOf(b.type);
            });
            updateBagDisplay();
            createFloatingText(centerX, centerY - 50, '背包已整理', '#4CAF50');
        }

        // 生成随机装备（测试用）
        function generateRandomEquip() {
            const types = ['helmet', 'armor', 'shoes', 'necklace', 'ring', 'leftHand'];
            const qualities = ['common', 'uncommon', 'rare', 'epic', 'legendary', 'mythic'];
            const qualityWeights = [0.4, 0.3, 0.15, 0.1, 0.04, 0.01];

            const type = types[Math.floor(Math.random() * types.length)];
            let rand = Math.random();
            let quality = 'common';
            for (let i = 0; i < qualities.length; i++) {
                rand -= qualityWeights[i];
                if (rand <= 0) {
                    quality = qualities[i];
                    break;
                }
            }

            return { type, quality };
        }

        // 添加物品到背包
        function addToBag(item) {
            if (bag.items.length >= bag.maxSize) {
                createFloatingText(player.x, player.y - 40, '背包已满!', '#ff0000');
                return false;
            }
            bag.items.push(item);
            updateBagDisplay();
            return true;
        }

        bagBtn.addEventListener('click', () => {
            bagPanel.style.display = 'flex';
            restoreBagPosition();
            initBagGrid();
        });

        closeBag.addEventListener('click', () => {
            bagPanel.style.display = 'none';
        });

        // 背包拖拽移动功能
        (function makeBagDraggable() {
            const header = document.getElementById('bagPanelHeader');
            if (!header) return;
            let isDragging = false;
            let startX = 0, startY = 0;
            let panelLeft = 0, panelTop = 0;

            header.addEventListener('mousedown', (e) => {
                // 防止双击关闭按钮触发
                if (e.target.id === 'closeBag') return;
                isDragging = true;
                header.style.cursor = 'grabbing';
                // 首次拖动时锁定面板位置（避免 transform 影响后续计算）
                const rect = bagPanel.getBoundingClientRect();
                bagPanel.style.left = rect.left + 'px';
                bagPanel.style.top = rect.top + 'px';
                bagPanel.style.transform = 'none';
                startX = e.clientX;
                startY = e.clientY;
                panelLeft = rect.left;
                panelTop = rect.top;
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                let newLeft = panelLeft + (e.clientX - startX);
                let newTop = panelTop + (e.clientY - startY);
                // 边界限制
                const w = bagPanel.offsetWidth;
                const h = bagPanel.offsetHeight;
                newLeft = Math.max(0, Math.min(window.innerWidth - w, newLeft));
                newTop = Math.max(0, Math.min(window.innerHeight - h, newTop));
                bagPanel.style.left = newLeft + 'px';
                bagPanel.style.top = newTop + 'px';
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    header.style.cursor = 'grab';
                    // 保存位置到 localStorage
                    try {
                        localStorage.setItem('bagPanelPos', JSON.stringify({
                            left: bagPanel.style.left,
                            top: bagPanel.style.top
                        }));
                    } catch(e) {}
                }
            });

            // 双击标题：回到屏幕中央
            header.addEventListener('dblclick', () => {
                bagPanel.style.left = '50%';
                bagPanel.style.top = '50%';
                bagPanel.style.transform = 'translate(-50%, -50%)';
                try { localStorage.removeItem('bagPanelPos'); } catch(e) {}
            });
        })();

        // 打开背包时恢复上次位置
        function restoreBagPosition() {
            try {
                const saved = localStorage.getItem('bagPanelPos');
                if (saved) {
                    const pos = JSON.parse(saved);
                    if (pos.left && pos.top) {
                        bagPanel.style.left = pos.left;
                        bagPanel.style.top = pos.top;
                        bagPanel.style.transform = 'none';
                    }
                }
            } catch(e) {}
        }

        bagPanel.addEventListener('click', (e) => {
            if (e.target === bagPanel) {
                bagPanel.style.display = 'none';
            }
        });

        sortBag.addEventListener('click', sortBagItems);

        // 点击装备槽卸下装备
        document.querySelectorAll('.equip-slot').forEach(slot => {
            slot.addEventListener('click', () => {
                const type = slot.dataset.slot;
                if (type === 'weapon') {
                    // 卸下武器
                    unequipWeapon();
                    return;
                }

                const item = player.equipped[type];
                if (item) {
                    if (addToBag(item)) {
                        player.equipped[type] = null;
                        updateEquipSlots();
                        createFloatingText(player.x, player.y - 40, `卸下${equipTypes[type].name}`, '#888');
                    }
                }
            });
            // 装备栏tooltip
            slot.addEventListener('mouseenter', (e) => {
                const type = slot.dataset.slot;
                let item = null;
                if (type === 'weapon') {
                    item = player.equippedWeapon;
                } else {
                    item = player.equipped[type];
                }
                if (!item) return;
                let html = '';
                if (item.type === 'greenWeapon' || item.type === 'lightGreenWeapon') {
                    html = buildWeaponTooltip(item);
                } else {
                    html = buildEquipTooltip(item);
                }
                if (html) showTooltip(e, html);
            });
            slot.addEventListener('mouseleave', hideTooltip);
        });

        // 游戏主循环逻辑（与渲染分离）
        function gameLogic() {
            frameCount++;
            updatePlayer();
            playerAutoAttack();
            updateEnemies();
            updateProjectiles();
            updateParticles();
            updateDamageTexts();
            updateFloatingTexts();
            updateMythicSkill(); // 神话技能更新
            updatePlayerDebuffs(); // 元素 Debuff 更新
            // 连击计时器更新
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer <= 0) {
                    comboCount = 0;
                }
            }
            if (playerAlive && enemies.length === 0 && frameCount % 60 === 0) {
                wave++;
                updateUI();
                spawnWave();
            }
        }

        // 前台渲染循环（使用 requestAnimationFrame）
        function gameLoop() {
            if (!isPageVisible) return; // 后台时不执行 RAF
            
            gameLogic();
            drawBackground();
            drawAttackRange();
            drawEnemies();
            drawPlayer();
            drawProjectiles();
            drawMythicSkill(); // 神话技能特效
            drawParticles();
            drawDamageTexts();
            drawFloatingTexts();
            requestAnimationFrame(gameLoop);
        }

        // 后台运行循环（使用 setInterval，浏览器会节流到 1秒/次）
        // 后台时仅按真实时间节奏推进游戏，单次最多补 60 帧（1秒），防止主线程卡死
        function gameLoopBackup() {
            const now = performance.now();
            const elapsed = now - lastBackupTime;
            lastBackupTime = now;
            // 单次最多补 60 帧（1秒游戏时间），避免主线程长时间阻塞
            const frames = Math.min(Math.floor(elapsed / FRAME_MS), 60);
            for (let i = 0; i < frames; i++) gameLogic();
            // 后台模式下不渲染
        }

        // 初始化：自动创建如意刀放入背包
        const initialWeapon = createGreenWeaponInstance('ruyidao');
        addToBag(initialWeapon);

        // 初始化：生成上古石到背包（测试用）
        bag.items.push({ type: 'ancientStone', name: '上古石', count: 9999, icon: '🗿' });

        // 初始化角色属性
        calculatePlayerStats();
        updateUI();
        spawnWave();
        gameLoop();
    </script>
</body>
</html>
