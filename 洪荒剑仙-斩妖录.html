<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洪荒剑仙 - 斩妖录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @keyframes bossWarning {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        @keyframes bossTextPulse {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.5);
            }
            20% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.2);
            }
            40% { 
                transform: translate(-50%, -50%) scale(1);
            }
            80% { 
                opacity: 1; 
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        @keyframes levelUpPulse {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.3);
            }
            30% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.1);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1);
            }
            80% { 
                opacity: 1; 
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.9);
            }
        }

        /* 圣物脉冲发光动画（神话技能武器格子） */
        @keyframes mythicPulse {
            0%, 100% {
                filter: brightness(1) saturate(1);
            }
            50% {
                filter: brightness(1.4) saturate(1.6);
            }
        }

        /* 背包格子hover效果 */
        .bag-slot:hover, .storage-slot:hover {
            transform: scale(1.08);
            filter: brightness(1.3);
            z-index: 10;
        }
        
        /* 自定义tooltip */
        #gameTooltip {
            display: none;
            position: fixed;
            z-index: 99999;
            background: rgba(10, 5, 2, 0.96);
            border: 2px solid #8b4513;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #d4af37;
            pointer-events: none;
            max-width: 280px;
            box-shadow: 0 0 15px rgba(139, 69, 19, 0.6);
            font-family: 'SimSun', '宋体', serif;
            line-height: 1.6;
        }
        #gameTooltip .tt-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #555;
        }
        #gameTooltip .tt-row {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        #gameTooltip .tt-label { color: #888; }
        #gameTooltip .tt-value { color: #e8d5a3; text-align: right; }
        #gameTooltip .tt-value.green { color: #4CAF50; }
        #gameTooltip .tt-value.blue { color: #4169E1; }
        #gameTooltip .tt-value.purple { color: #9370DB; }
        #gameTooltip .tt-value.gold { color: #FFD700; }
        #gameTooltip .tt-value.orange { color: #FF8C00; }
        #gameTooltip .tt-value.red { color: #FF4500; }
        #gameTooltip .tt-divider {
            border-top: 1px solid #333;
            margin: 5px 0;
        }
        #gameTooltip .tt-inscription {
            font-size: 11px;
            padding: 1px 0;
        }
        #gameTooltip .tt-score {
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px solid #555;
        }
        
        body {
            background: linear-gradient(135deg, #1a0f0a 0%, #2d1810 50%, #1a0f0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'SimSun', '宋体', serif;
            overflow: hidden;
            user-select: none;
        }
        
        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 32px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.8);
            margin-bottom: 8px;
            letter-spacing: 6px;
        }
        
        .subtitle {
            color: #8b7355;
            font-size: 14px;
            letter-spacing: 3px;
        }
        
        .stats {
            display: flex;
            gap: 25px;
            font-size: 14px;
            color: #d4af37;
            margin-top: 10px;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .canvas-wrapper {
            position: relative;
            border: 3px solid #8b4513;
            border-radius: 50%;
            box-shadow: 
                0 0 40px rgba(139, 69, 19, 0.4),
                inset 0 0 60px rgba(0, 0, 0, 0.5),
                0 0 0 2px #d4af37,
                0 0 0 4px #8b4513;
            background: radial-gradient(circle at center, #1a0f0a 0%, #0d0705 100%);
            margin-top: 15px;
        }
        
        canvas {
            border-radius: 50%;
            cursor: crosshair;
            display: block;
        }
        
        .controls {
            color: #8b7355;
            margin-top: 20px;
            font-size: 13px;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .revive-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }
        
        .revive-text {
            font-size: 40px;
            color: #dc143c;
            text-shadow: 0 0 30px #dc143c;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 10px;
        }
        
        .revive-countdown {
            font-size: 60px;
            color: #ffd700;
            text-shadow: 0 0 40px #ffd700;
            font-family: 'Courier New', monospace;
        }
        
        .revive-subtext {
            color: #8b7355;
            font-size: 16px;
            margin-top: 15px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>洪荒剑仙</h1>
            <div class="subtitle">上古战场 · 斩妖除魔</div>
            <div class="stats">
                <div class="stat-item">
                    <span>剑客 Lv.<span id="playerLevel">1</span></span>
                </div>
                <div class="stat-item">
                    <span>气血: <span id="playerHp">100</span>/<span id="playerMaxHp">100</span></span>
                </div>
                <div class="stat-item">
                    <span>斩妖: <span id="kills">0</span></span>
                </div>
                <div class="stat-item">
                    <span>波次: <span id="wave">1</span></span>
                </div>
                <div class="stat-item">
                    <span>修为: <span id="score">0</span></span>
                </div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="500" height="500"></canvas>
            <div class="revive-overlay" id="reviveOverlay">
                <div class="revive-text">道消身殒</div>
                <div class="revive-countdown" id="reviveCountdown">5</div>
                <div class="revive-subtext">元神重塑中...</div>
            </div>
        </div>
        
        <div class="controls">
            点击地面御剑飞行 | 剑气自动斩妖 | 死亡后5秒重塑肉身 | <button id="equipBtn" style="background:#8b4513;color:#ffd700;border:1px solid #d4af37;padding:2px 8px;cursor:pointer;font-family:inherit;">装备栏</button> | <button id="bagBtn" style="background:#4a7c59;color:#ffd700;border:1px solid #d4af37;padding:2px 8px;cursor:pointer;font-family:inherit;">背包</button> | <button id="skinBtn" style="background:#9b59b6;color:#fff;border:1px solid #d4af37;padding:2px 8px;cursor:pointer;font-family:inherit;">皮肤</button>
        </div>
        
        <!-- 装备栏界面 -->
        <div id="equipPanel" style="display:none;position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.95);border:3px solid #8b4513;border-radius:15px;padding:15px;z-index:10000;box-shadow:0 0 30px rgba(139,69,19,0.5);width:520px;max-height:90vh;overflow-y:auto;">
            <div style="text-align:center;color:#ffd700;font-size:24px;margin-bottom:15px;">装备栏</div>
            <div style="display:flex;gap:15px;">
                <!-- 左侧：人物和装备 -->
                <div style="position:relative;width:200px;height:280px;background:rgba(139,69,19,0.2);border-radius:10px;border:2px solid #8b4513;flex-shrink:0;">
                    <!-- 头盔 -->
                    <div class="equip-slot" data-slot="helmet" style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;" title="头盔">🪖</div>
                    <!-- 左手法宝 -->
                    <div class="equip-slot" data-slot="leftHand" style="position:absolute;top:80px;left:10px;width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;" title="法宝">📿</div>
                    <!-- 人物 -->
                    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;">👤</div>
                    <!-- 右手武器 -->
                    <div class="equip-slot" data-slot="weapon" id="weaponSlot" style="position:absolute;top:80px;right:10px;width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #90EE90;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;box-shadow:0 0 10px #90EE90;" title="武器">🗡️</div>
                    <!-- 衣服 -->
                    <div class="equip-slot" data-slot="armor" style="position:absolute;top:150px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;" title="衣服">👘</div>
                    <!-- 鞋子 -->
                    <div class="equip-slot" data-slot="shoes" style="position:absolute;top:220px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;" title="鞋子">👢</div>
                    <!-- 项链 -->
                    <div class="equip-slot" data-slot="necklace" style="position:absolute;top:150px;left:10px;width:40px;height:40px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;" title="项链">📿</div>
                    <!-- 戒指 -->
                    <div class="equip-slot" data-slot="ring" style="position:absolute;top:150px;right:10px;width:40px;height:40px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;" title="戒指">💍</div>
                </div>
                <!-- 右侧：武器详细信息 -->
                <div id="weaponInfoPanel" style="width:280px;color:#d4af37;font-size:14px;">
                    <div id="weaponInfoContent" style="color:#888;">未装备武器</div>
                </div>
                <!-- 上古石槽位 -->
                <div style="width:60px;display:flex;flex-direction:column;align-items:center;">
                    <div style="color:#FF8C00;font-size:11px;margin-bottom:5px;">上古石</div>
                    <div id="ancientStoneSlot" style="width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #FF8C00;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;position:relative;box-shadow:0 0 10px rgba(255,140,0,0.3);" title="上古石槽位 - 提升词条品质概率">🗿</div>
                    <div id="ancientStoneCount" style="color:#FF8C00;font-size:11px;margin-top:3px;">0</div>
                </div>
            </div>
            <button id="closeEquip" style="position:absolute;top:10px;right:10px;background:#8b4513;color:#ffd700;border:1px solid #d4af37;padding:5px 12px;cursor:pointer;font-family:inherit;border-radius:5px;font-size:16px;">✕</button>
        </div>
        
        <!-- 背包界面 -->
        <!-- 背包+储物箱面板 -->
        <div id="bagPanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,rgba(20,15,10,0.98),rgba(35,25,15,0.98));border:3px solid #8b4513;border-radius:15px;padding:12px;z-index:10000;box-shadow:0 0 40px rgba(212,175,55,0.4),inset 0 0 20px rgba(0,0,0,0.5);width:540px;max-height:92vh;display:none;flex-direction:column;">
            <div id="bagPanelHeader" style="text-align:center;color:#ffd700;font-size:16px;margin-bottom:8px;font-weight:bold;text-shadow:0 0 10px rgba(255,215,0,0.5);cursor:grab;user-select:none;padding:4px 0;border-bottom:1px dashed rgba(212,175,55,0.3);">🎒 储物宝箱 <span style="font-size:10px;color:#888;font-weight:normal;">（按住拖动）</span></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;padding:0 2px;">
                <span style="color:#d4af37;font-size:12px;font-weight:bold;">🎒 背包</span>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span id="bagCount" style="color:#ffd700;font-size:11px;">0/100</span>
                    <button id="sortBag" style="background:linear-gradient(135deg,#4a7c59,#3a6549);color:#fff;border:1px solid #6b9b7a;padding:2px 10px;cursor:pointer;font-family:inherit;border-radius:4px;font-size:11px;">整理</button>
                </div>
            </div>
            <div id="bagGrid" style="display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:8px;padding:5px;background:rgba(0,0,0,0.4);border-radius:6px;border:1px solid #5a3a1a;flex-shrink:0;">
                <!-- 背包格子由JS生成 -->
            </div>
            <div style="border-top:1px solid #8b4513;margin:5px 0;"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;padding:0 2px;">
                <span style="color:#4169E1;font-size:12px;font-weight:bold;">📦 储物箱</span>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span id="storageCount" style="color:#87CEEB;font-size:11px;">0/100</span>
                    <span style="color:#666;font-size:9px;">右键存 / 左键取</span>
                </div>
            </div>
            <div id="storageGrid" style="display:grid;grid-template-columns:repeat(10,1fr);gap:3px;padding:5px;background:rgba(0,0,0,0.4);border-radius:6px;border:1px solid #1a3a5a;flex-shrink:0;">
                <!-- 储物箱格子由JS生成 -->
            </div>
            <button id="closeBag" style="position:absolute;top:8px;right:10px;background:linear-gradient(135deg,#8b4513,#6a3410);color:#ffd700;border:1px solid #d4af37;padding:3px 9px;cursor:pointer;font-family:inherit;border-radius:5px;font-size:13px;font-weight:bold;">✕</button>
        </div>

        <!-- 皮肤选择面板 -->
        <div id="skinPanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:3px solid #9b59b6;border-radius:15px;padding:20px;z-index:10001;box-shadow:0 0 30px rgba(155,89,182,0.5);width:400px;">
            <div style="text-align:center;color:#9b59b6;font-size:20px;margin-bottom:15px;font-weight:bold;">🎨 角色皮肤</div>
            <div id="skinList" style="max-height:400px;overflow-y:auto;"></div>

        </div>
    </div>

    <!-- 自定义tooltip -->
    <div id="gameTooltip"></div>

        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;

        const radarRadius = 230;

        let gameRunning = true;

        let wave = 1;

        let frameCount = 0;

        // ========== 职业系统 ==========
        
        // 职业配置
        const classes = {

        // 属性效果配置

            },
            constitution: {

        // 皮肤系统
        const playerSkins = {

            jianke: { id: 'jianke', name: '剑客', desc: '人形+背后长剑', price: 1000, color: '#4a90d9', unlocked: true },

        const player = {
            x: centerX,

        // ========== 绿武系统数据 ==========

        // 深绿武器模板
        const greenWeapons = {
            ruyidao: { name: '如意刀', class: '剑客', minAtk: 38, maxAtk: 48, element: null, elementGrowth: 0, growth: 1.08, totalGrowth: 97.2, reqLevel: 9, maxLevel: 99, icon: 'images/ruyi_dao.png' },

        // 攻击范围全局上限
        const ATK_RANGE_MAX = 0.25; // 25%

        // 连击计数器
        let comboCount = 0;

        // ========== 职业系统函数 ==========

        // 计算角色属性
        function calculatePlayerStats() {
            const cls = classes[player.classId];
            const attr = player.attributes;
            const effects = attributeEffects;
            
            // 基础值 + 属性加成
            let physicalAtk = 30 + attr.strength * effects.strength.physicalAtk;
            
            // 绿武攻击加成
            if (player.equippedWeapon) {
                const weapon = player.equippedWeapon;
                const template = greenWeapons[weapon.weaponId];
                if (template) {
                    // 计算武器攻击力（基础+成长+爆攻）
                    const levelDiff = weapon.level - template.reqLevel;
                    const baseMinAtk = template.minAtk + template.growth * levelDiff;
                    const baseMaxAtk = template.maxAtk + template.growth * levelDiff;
                    const finalMinAtk = baseMinAtk + weapon.totalBurstAtk;
                    const finalMaxAtk = baseMaxAtk + weapon.totalBurstAtk;
                    const avgAtk = (finalMinAtk + finalMaxAtk) / 2;
                    
                    // 进阶加成
                    const stageBonus = weaponStages[weapon.stage].bonusPercent / 100;
                    const finalAtk = avgAtk * (1 + stageBonus);
                    
                    physicalAtk += finalAtk;
                }
            }
            
            player.computedStats = {
                physicalAtk: physicalAtk,
                maxHp: 100 + attr.constitution * effects.constitution.maxHp,
                maxMp: 50 + attr.spirit * effects.spirit.maxMp,
                physicalDef: attr.constitution * effects.constitution.physicalDef,
                elementalAtk: attr.spirit * effects.spirit.elementalAtk,
                elementalDef: attr.spirit * effects.spirit.elementalDef,
                attackSpeed: 1.0 + attr.agility * effects.agility.attackSpeed,
                moveSpeed: 0.6 + attr.agility * effects.agility.moveSpeed * 10,
                dodge: attr.agility * effects.agility.dodge,
                crit: attr.agility * effects.agility.crit,
                critDamage: 1.5,
                damageReduce: attr.constitution * effects.constitution.damageReduce
            };
            
            // 剑客被动：剑术精通（物攻+8%）
            if (player.classId === 'jianke' && player.equippedWeapon) {
                const weapon = player.equippedWeapon;
                if (weapon && greenWeapons[weapon.weaponId]) {
                    const template = greenWeapons[weapon.weaponId];
                    if (template.name.includes('刀') || template.name.includes('剑')) {
                        player.computedStats.physicalAtk *= 1.08;
                    }
                }
            }

            // 称号加成
            let titleBonus = { atkBonus: 0, hpBonus: 0, critBonus: 0, dmgReduceBonus: 0, elementBonus: 0 };
            if (player.equippedWeapon && player.equippedWeapon.scoreRating) {
                const bonus = player.equippedWeapon.scoreRating.bonus;
                if (bonus) {
                    titleBonus = bonus;
                }
            }

            // 应用称号加成
            player.computedStats.physicalAtk *= (1 + titleBonus.atkBonus);
            player.computedStats.maxHp *= (1 + titleBonus.hpBonus);
            player.computedStats.crit += titleBonus.critBonus;
            player.computedStats.damageReduce += titleBonus.dmgReduceBonus;
            player.computedStats.elementalAtk *= (1 + titleBonus.elementBonus);

            // 同步到 player 的攻击属性
            player.attackDamage = Math.floor(player.computedStats.physicalAtk);
            player.maxHp = Math.floor(player.computedStats.maxHp + getHpBonus());
            player.moveSpeed = player.computedStats.moveSpeed;
            
            // 攻速词条：减少攻击间隔
            const atkSpeedBonus = getAtkSpeedBonus();
            const baseInterval = 6;
            player.attackInterval = Math.max(2, Math.floor(baseInterval / (1 + atkSpeedBonus)));
            
            // 计算攻击范围（词条+进阶）
            updatePlayerAttackRange();
        }
        
        // 计算攻击范围
        function updatePlayerAttackRange() {
            let baseRange = 90; // 基础攻击范围
            let rangeBonus = 0;
            
            // 词条加成
            if (player.equippedWeapon) {
                const weapon = player.equippedWeapon;
                weapon.inscriptions.forEach(ins => {
                    if (ins.type === 'atkRange') {
                        rangeBonus += ins.value / 100;
                    }
                });
                
                // 进阶加成
                const stageBonus = weaponStages[weapon.stage].atkRangeBonus / 100;
                rangeBonus += stageBonus;
            }
            
            // 限制上限25%
            if (rangeBonus > ATK_RANGE_MAX) {
                rangeBonus = ATK_RANGE_MAX;
            }
            
            player.attackRange = baseRange * (1 + rangeBonus);
            player.computedStats.atkRangeBonus = rangeBonus;
        }

        // 角色升级
        function levelUpPlayer() {
            player.playerLevel++;
            
            // 根据职业成长加点

            player.attributes.constitution += cls.growth.constitution;
            player.attributes.agility += cls.growth.agility;

        // 角色获取经验
        function addPlayerExp(baseExp) {
            // 人物经验加成词条

            if (player.equippedWeapon && player.equippedWeapon.scoreRating && player.equippedWeapon.scoreRating.bonus) {
                expBonus += player.equippedWeapon.scoreRating.bonus.playerExpBonus || 0;
            }
            const finalExp = Math.floor(baseExp * (1 + expBonus));
            player.playerExp += finalExp;
            while (player.playerExp >= player.expToNext) {
                player.playerExp -= player.expToNext;
                player.expToNext = Math.floor(player.expToNext * 1.2);
                levelUpPlayer();

            updateUI();

        // ========== 绿武系统函数 ==========

        // 创建深绿武器实例
        function createGreenWeaponInstance(weaponId) {
            const template = greenWeapons[weaponId];
            if (!template) return null;
            return {
                weaponId: weaponId,
                name: template.name,
                level: template.reqLevel,

        function createLightGreenWeaponInstance(weaponId) {
            const template = lightGreenWeapons[weaponId];
            if (!template) return null;
            return {
                weaponId: weaponId,
                name: template.name,
                level: template.reqLevel,

        // 获取武器升级所需经验
        function getWeaponExpNeeded(level) {
            if (level < 30) return 80 + level * 5;       // 9-30级：低经验
            if (level < 60) return 200 + (level - 30) * 12; // 31-60级：中经验
            if (level < 90) return 560 + (level - 60) * 20; // 61-90级：高经验
            return 1160 + (level - 90) * 35;              // 91-99级：超高经验
        }

        // 计算武器当前攻击力
        function calcWeaponAtk(weapon) {
            if (!weapon) return { minAtk: 0, maxAtk: 0, finalMinAtk: 0, finalMaxAtk: 0 };
            let isDeepGreen = weapon.type === 'greenWeapon';
            let template = isDeepGreen ? greenWeapons[weapon.weaponId] : lightGreenWeapons[weapon.weaponId];
            if (!template) return { minAtk: 0, maxAtk: 0, finalMinAtk: 0, finalMaxAtk: 0 };

            let levelDiff = weapon.level - template.reqLevel;
            let currentMinAtk = template.minAtk + levelDiff * template.growth;
            let currentMaxAtk = template.maxAtk + levelDiff * template.growth;

            // 进阶加成（仅深绿）
            let stageBonus = 0;
            if (isDeepGreen && weapon.stage > 0) {
                stageBonus = weaponStages[weapon.stage].bonusPercent / 100;
            }

            // 绑定固定伤害加成
            let boundBonus = weapon.bound ? 15 : 0;

            let finalMinAtk = currentMinAtk * (1 + stageBonus) + boundBonus;
            let finalMaxAtk = currentMaxAtk * (1 + stageBonus) + boundBonus;

            // 爆攻加成
            finalMinAtk += weapon.totalBurstAtk;
            finalMaxAtk += weapon.totalBurstAtk;

            return {
                minAtk: Math.floor(currentMinAtk),
                maxAtk: Math.floor(currentMaxAtk),
                finalMinAtk: Math.floor(finalMinAtk),
                finalMaxAtk: Math.floor(finalMaxAtk)
            };
        }

        // 获取武器最大耐久
        function getWeaponMaxDurability(level) {
            return Math.min(24 + Math.floor((level - 9) * 0.3), 48);
        }

        // 武器获取经验
        function addWeaponExp(weapon, baseExp) {
            if (!weapon) return;
            let isDeepGreen = weapon.type === 'greenWeapon';
            let template = isDeepGreen ? greenWeapons[weapon.weaponId] : lightGreenWeapons[weapon.weaponId];
            if (!template) return;
            if (weapon.level >= template.maxLevel) return;

            // 连击加成
            let comboMultiplier = 1.0;
            if (comboCount >= 100) comboMultiplier = 1.3;
            else if (comboCount >= 50) comboMultiplier = 1.15;

            // 绑定经验加成
            let expMultiplier = comboMultiplier * (weapon.bound ? 1.08 : 1.0);

            // 武具经验加成词条
            let weaponExpBonus = 0;
            weapon.inscriptions.forEach(ins => {
                if (ins.type === 'weaponExpBonus') weaponExpBonus += ins.value;
            });
            expMultiplier *= (1 + weaponExpBonus / 100);

            // 称号武具经验加成
            if (weapon.scoreRating && weapon.scoreRating.bonus) {
                expMultiplier *= (1 + (weapon.scoreRating.bonus.weaponExpBonus || 0));
            }

            // 测试用经验倍率
            expMultiplier *= WEAPON_EXP_MULTIPLIER;

            let finalExp = Math.floor(baseExp * expMultiplier);
            
            // 检查是否解锁新词条（每3级一次）
            const prevLevel = weapon.level;
            weapon.exp += finalExp;
            
            // 计算新等级
            let newLevel = prevLevel;
            while (weapon.exp >= weapon.expToNext && newLevel < template.maxLevel) {
                weapon.exp -= weapon.expToNext;
                newLevel++;
            }
            
            if (newLevel > prevLevel) {
                // 每2级获得一次词条（从12级开始）
                for (let lvl = prevLevel + 1; lvl <= newLevel; lvl++) {
                    if (lvl >= 12 && (lvl - 12) % 2 === 0) {
                        unlockInscription(weapon);
                    }
                    
                    // 爆攻判定（深绿武器）
                    if (isDeepGreen) {
                        let burstChance = 0.20;
                        if (comboCount >= 100) burstChance += 0.05;
                        else if (comboCount >= 50) burstChance += 0.03;

                        let rand = Math.random();
                        if (rand < 0.01) {
                            weapon.totalBurstAtk += 3;
                            showWeaponBurstAtk(3);
                        } else if (rand < 0.05) {
                            weapon.totalBurstAtk += 2;
                            showWeaponBurstAtk(2);
                        } else if (rand < 0.25) {
                            weapon.totalBurstAtk += 1;
                            showWeaponBurstAtk(1);
                        }
                        // 累计爆攻上限60
                        weapon.totalBurstAtk = Math.min(weapon.totalBurstAtk, 60);
                    }
                }
                
                weapon.level = newLevel;
                weapon.expToNext = getWeaponExpNeeded(weapon.level);
                weapon.maxDurability = getWeaponMaxDurability(weapon.level);
                
                showWeaponLevelUp(weapon.name, weapon.level);
                
                // 重新计算角色属性（武器升级影响攻击力）
                calculatePlayerStats();
            }

            // 更新装备栏显示
            if (equipPanel.style.display === 'block') updateEquipPanel();
        }

        // 体型增伤词条类型
        const sizeDamageTypes = ['largeDmg', 'mediumDmg', 'smallDmg'];
        
        // 生成随机词条
        function generateInscription(weapon) {
            const types = Object.keys(inscriptionTypes);
            const qualities = ['common', 'fine', 'excellent', 'perfect'];
            
            // 上古石效果：提升高品质词条概率
            let qualityWeights;
            if (ancientStone.count > 0) {
                // 有上古石：白44% 蓝33% 紫18% 金5%
                qualityWeights = [0.44, 0.33, 0.18, 0.05];
            } else {
                // 无上古石：白55% 蓝30% 紫12% 金3%
                qualityWeights = [0.55, 0.30, 0.12, 0.03];
            }
            
            let selectedType;
            
            // 检查是否已有10个词条
            if (weapon.inscriptions.length >= WEAPON_MAX_INSCRIPTIONS) {
                // 满10条后，从已有词条中随机选择一个类型进行叠加
                const randomIndex = Math.floor(Math.random() * weapon.inscriptions.length);
                selectedType = weapon.inscriptions[randomIndex].type;
            } else {
                // 未满10条，随机选择词条类型（排除已满10层的类型）
                let availableTypes = types.filter(type => {
                    const count = weapon.inscriptions.filter(i => i.type === type).length;
                    return count < INSCRIPTION_MAX_STACK;
                });
                
                // 检查已拥有的体型增伤词条数量
                const existingSizeDmgCount = weapon.inscriptions.filter(i => 
                    sizeDamageTypes.includes(i.type)
                ).length;
                
                // 如果已有2种体型增伤，排除剩余的体型增伤类型
                if (existingSizeDmgCount >= 2) {
                    availableTypes = availableTypes.filter(type => !sizeDamageTypes.includes(type));
                }
                
                // 如果没有可用类型（理论上不会发生，因为总词条数<10时必有空位），从已有类型中选择
                if (availableTypes.length === 0) {
                    const randomIndex = Math.floor(Math.random() * weapon.inscriptions.length);
                    selectedType = weapon.inscriptions[randomIndex].type;
                } else {
                    selectedType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
                }
            }
            
            const typeConfig = inscriptionTypes[selectedType];
            
            // 随机品质
            let rand = Math.random();
            let quality = 'common';
            for (let i = 0; i < qualities.length; i++) {
                rand -= qualityWeights[i];
                if (rand <= 0) {
                    quality = qualities[i];
                    break;
                }
            }
            
            // 计算波动值
            const fluctuation = qualityFluctuation[quality];
            const baseValue = typeConfig.maxValue / INSCRIPTION_MAX_STACK;
            const minValue = baseValue * fluctuation.min;
            const maxValue = baseValue * fluctuation.max;
            const actualValue = minValue + Math.random() * (maxValue - minValue);
            
            // 计算分数
            const score = actualValue * typeConfig.scorePerUnit;
            
            // 返回词条信息，标记是否使用了上古石
            return {
                type: selectedType,
                quality: quality,
                value: actualValue,
                score: Math.floor(score),
                usedAncientStone: ancientStone.count > 0
            };
        }

        // 词条解锁函数
        function unlockInscription(weapon) {
            const newInscription = generateInscription(weapon);
            
            // 消耗上古石
            if (newInscription.usedAncientStone && ancientStone.count > 0) {
                ancientStone.count--;
                updateAncientStoneDisplay();
                createFloatingText(player.x, player.y - 60, '上古石加持！', '#FF8C00');
            }
            
            // 检查是否已有同类型词条
            const existingIndex = weapon.inscriptions.findIndex(i => i.type === newInscription.type);
            
            if (existingIndex >= 0) {
                // 合并叠加
                const existing = weapon.inscriptions[existingIndex];
                existing.value += newInscription.value;
                existing.score += newInscription.score;
                
                // 检查是否达到上限
                const typeConfig = inscriptionTypes[newInscription.type];
                if (existing.value > typeConfig.maxValue) {
                    existing.value = typeConfig.maxValue;
                    existing.score = Math.floor(typeConfig.maxValue * typeConfig.scorePerUnit); // 满分
                }
                
                showInscriptionMerge(weapon.name, typeConfig.name, existing.value, existing.score);
            } else if (weapon.inscriptions.length < WEAPON_MAX_INSCRIPTIONS) {
                // 新词条（未满10条时）
                weapon.inscriptions.push(newInscription);
                showInscriptionUnlock(weapon.name, inscriptionTypes[newInscription.type].name, newInscription.quality);
            } else {
                // 已满10条，但生成了新类型（理论上不会发生），强制叠加到第一个词条
                const existing = weapon.inscriptions[0];
                existing.value += newInscription.value;
                existing.score += newInscription.score;
                const typeConfig = inscriptionTypes[existing.type];
                if (existing.value > typeConfig.maxValue) {
                    existing.value = typeConfig.maxValue;
                    existing.score = 100;
                }
                showInscriptionMerge(weapon.name, typeConfig.name, existing.value, existing.score);
            }

        }

        // 消耗耐久
        function consumeWeaponDurability(weapon) {
            if (!weapon) return;
            // 每攻击100000次掉1点耐久
            if (!weapon.attackCount) weapon.attackCount = 0;
            weapon.attackCount++;
            
            // 耐久消耗降低词条
            let duraReduce = 0;
            weapon.inscriptions.forEach(ins => {
                if (ins.type === 'duraReduce') duraReduce += ins.value;
            });
            
            // 计算实际需要的攻击次数（考虑词条减免）
            let attacksPerDura = 100000;
            if (duraReduce > 0) {
                attacksPerDura = Math.floor(100000 * (1 + duraReduce / 100));
            }
            
            // 达到次数才扣耐久
            if (weapon.attackCount >= attacksPerDura) {
                weapon.attackCount = 0;
                weapon.durability--;
                if (weapon.durability < 0) weapon.durability = 0;
            }
        }

            if (!enemy.isBoss) return;
            const hpPct = enemy.hp / enemy.maxHp;
            const oldPhase = enemy.bossPhase;
            if (hpPct <= 0.33) enemy.bossPhase = 3;
            else if (hpPct <= 0.66) enemy.bossPhase = 2;
            else enemy.bossPhase = 1;
            // 阶段切换：狂暴提示
            if (oldPhase !== enemy.bossPhase) {
                createFloatingText(enemy.x, enemy.y - 40, `阶段${enemy.bossPhase}!`, enemy.color);
                enemy.skillCooldown = 0; // 立即放技能

        function rollElementAffix() {
            // 30% 概率附加元素
            if (Math.random() > 0.30) return null;
            const total = Object.values(elementAffixes).reduce((s, a) => s + a.weight, 0);
            let r = Math.random() * total;
            for (const [key, affix] of Object.entries(elementAffixes)) {
                r -= affix.weight;
                if (r <= 0) return key;
            }
            return null;
        }

        function spawnEnemy(type, forceElite, forceBoss) {
            // 性能保护：场上敌人超过 80 只时拒绝刷新（BOSS 除外）
            if (!forceBoss && enemies.length >= 80) return null;
            const config = enemyTypes[type];
            const angle = Math.random() * Math.PI * 2;
            const distance = radarRadius - 35;
            const sizeType = getRandomSizeType(type);
            const sizeMod = sizeModifiers[sizeType];
            
            let finalHp = config.hp;
            let finalDamage = config.damage;
            let finalSpeed = config.moveSpeed;
            
            if (sizeType === 'S') {
                finalHp = Math.floor(config.hp * 0.8);
                finalDamage = Math.floor(config.damage * 0.9);
                finalSpeed = config.moveSpeed * 1.2;
            } else if (sizeType === 'L') {
                finalHp = Math.floor(config.hp * (1 + sizeMod.hpMod));
                finalDamage = Math.floor(config.damage * 1.1);
                finalSpeed = config.moveSpeed * 0.8;
            }

            // 元素后缀（boss 等高 tier 概率更高）
            const elemKey = rollElementAffix();
            const elementAffix = elemKey ? elementAffixes[elemKey] : null;
            if (elementAffix) {
                finalHp = Math.floor(finalHp * elementAffix.hpMul);
                finalDamage = Math.floor(finalDamage * elementAffix.dmgMul);
            }

            // 精英怪判定
            const isElite = forceElite || (Math.random() < eliteConfig.chance);
            let finalScore = config.score;
            if (isElite) {
                finalHp = Math.floor(finalHp * eliteConfig.hpMul);
                finalDamage = Math.floor(finalDamage * eliteConfig.dmgMul);
                finalScore = Math.floor(config.score * eliteConfig.scoreMul);
            }
            
            const enemy = {
                x: centerX + Math.cos(angle) * distance,
                y: centerY + Math.sin(angle) * distance,
                type: type,
                ...config,
                sizeType: sizeType,
                hp: finalHp,
                maxHp: finalHp,
                damage: finalDamage,
                moveSpeed: finalSpeed,
                score: finalScore,
                attackCooldown: 0,
                id: Math.random(),
                element: elemKey,         // 元素属性 key
                elementAffix: elementAffix, // 元素配置
                isElite: isElite,         // 是否精英
                isBoss: !!forceBoss,      // 是否BOSS
                skillCooldown: 0,         // 技能CD（用于技能化）
                skillState: {},           // 技能状态
                bossPhase: 1              // BOSS阶段
            };
            
            enemies.push(enemy);
            
            // 精英怪/BOSS 出场提示
            if (isElite && !forceBoss) {
                createFloatingText(enemy.x, enemy.y - 30, `✨精英${config.name}!`, '#FFD700');
            }
            // 妖皇和魔神出现时的警示（BOSS 由 spawnBoss 自己处理，避免重复）

            }
            return enemy;
        }

        function getEnemyTypeByWave() {
            const rand = Math.random();
            if (wave <= 2) {
                if (rand < 0.7) return 'spirit';
                return 'goblin';
            } else if (wave <= 4) {
                if (rand < 0.3) return 'spirit';
                if (rand < 0.8) return 'goblin';
                return 'demon';
            } else if (wave <= 6) {
                if (rand < 0.1) return 'spirit';
                if (rand < 0.4) return 'goblin';
                if (rand < 0.8) return 'demon';
                return 'general';
            } else if (wave <= 8) {
                if (rand < 0.2) return 'goblin';
                if (rand < 0.55) return 'demon';
                if (rand < 0.85) return 'general';
                return 'boss';
            } else if (wave <= 10) {
                if (rand < 0.1) return 'goblin';
                if (rand < 0.35) return 'demon';
                if (rand < 0.7) return 'general';
                if (rand < 0.95) return 'boss';
                return 'emperor';
            } else if (wave <= 15) {
                if (rand < 0.05) return 'goblin';
                if (rand < 0.25) return 'demon';
                if (rand < 0.55) return 'general';
                if (rand < 0.85) return 'boss';
                if (rand < 0.99) return 'emperor';
                return 'god';
            } else if (wave <= 20) {
                if (rand < 0.15) return 'demon';
                if (rand < 0.4) return 'general';
                if (rand < 0.75) return 'boss';
                if (rand < 0.95) return 'emperor';
                return 'god';

                if (rand < 0.1) return 'demon';

                if (rand < 0.6) return 'boss';
                if (rand < 0.9) return 'emperor';

                    spawnBoss(bossCfg);

                        }, i * 400);
                    }
                }, 800);
                return;

            const count = getWaveEnemyCount();
            for (let i = 0; i < count; i++) {

                vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8,
                isPlayer: true, damage: damage, life: 50, angle: angle, type: 'sword'
            });
        }

        function createDemonQi(from, to, damage) {
            const angle = Math.atan2(to.y - from.y, to.x - from.x);
            projectiles.push({
                x: from.x, y: from.y,
                vx: Math.cos(angle) * 5, vy: Math.sin(angle) * 5,
                isPlayer: false, damage: damage, life: 60, type: 'demon',
                element: from.element || null,
                elementAffix: from.elementAffix || null
            });
        }

        function createParticles(x, y, color, count = 10) {
            // 性能保护：粒子数超过 200 时降低生成
            if (particles.length > 200) count = Math.floor(count * 0.3);
            if (particles.length > 400) return; // 完全禁用
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * (2 + Math.random() * 3),
                    vy: Math.sin(angle) * (2 + Math.random() * 3),
                    life: 25, color: color, size: 2 + Math.random() * 3,
                    type: Math.random() > 0.5 ? 'spark' : 'smoke'
                });
            }
        }

        function createDamageText(x, y, damage, isPlayer, isCrit, customColor) {
            damageTexts.push({
                x: x, y: y, text: damage, life: 35,
                color: customColor || (isCrit ? '#FF4500' : (isPlayer ? '#ff6b6b' : '#ffd93d')),
                fontSize: isCrit ? 18 : 14
            });
        }

        function createFloatingText(x, y, text, color) {
            floatingTexts.push({ x: x, y: y, text: text, life: 40, color: color, vy: -0.8 });
        }

        function drawBackground() {
            ctx.fillStyle = 'rgba(13, 7, 5, 0.98)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(139, 69, 19, 0.3)';
            ctx.lineWidth = 2;
            for (let r = 60; r <= radarRadius; r += 60) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    ctx.fillStyle = 'rgba(139, 69, 19, 0.4)';
                    ctx.font = '12px serif';
                    ctx.fillText('◆', centerX + Math.cos(angle) * r - 4, centerY + Math.sin(angle) * r + 4);
                }
            }

            ctx.strokeStyle = 'rgba(139, 69, 19, 0.25)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + Math.cos(angle) * radarRadius, centerY + Math.sin(angle) * radarRadius);
                ctx.stroke();
            }

            const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            ctx.fillStyle = 'rgba(212, 175, 55, 0.5)';
            ctx.font = '12px SimSun';
            directions.forEach((dir, i) => {
                const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                const x = centerX + Math.cos(angle) * (radarRadius + 15);
                const y = centerY + Math.sin(angle) * (radarRadius + 15);
                ctx.fillText(dir, x - 6, y + 4);
            });

            ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radarRadius, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawAttackRange() {
            if (!playerAlive) return;
            const gradient = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.attackRange);
            gradient.addColorStop(0, 'rgba(255, 215, 0, 0.05)');
            gradient.addColorStop(1, 'rgba(255, 215, 0, 0.15)');
            ctx.fillStyle = gradient;
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.attackRange, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.15)';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.attackRange * 0.7, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawPlayer() {
            if (!playerAlive) return;
            const skin = playerSkins[currentSkinId];
            const skinColor = skin.color;

            // 根据皮肤类型绘制不同形象
            if (currentSkinId === 'jianxian') {
                // 剑仙：金色圆形+3把飞剑
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = skinColor;
                ctx.shadowBlur = 20;
                ctx.shadowColor = skinColor;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff8dc';
                ctx.beginPath();
                ctx.arc(player.x, player.y, 7, 0, Math.PI * 2);
                ctx.fill();
                player.swordAngle += 0.08;
                for (let i = 0; i < 3; i++) {
                    const angle = player.swordAngle + (i * Math.PI * 2 / 3);
                    const sx = player.x + Math.cos(angle) * 20;
                    const sy = player.y + Math.sin(angle) * 20;
                    ctx.strokeStyle = skinColor;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(sx - 6, sy);
                    ctx.lineTo(sx + 6, sy);
                    ctx.stroke();
                }
            } else if (currentSkinId === 'jianke') {
                // 剑客：人形+背后长剑
                ctx.fillStyle = skinColor;
                ctx.shadowBlur = 10;
                ctx.shadowColor = skinColor;
                // 身体
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();
                // 头部
                ctx.fillStyle = '#ffe4c4';
                ctx.beginPath();
                ctx.arc(player.x, player.y - player.radius - 5, 8, 0, Math.PI * 2);
                ctx.fill();
                // 长剑
                ctx.strokeStyle = '#c0c0c0';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(player.x + 10, player.y - 20);
                ctx.lineTo(player.x + 10, player.y + 25);
                ctx.stroke();
                ctx.strokeStyle = skinColor;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(player.x + 10, player.y - 20);
                ctx.lineTo(player.x + 10, player.y - 30);
                ctx.stroke();
                ctx.shadowBlur = 0;
            } else if (currentSkinId === 'taiji') {
                // 太极道人：阴阳鱼旋转 + 八卦盘 + 黑白气流
                player.swordAngle = (player.swordAngle || 0) + 0.025;
                const t = player.swordAngle;

                // ===== 外层八卦盘（缓慢反向旋转） =====
                const baguaRadius = player.radius + 14;
                const trigrams = ['☰','☱','☲','☳','☴','☵','☶','☷']; // 八卦符
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(-t * 0.5);
                // 八卦外环
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.6)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(0, 0, baguaRadius, 0, Math.PI * 2);
                ctx.stroke();
                // 内环
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, baguaRadius - 4, 0, Math.PI * 2);
                ctx.stroke();
                // 八卦符号
                ctx.fillStyle = 'rgba(255, 215, 0, 0.85)';
                ctx.font = 'bold 9px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#ffd700';
                for (let i = 0; i < 8; i++) {
                    const ang = (i / 8) * Math.PI * 2 - Math.PI / 2;
                    const tx = Math.cos(ang) * (baguaRadius - 2);
                    const ty = Math.sin(ang) * (baguaRadius - 2);
                    ctx.fillText(trigrams[i], tx, ty);
                }
                ctx.shadowBlur = 0;
                ctx.restore();

                // ===== 黑白气流环绕（粒子轨道） =====
                for (let i = 0; i < 6; i++) {
                    const ang = t * 2 + (i / 6) * Math.PI * 2;
                    const r = player.radius + 6 + Math.sin(t * 3 + i) * 2;
                    const px = player.x + Math.cos(ang) * r;
                    const py = player.y + Math.sin(ang) * r;
                    // 阴阳交替
                    const isYang = i % 2 === 0;
                    ctx.fillStyle = isYang ? 'rgba(255,255,255,0.85)' : 'rgba(40,40,40,0.85)';
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = isYang ? '#fff' : '#000';
                    ctx.beginPath();
                    ctx.arc(px, py, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;

                // ===== 核心阴阳鱼（旋转） =====
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(t);
                const r = player.radius;

                // 整体外发光底
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffd700';
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, r + 1, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 阳鱼（白色右半，含两个小半圆构造S曲线）
                ctx.fillStyle = '#f8f8f8';
                ctx.beginPath();
                ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2, false);
                ctx.fill();
                // 阴鱼（黑色左半）
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(0, 0, r, Math.PI / 2, -Math.PI / 2, false);
                ctx.fill();
                // 上方小黑半圆（阳中之阴）
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(0, -r / 2, r / 2, 0, Math.PI * 2);
                ctx.fill();
                // 下方小白半圆（阴中之阳）
                ctx.fillStyle = '#f8f8f8';
                ctx.beginPath();
                ctx.arc(0, r / 2, r / 2, 0, Math.PI * 2);
                ctx.fill();
                // 上小圆鱼眼（白）
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, -r / 2, r / 6, 0, Math.PI * 2);
                ctx.fill();
                // 下小圆鱼眼（黑）
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(0, r / 2, r / 6, 0, Math.PI * 2);
                ctx.fill();
                // 边缘金线
                ctx.strokeStyle = 'rgba(212,175,55,0.8)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();

                // ===== 呼吸光晕 =====
                const breath = 0.3 + Math.sin(t * 2) * 0.15;
                ctx.strokeStyle = `rgba(255, 215, 0, ${breath})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(player.x, player.y, baguaRadius + 5, 0, Math.PI * 2);
                ctx.stroke();
            } else if (currentSkinId === 'fashi') {
                // 法师：人形+法杖+魔法粒子
                ctx.fillStyle = skinColor;
                ctx.shadowBlur = 15;
                ctx.shadowColor = skinColor;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffe4c4';
                ctx.beginPath();
                ctx.arc(player.x, player.y - player.radius - 5, 8, 0, Math.PI * 2);
                ctx.fill();
                // 法杖
                ctx.strokeStyle = '#8b4513';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(player.x + 12, player.y - 25);
                ctx.lineTo(player.x + 12, player.y + 20);
                ctx.stroke();
                // 法杖顶端宝石
                ctx.fillStyle = skinColor;
                ctx.beginPath();
                ctx.arc(player.x + 12, player.y - 28, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                // 魔法粒子
                player.swordAngle = (player.swordAngle || 0) + 0.1;
                for (let i = 0; i < 4; i++) {
                    const angle = player.swordAngle + i * Math.PI / 2;
                    const px = player.x + Math.cos(angle) * 25;
                    const py = player.y + Math.sin(angle) * 25;
                    ctx.fillStyle = `rgba(155, 89, 182, ${0.5 + Math.sin(player.swordAngle + i) * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(px, py, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (currentSkinId === 'cike') {
                // 刺客：人形+双匕首+残影
                ctx.fillStyle = skinColor;
                ctx.shadowBlur = 8;
                ctx.shadowColor = skinColor;
                // 残影
                ctx.fillStyle = 'rgba(46, 204, 113, 0.3)';
                for (let i = 1; i <= 3; i++) {
                    ctx.beginPath();
                    ctx.arc(player.x - i * 5, player.y, player.radius - 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                // 主体
                ctx.fillStyle = skinColor;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffe4c4';
                ctx.beginPath();
                ctx.arc(player.x, player.y - player.radius - 5, 8, 0, Math.PI * 2);
                ctx.fill();
                // 双匕首
                ctx.strokeStyle = '#c0c0c0';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(player.x - 8, player.y - 5);
                ctx.lineTo(player.x - 15, player.y - 15);
                ctx.moveTo(player.x + 8, player.y - 5);
                ctx.lineTo(player.x + 15, player.y - 15);
                ctx.stroke();
                ctx.shadowBlur = 0;
            } else if (currentSkinId === 'shenlong') {
                // 神龙：龙形态+龙息
                ctx.fillStyle = skinColor;
                ctx.shadowBlur = 20;
                ctx.shadowColor = skinColor;
                // 龙身
                ctx.beginPath();
                ctx.ellipse(player.x, player.y, player.radius + 5, player.radius, 0, 0, Math.PI * 2);
                ctx.fill();
                // 龙头
                ctx.beginPath();
                ctx.arc(player.x + player.radius, player.y - 5, 8, 0, Math.PI * 2);
                ctx.fill();
                // 龙角
                ctx.strokeStyle = '#ffcc00';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(player.x + player.radius + 5, player.y - 12);
                ctx.lineTo(player.x + player.radius + 10, player.y - 20);
                ctx.moveTo(player.x + player.radius + 5, player.y - 2);
                ctx.lineTo(player.x + player.radius + 10, player.y + 5);
                ctx.stroke();
                // 龙息
                player.swordAngle = (player.swordAngle || 0) + 0.15;
                ctx.fillStyle = 'rgba(255, 100, 0, 0.6)';
                for (let i = 0; i < 3; i++) {
                    const px = player.x + player.radius + 15 + i * 8;
                    const py = player.y - 5 + Math.sin(player.swordAngle + i) * 3;
                    ctx.beginPath();
                    ctx.arc(px, py, 4 - i, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            } else if (currentSkinId === 'jiajia') {
                // 机甲：机械风格+科技光效
                ctx.fillStyle = '#2c3e50';
                ctx.shadowBlur = 10;
                ctx.shadowColor = skinColor;
                // 主体方形
                ctx.fillRect(player.x - player.radius, player.y - player.radius, player.radius * 2, player.radius * 2);
                // 科技光边
                ctx.strokeStyle = skinColor;
                ctx.lineWidth = 2;
                ctx.strokeRect(player.x - player.radius - 2, player.y - player.radius - 2, player.radius * 2 + 4, player.radius * 2 + 4);
                // 核心发光
                ctx.fillStyle = skinColor;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 6, 0, Math.PI * 2);
                ctx.fill();
                // 旋转光效
                player.swordAngle = (player.swordAngle || 0) + 0.05;
                for (let i = 0; i < 4; i++) {
                    const angle = player.swordAngle + i * Math.PI / 2;
                    const px = player.x + Math.cos(angle) * (player.radius + 5);
                    const py = player.y + Math.sin(angle) * (player.radius + 5);
                    ctx.fillStyle = skinColor;
                    ctx.beginPath();
                    ctx.arc(px, py, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }

            const barWidth = 36, barHeight = 5;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth, barHeight);
            const hpPercent = player.hp / player.maxHp;
            ctx.fillStyle = hpPercent > 0.5 ? '#22c55e' : (hpPercent > 0.25 ? '#eab308' : '#dc2626');
            ctx.fillRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth * hpPercent, barHeight);
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 1;
            ctx.strokeRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth, barHeight);
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                const distToPlayer = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                const sizeMod = sizeModifiers[enemy.sizeType];
                let scale = sizeMod.scale;
                if (enemy.isElite) scale *= eliteConfig.scale;
                if (enemy.isBoss) scale *= 1.8; // BOSS 体型加倍
                const scaledRadius = enemy.radius * scale;
                
                // 攻击范围圈
                if (distToPlayer < enemy.attackRange + 50 && playerAlive) {
                    ctx.strokeStyle = 'rgba(139, 0, 0, 0.15)';
                    ctx.fillStyle = 'rgba(139, 0, 0, 0.03)';
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, enemy.attackRange, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }

                // BOSS 底座光圈
                if (enemy.isBoss) {
                    const pulse = 0.4 + Math.sin(frameCount * 0.08) * 0.2;
                    ctx.fillStyle = `rgba(${parseInt(enemy.color.slice(1,3),16)},${parseInt(enemy.color.slice(3,5),16)},${parseInt(enemy.color.slice(5,7),16)},${pulse * 0.4})`;
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, scaledRadius * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 元素发光底色（精英/元素怪光晕）
                const aura = enemy.elementAffix ? enemy.elementAffix.color : null;
                if (aura) {
                    ctx.fillStyle = aura + '33';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = aura;
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, scaledRadius * 1.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // 精英金色发光底座
                if (enemy.isElite) {
                    const elitePulse = 0.5 + Math.sin(frameCount * 0.12) * 0.3;
                    ctx.strokeStyle = `rgba(255, 215, 0, ${elitePulse})`;
                    ctx.lineWidth = eliteConfig.borderWidth;
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, scaledRadius * 1.15, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                // 主图标：使用 emoji 渲染
                const emoji = enemy.emoji || '👾';
                const fontSize = Math.floor(scaledRadius * 2.4);
                ctx.font = `${fontSize}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 8;
                ctx.shadowColor = enemy.color;
                ctx.fillText(emoji, enemy.x, enemy.y);
                ctx.shadowBlur = 0;

                // 元素小图标（左上角）
                if (enemy.elementAffix) {
                    ctx.font = `${Math.floor(scaledRadius * 0.9)}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText(enemy.elementAffix.emoji, enemy.x - scaledRadius * 0.7, enemy.y - scaledRadius * 0.7);
                }

                // 体型标识 S/M/L
                const sizeColors = { 'S': '#90EE90', 'M': '#FFD700', 'L': '#FF6347' };
                ctx.fillStyle = sizeColors[enemy.sizeType];
                ctx.font = 'bold 10px SimSun';
                ctx.textAlign = 'left';
                ctx.fillText(enemy.sizeType, enemy.x - 4, enemy.y - scaledRadius - 18);

                // 血条（BOSS 多血条）
                const barWidth = enemy.isBoss ? 50 : 28;
                const barHeight = enemy.isBoss ? 6 : 4;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(enemy.x - barWidth/2, enemy.y - scaledRadius - 12, barWidth, barHeight);
                const hpPercent = enemy.hp / enemy.maxHp;
                let hpColor = hpPercent > 0.5 ? '#22c55e' : (hpPercent > 0.25 ? '#eab308' : '#dc2626');
                if (enemy.isBoss) {
                    hpColor = enemy.bossPhase === 3 ? '#ff1493' : (enemy.bossPhase === 2 ? '#FFA500' : '#22c55e');
                }
                ctx.fillStyle = hpColor;
                ctx.fillRect(enemy.x - barWidth/2, enemy.y - scaledRadius - 12, barWidth * hpPercent, barHeight);

                // BOSS 阶段标识
                if (enemy.isBoss) {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 10px SimSun';
                    ctx.textAlign = 'center';
                    ctx.fillText(`P${enemy.bossPhase}`, enemy.x, enemy.y - scaledRadius - 22);
                }
            });
        }

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        function drawProjectiles() {
            projectiles.forEach(p => {
                if (p.type === 'sword') {
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ffd700';
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 3, p.y - p.vy * 3);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 6, p.y - p.vy * 6);
                    ctx.stroke();
                } else if (p.type === 'tianGangSword') {
                    // 天罡剑阵飞剑：金色
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = p.color;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 4, p.y - p.vy * 4);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                } else if (p.type === 'wanJianSword') {
                    // 万剑归宗飞剑：蓝色
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = p.color;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 4, p.y - p.vy * 4);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = `rgba(0, 191, 255, 0.3)`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 7, p.y - p.vy * 7);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = '#8b0000';
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#8b0000';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 25;
                if (p.type === 'spark') {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = 'rgba(100, 100, 100, 0.5)';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            });
        }

        function drawDamageTexts() {
            damageTexts.forEach(d => {
                ctx.fillStyle = d.color;
                ctx.font = `bold ${d.fontSize || 14}px SimSun`;
                ctx.globalAlpha = d.life / 35;
                const prefix = d.fontSize > 14 ? '暴击 -' : '-';
                ctx.fillText(prefix + d.text, d.x - 12, d.y);
                ctx.globalAlpha = 1;
            });
        }

        function drawFloatingTexts() {
            floatingTexts.forEach(f => {
                ctx.fillStyle = f.color;
                ctx.font = 'bold 16px SimSun';
                ctx.globalAlpha = f.life / 40;
                ctx.fillText(f.text, f.x - 20, f.y);
                ctx.globalAlpha = 1;
            });
        }

        function updatePlayer() {
            if (!playerAlive) return;
            // 减速 Debuff：移动速度×0.5
            const moveSpeed = playerDebuffs.slow.timer > 0 ? player.moveSpeed * 0.5 : player.moveSpeed;

            // 手动移动优先
            if (player.isMoving) {
                const dx = player.targetX - player.x;
                const dy = player.targetY - player.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 3) {
                    player.x += (dx / dist) * moveSpeed;
                    player.y += (dy / dist) * moveSpeed;
                    player.facingAngle = Math.atan2(dy, dx);
                } else {
                    player.isMoving = false;
                }
            } else {
                // 自动追踪最近的敌人
                if (enemies.length > 0) {
                    let nearestEnemy = null;
                    let nearestDist = Infinity;
                    
                    enemies.forEach(enemy => {
                        const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                        if (dist < nearestDist) {
                            nearestDist = dist;
                            nearestEnemy = enemy;
                        }
                    });

                    // 如果敌人不在攻击范围内，向其移动
                    if (nearestEnemy && nearestDist > player.attackRange) {
                        const dx = nearestEnemy.x - player.x;
                        const dy = nearestEnemy.y - player.y;
                        const dist = Math.hypot(dx, dy);
                        player.facingAngle = Math.atan2(dy, dx);
                        
                        // 计算移动距离（不能超出雷达边界）
                        let moveX = (dx / dist) * moveSpeed;
                        let moveY = (dy / dist) * moveSpeed;
                        
                        const newX = player.x + moveX;
                        const newY = player.y + moveY;
                        const centerDist = Math.hypot(newX - centerX, newY - centerY);
                        
                        // 限制在雷达范围内移动
                        if (centerDist <= radarRadius - player.radius) {
                            player.x = newX;
                            player.y = newY;
                        } else {
                            // 如果要超出边界，向边界方向移动
                            const angle = Math.atan2(newY - centerY, newX - centerX);
                            player.x = centerX + Math.cos(angle) * (radarRadius - player.radius - 1);
                            player.y = centerY + Math.sin(angle) * (radarRadius - player.radius - 1);
                        }
                    }
                }
            }

            // 边界检查（防止卡在边缘）
            const centerDist = Math.hypot(player.x - centerX, player.y - centerY);
            if (centerDist > radarRadius - player.radius) {
                const angle = Math.atan2(player.y - centerY, player.x - centerX);
                player.x = centerX + Math.cos(angle) * (radarRadius - player.radius);
                player.y = centerY + Math.sin(angle) * (radarRadius - player.radius);
            }
        }

        function playerAutoAttack() {
            if (!playerAlive) return;
            player.attackTimer++;
            if (player.attackTimer >= player.attackInterval) {
                player.attackTimer = 0;
                let targetsInRange = [];
                enemies.forEach(enemy => {
                    const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (dist <= player.attackRange) targetsInRange.push(enemy);
                });
                targetsInRange.forEach((target, index) => {
                    setTimeout(() => {
                        if (playerAlive && enemies.includes(target)) createSwordQi(player, target, player.attackDamage);
                    }, index * 80);
                });
                // 神话技能 - 一念千击：普攻15%概率触发AOE
                if (activeMythicSkill && activeMythicSkill.id === 'yiNian' && Math.random() < activeMythicSkill.procChance) {
                    const aoeDmg = Math.floor(player.attackDamage * activeMythicSkill.damageMult);
                    enemies.forEach(e => {
                        e.hp -= aoeDmg;
                        createDamageText(e.x, e.y - 15, aoeDmg, true, false, '#FFD700');
                    });
                    enemies = enemies.filter(e => e.hp > 0);
                    createFloatingText(player.x, player.y - 50, '⚡一念千击!', '#FFD700');
                    createParticles(player.x, player.y, '#FFD700', 25);
                }
            }
        }

        function updateEnemies() {
            enemies.forEach(enemy => {
                // 冰封万里：冻结中的敌人不能移动和攻击
                const isFrozen = mythicSkillState.frozenTimer[enemy.id] > 0;
                // 时间停滞：全场敌人静止
                const isTimeStopped = mythicSkillState.timeStopActive;
                if (isFrozen || isTimeStopped) {
                    if (enemy.attackCooldown > 0) enemy.attackCooldown--;
                    return;
                }
                if (playerAlive) {
                    const distToPlayer = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (distToPlayer > enemy.attackRange - 10) {
                        const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                        enemy.x += Math.cos(angle) * enemy.moveSpeed;
                        enemy.y += Math.sin(angle) * enemy.moveSpeed;
                    }
                    if (distToPlayer <= enemy.attackRange && enemy.attackCooldown <= 0) {
                        createDemonQi(enemy, player, enemy.damage);
                        enemy.attackCooldown = enemy.attackSpeed;
                    }
                    // 怪物技能 AI
                    updateEnemySkills(enemy, distToPlayer);
                    // BOSS 阶段切换检查
                    if (enemy.isBoss) updateBossPhase(enemy);
                }
                if (enemy.attackCooldown > 0) enemy.attackCooldown--;
                if (enemy.skillCooldown > 0) enemy.skillCooldown--;
                // 神话技能：三昧真火 - 燃烧DOT伤害（每秒1次）
                if (enemy.burnTimer > 0 && enemy.burnStacks > 0) {
                    enemy.burnTimer--;
                    if (enemy.burnTimer % 60 === 59) {
                        const dmg = Math.floor(player.attackDamage * activeMythicSkill.damageMult * enemy.burnStacks);
                        enemy.hp -= dmg;
                        createDamageText(enemy.x, enemy.y - 15, dmg, true, false, '#FF4500'); // 燃烧橙色
                    }
                    if (enemy.burnTimer <= 0) {
                        enemy.burnStacks = 0;
                    }
                }
            });
        }

        // ===== 怪物技能 AI =====
        function updateEnemySkills(enemy, distToPlayer) {
            // 性能保护：敌人数量过多时禁用所有非BOSS技能
            const tooManyEnemies = enemies.length > 50;
            if (enemy.skillCooldown > 0) return;
            if (!playerAlive) return;
            // 新刷出的怪有 3 秒释放保护期（避免出生就放技能）
            if (typeof enemy.spawnFrame === 'undefined') enemy.spawnFrame = frameCount;
            if (frameCount - enemy.spawnFrame < 180) return;

            // 狼妖（general）：每 5 秒释放扇形 AOE
            if (enemy.type === 'general' && distToPlayer < 120 && !tooManyEnemies) {
                enemy.skillCooldown = 300; // 5秒
                enemyCastFanAttack(enemy);
                return;
            }
            // 鬼王（boss）：每 6 秒突进+震荡波
            if (enemy.type === 'boss' && distToPlayer < 200 && !tooManyEnemies) {
                enemy.skillCooldown = 360; // 6秒
                enemyCastShockwave(enemy);
                return;
            }
            // 妖皇（emperor）：每 12 秒召唤 2 只小妖（限场上小于30只时）
            if (enemy.type === 'emperor' && enemies.length < 30) {
                enemy.skillCooldown = 720; // 12秒
                enemyCastSummon(enemy, 2);
                return;
            }
            // 魔神（god）：每 7 秒射散弹
            if (enemy.type === 'god' && !tooManyEnemies) {
                enemy.skillCooldown = 420; // 7秒
                enemyCastShotgun(enemy);
                return;
            }
            // BOSS（isBoss）专属：阶段技能（BOSS 总是释放，但减弱召唤）
            if (enemy.isBoss) {
                enemy.skillCooldown = 240;
                if (enemy.bossPhase === 1) enemyCastShockwave(enemy);
                else if (enemy.bossPhase === 2 && enemies.length < 30) enemyCastSummon(enemy, 2);
                else enemyCastShotgun(enemy);
            }
        }

        // 怪物技能：扇形 AOE（狼妖）
        function enemyCastFanAttack(enemy) {
            createFloatingText(enemy.x, enemy.y - 25, '⚔️斩!', enemy.color);
            const baseAngle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
            for (let i = -1; i <= 1; i++) { // 从 5 道 → 3 道，减轻压力
                const a = baseAngle + i * 0.25;
                projectiles.push({
                    x: enemy.x, y: enemy.y,
                    vx: Math.cos(a) * 4, vy: Math.sin(a) * 4,
                    isPlayer: false, damage: Math.floor(enemy.damage * 0.7),
                    life: 50, type: 'demon',
                    element: enemy.element, elementAffix: enemy.elementAffix
                });
            }
        }

        // 怪物技能：震荡波（鬼王/BOSS阶段1）
        function enemyCastShockwave(enemy) {
            createFloatingText(enemy.x, enemy.y - 25, '💥波!', enemy.color);
            const count = 8; // 从 12 → 8 道，减轻压力
            for (let i = 0; i < count; i++) {
                const a = (Math.PI * 2 / count) * i;
                projectiles.push({
                    x: enemy.x, y: enemy.y,
                    vx: Math.cos(a) * 5, vy: Math.sin(a) * 5,
                    isPlayer: false, damage: Math.floor(enemy.damage * 0.8),
                    life: 40, type: 'demon',
                    element: enemy.element, elementAffix: enemy.elementAffix
                });
            }
            createParticles(enemy.x, enemy.y, enemy.color, 12);
