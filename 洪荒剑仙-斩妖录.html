        }

        // 怪物技能：召唤小妖（妖皇/BOSS阶段2）
        function enemyCastSummon(enemy, count) {
            createFloatingText(enemy.x, enemy.y - 25, '召唤!', enemy.color);
            for (let i = 0; i < count; i++) {
                const types = ['spirit', 'goblin'];
                const t = types[Math.floor(Math.random() * types.length)];
                const baby = spawnEnemy(t);
                if (baby) {
                    baby.x = enemy.x + (Math.random() - 0.5) * 60;
                    baby.y = enemy.y + (Math.random() - 0.5) * 60;
                    baby.skillCooldown = 600; // 召唤出来的小怪延迟放技能
                }
            }
            createParticles(enemy.x, enemy.y, '#9400D3', 8);
        }

        // 怪物技能：散弹（魔神/BOSS阶段3）
        function enemyCastShotgun(enemy) {
            createFloatingText(enemy.x, enemy.y - 25, '🌟弹!', enemy.color);
            const baseAngle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
            for (let i = -2; i <= 2; i++) { // 从 7 → 5 道
                const a = baseAngle + i * 0.15;
                projectiles.push({
                    x: enemy.x, y: enemy.y,
                    vx: Math.cos(a) * 6, vy: Math.sin(a) * 6,
                    isPlayer: false, damage: Math.floor(enemy.damage * 0.6),
                    life: 55, type: 'demon',
                    element: enemy.element, elementAffix: enemy.elementAffix
                });
            }
        }

        // 怪物死亡自爆（魔神特性）
        function enemyExplodeOnDeath(enemy) {
            if (enemy.type !== 'god') return;
            createFloatingText(enemy.x, enemy.y - 25, '💀爆!', '#DC143C');
            const count = 10; // 从 16 → 10
            for (let i = 0; i < count; i++) {
                const a = (Math.PI * 2 / count) * i;
                projectiles.push({
                    x: enemy.x, y: enemy.y,
                    vx: Math.cos(a) * 6, vy: Math.sin(a) * 6,
                    isPlayer: false, damage: Math.floor(enemy.damage * 0.5),
                    life: 45, type: 'demon',
                    element: enemy.element, elementAffix: enemy.elementAffix
                });
            }
            createParticles(enemy.x, enemy.y, '#DC143C', 20);
        }

        // ========== Tooltip系统 ==========

        const tooltip = document.getElementById('gameTooltip');

        // 显示tooltip
        function showTooltip(e, html) {
            tooltip.innerHTML = html;
            tooltip.style.display = 'block';
            moveTooltip(e);
        }

        // 移动tooltip
        function moveTooltip(e) {
            let x = e.clientX + 15;
            let y = e.clientY + 15;
            // 防止超出屏幕
            const rect = tooltip.getBoundingClientRect();
            if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - 10;
            if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - 10;
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        // 隐藏tooltip
        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        // 生成绿武tooltip HTML
        function buildWeaponTooltip(item) {
            if (!item || (item.type !== 'greenWeapon' && item.type !== 'lightGreenWeapon')) return '';
            const template = item.type === 'greenWeapon' ? greenWeapons[item.weaponId] : lightGreenWeapons[item.weaponId];
            if (!template) return '';

            const stageInfo = item.type === 'greenWeapon' ? weaponStages[item.stage] : null;
            const rating = item.scoreRating || getScoreRating(item.totalScore || 0);
            const qualityColors = { common: '#FFFFFF', fine: '#4169E1', excellent: '#9370DB', perfect: '#FFD700' };

            let html = `<div class="tt-title" style="color:${stageInfo ? stageInfo.color : '#90EE90'};">${item.name}</div>`;

            // 基础信息
            html += `<div class="tt-row"><span class="tt-label">类型</span><span class="tt-value">${item.type === 'greenWeapon' ? '深绿武器' : '浅绿武器'}</span></div>`;
            html += `<div class="tt-row"><span class="tt-label">职业</span><span class="tt-value">${template.class}</span></div>`;
            html += `<div class="tt-row"><span class="tt-label">等级</span><span class="tt-value">${item.level} / ${template.maxLevel}</span></div>`;

            // 经验
            if (item.type === 'greenWeapon') {
                const expPercent = item.expToNext > 0 ? Math.floor(item.exp / item.expToNext * 100) : 100;
                html += `<div class="tt-row"><span class="tt-label">经验</span><span class="tt-value">${item.exp} / ${item.expToNext} (${expPercent}%)</span></div>`;
            }

            // 攻击力
            const levelDiff = item.level - template.reqLevel;
            let minAtk = Math.floor(template.minAtk + template.growth * levelDiff);
            let maxAtk = Math.floor(template.maxAtk + template.growth * levelDiff);
            if (item.type === 'greenWeapon') {
                minAtk += item.totalBurstAtk || 0;
                maxAtk += item.totalBurstAtk || 0;
            }
            html += `<div class="tt-divider"></div>`;
            html += `<div class="tt-row"><span class="tt-label">攻击力</span><span class="tt-value gold">${minAtk} - ${maxAtk}</span></div>`;

            if (item.type === 'greenWeapon' && item.totalBurstAtk > 0) {
                html += `<div class="tt-row"><span class="tt-label">爆攻累计</span><span class="tt-value orange">+${item.totalBurstAtk}</span></div>`;
            }

            // 元素
            if (template.element) {
                const elemDmg = Math.floor((template.elementGrowth || 0) * levelDiff);
                html += `<div class="tt-row"><span class="tt-label">元素</span><span class="tt-value" style="color:#FF6347;">${template.element} +${elemDmg}</span></div>`;
            }

            // 进阶
            if (item.type === 'greenWeapon' && stageInfo) {
                html += `<div class="tt-divider"></div>`;
                html += `<div class="tt-row"><span class="tt-label">进阶</span><span class="tt-value" style="color:${stageInfo.color};">${stageInfo.name}</span></div>`;
                if (stageInfo.bonusPercent > 0) {
                    html += `<div class="tt-row"><span class="tt-label">进阶加成</span><span class="tt-value green">+${stageInfo.bonusPercent}%</span></div>`;
                }
            }

            // 耐久
            html += `<div class="tt-row"><span class="tt-label">耐久</span><span class="tt-value" style="color:${item.durability > item.maxDurability * 0.3 ? '#4CAF50' : '#FF4500'};">${item.durability} / ${item.maxDurability}</span></div>`;

            // 绑定
            if (item.bound) {
                html += `<div class="tt-row"><span class="tt-label">绑定</span><span class="tt-value orange">已认主</span></div>`;
            }

            // 词条
            if (item.inscriptions && item.inscriptions.length > 0) {
                html += `<div class="tt-divider"></div>`;
                html += `<div style="color:#888;font-size:11px;margin-bottom:3px;">词条 (${item.inscriptions.length}种):</div>`;
                item.inscriptions.forEach(ins => {
                    const typeDef = inscriptionTypes[ins.type];
                    const qColor = qualityColors[ins.quality] || '#FFFFFF';
                    const qName = inscriptionQualities[ins.quality] ? inscriptionQualities[ins.quality].name : '';
                    const maxVal = typeDef ? typeDef.maxValue : 0;
                    const pct = maxVal > 0 ? Math.floor(ins.value / maxVal * 100) : 0;
                    html += `<div class="tt-inscription"><span style="color:${qColor};">[${qName}]</span> ${typeDef ? typeDef.name : ins.type} <span style="color:#e8d5a3;">+${ins.value.toFixed(1)}${typeDef ? typeDef.unit : ''}</span> <span style="color:#666;">(${pct}%)</span></div>`;
                });
            }

            // 评分
            if (item.type === 'greenWeapon' && item.totalScore > 0) {
                html += `<div class="tt-score" style="color:${rating.color};">${item.totalScore}分 - ${rating.name} [${rating.title}]</div>`;
            }

            // 神话级技能
            if (item.mythicSkillId) {
                const skill = mythicSkills.find(s => s.id === item.mythicSkillId);
                if (skill) {
                    html += `<div class="tt-divider"></div>`;
                    html += `<div style="color:${skill.color};font-weight:bold;font-size:13px;margin-top:3px;">🌟 神话技能：${skill.icon} ${skill.name}</div>`;
                    html += `<div style="color:#ccc;font-size:11px;margin-top:2px;line-height:1.4;">${skill.desc}</div>`;
                }
            }

            return html;
        }

        // 生成普通装备tooltip HTML
        function buildEquipTooltip(item) {
            if (!item || !item.type || item.type === 'greenWeapon' || item.type === 'lightGreenWeapon') return '';
            const equipType = equipTypes[item.type];
            const quality = itemQualities[item.quality];
            if (!equipType || !quality) return '';

            let html = `<div class="tt-title" style="color:${quality.color};">${quality.name}${equipType.name}</div>`;
            html += `<div class="tt-row"><span class="tt-label">部位</span><span class="tt-value">${equipType.name}</span></div>`;
            html += `<div class="tt-row"><span class="tt-label">品质</span><span class="tt-value" style="color:${quality.color};">${quality.name}</span></div>`;
            html += `<div class="tt-row"><span class="tt-label">加成倍率</span><span class="tt-value gold">×${quality.bonus}</span></div>`;

            return html;
        }

        // 全局鼠标移动监听
        document.addEventListener('mousemove', (e) => {
            if (tooltip.style.display === 'block') {
                moveTooltip(e);
            }
        });

        // ========== 词条属性读取 ==========

        // 获取指定词条的总值
        function getInscriptionValue(type) {
            let total = 0;
            if (player.equippedWeapon && player.equippedWeapon.inscriptions) {
                player.equippedWeapon.inscriptions.forEach(ins => {
                    if (ins.type === type) total += ins.value;
                });
            }
            return total;
        }

        // 获取玩家锋利破防总值
        function getPlayerPierceDef() {
            return Math.floor(getInscriptionValue('pierceDef'));
        }

        // 获取暴击几率（百分比）
        function getPlayerCritChance() {
            let base = player.computedStats.crit || 0;
            return base + getInscriptionValue('critChance');
        }

        // 获取暴击伤害倍率
        function getPlayerCritDamage() {
            let base = player.computedStats.critDamage || 1.5;
            let bonus = getInscriptionValue('critDmg') / 100;
            return base + bonus;
        }

        // 获取体型增伤百分比
        function getSizeDamageBonus(sizeType) {
            const typeMap = { 'S': 'smallDmg', 'M': 'mediumDmg', 'L': 'largeDmg' };
            return getInscriptionValue(typeMap[sizeType] || '') / 100;
        }

        // 获取元素伤害总值
        function getElementalDamage(elementType) {
            const typeMap = { '火攻': 'fireDmg', '冰攻': 'iceDmg', '毒攻': 'poisonDmg' };
            return getInscriptionValue(typeMap[elementType] || '');
        }

        // 获取生命汲取百分比
        function getHpSteal() {
            return getInscriptionValue('hpSteal') / 100;
        }

        // 获取伤害减免百分比
        function getDmgReduce() {
            let base = player.computedStats.damageReduce || 0;
            let ins = getInscriptionValue('dmgReduce') / 100;
            return base + ins;
        }

        // 获取生命上限加成
        function getHpBonus() {
            return getInscriptionValue('hpBonus');
        }

        // 获取攻击速度加成百分比
        function getAtkSpeedBonus() {
            return getInscriptionValue('atkSpeed') / 100;
        }

        // 获取人物经验加成百分比
        function getExpBonus() {
            return getInscriptionValue('expBonus') / 100;
        }

        // 计算实际伤害（考虑防御、破防、暴击、体型增伤、元素伤害）
        function calcActualDamage(baseDamage, enemy) {
            let damage = baseDamage;

            // 1. 破防
            const pierceDef = getPlayerPierceDef();
            const actualDefense = Math.max(0, enemy.defense - pierceDef);
            damage = Math.max(1, damage - actualDefense);

            // 2. 体型增伤
            if (enemy.sizeType) {
                const sizeBonus = getSizeDamageBonus(enemy.sizeType);
                damage *= (1 + sizeBonus);
            }

            // 3. 暴击判定
            let isCrit = false;
            let critChance = getPlayerCritChance();
            // 神话技能 - 必杀一击：暴击概率+15%
            if (activeMythicSkill && activeMythicSkill.id === 'biSha') {
                critChance += activeMythicSkill.critChanceBonus * 100;
            }
            if (Math.random() * 100 < critChance) {
                isCrit = true;
                let critDmg = getPlayerCritDamage();
                // 神话技能 - 必杀一击：暴击伤害+50%
                if (activeMythicSkill && activeMythicSkill.id === 'biSha') {
                    critDmg += activeMythicSkill.critDamageBonus;
                }
                damage *= critDmg;
            }

            // 4. 元素伤害（武器自带 + 词条附加）
            let elementalDmg = 0;
            if (player.equippedWeapon) {
                const template = greenWeapons[player.equippedWeapon.weaponId];
                if (template && template.element) {
                    // 武器自带元素伤害（按等级成长）
                    const levelDiff = player.equippedWeapon.level - template.reqLevel;
                    elementalDmg = template.elementGrowth * levelDiff || 0;
                }
                // 词条附加元素伤害
                if (template && template.element) {
                    elementalDmg += getElementalDamage(template.element);
                }
            }
            damage += elementalDmg;

            // 6. 神话技能 - 天雷引感电增伤
            if (enemy.electrified && enemy.electrifyBonus) {
                damage *= (1 + enemy.electrifyBonus);
            }

            // 7. 神话技能 - 生生不息攻击加成
            if (activeMythicSkill && activeMythicSkill.id === 'shengSheng') {
                const stackBonus = mythicSkillState.stacks * activeMythicSkill.atkBonusPerStack;
                damage *= (1 + stackBonus);
            }

            // 8. 神话技能 - 血祭噬魂：下一击×3
            if (activeMythicSkill && activeMythicSkill.id === 'xueJi' && mythicSkillState.bloodBoost) {
                damage *= activeMythicSkill.damageMult;
                mythicSkillState.bloodBoost = false;
            }

            // 9. 神话技能 - 时间停滞：×2伤害
            if (activeMythicSkill && activeMythicSkill.id === 'shiJian' && mythicSkillState.timeStopActive) {
                damage *= 2;
            }

            // 最终伤害最低1
            damage = Math.max(1, Math.floor(damage));

            // 5. 生命汲取
            const hpSteal = getHpSteal();
            if (hpSteal > 0 && damage > 0) {
                const healAmount = Math.floor(damage * hpSteal);
                // 诅咒 Debuff：吸血归零
                if (healAmount > 0 && !(typeof playerDebuffs !== 'undefined' && playerDebuffs.curse.timer > 0)) {
                    player.hp = Math.min(player.maxHp, player.hp + healAmount);
                }
            }

            return { damage, isCrit };
        }

        function updateProjectiles() {
            projectiles = projectiles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.isPlayer) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        const dist = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                        if (dist < enemy.radius + 6) {
                            // 计算实际伤害（考虑防御、破防、暴击、体型增伤、元素伤害）
                            const result = calcActualDamage(p.damage, enemy);
                            enemy.hp -= result.damage;
                            createDamageText(enemy.x, enemy.y - 20, result.damage, true, result.isCrit);
                            createParticles(p.x, p.y, result.isCrit ? '#FF4500' : '#ffd700', result.isCrit ? 12 : 6);
                            // 神话技能：三昧真火 - 命中时叠加燃烧（只对普通剑气，不对天罡飞剑触发重复）
                            if (p.type === 'sword' || p.type === 'wanJianSword') {
                                applySanWeiBurn(enemy);
                            }
                            if (enemy.hp <= 0) {
                                createParticles(enemy.x, enemy.y, enemy.color, 18);
                                createFloatingText(enemy.x, enemy.y - 30, '斩!', '#ffd700');
                                score += enemy.score;
                                kills++;
                                enemies.splice(i, 1);
                                // 绿武系统：击杀处理（经验、耐久消耗）
                                onEnemyKilled(enemy);
                                // BOSS 击杀奖励
                                if (enemy.isBoss) {
                                    dropBossLoot(enemy);
                                }
                                // 精英怪：必掉装备 + 30% 上古石
                                else if (enemy.isElite) {
                                    const drop = generateRandomEquip();
                                    drop.quality = Math.min(4, (drop.quality || 0) + 1); // 品质+1
                                    addToBag(drop);
                                    createFloatingText(enemy.x, enemy.y - 50, `✨精英掉落!`, '#FFD700');
                                    if (Math.random() < 0.3) {
                                        addToBag({ type: 'ancientStone', count: 1 });
                                    }
                                }
                                // 普通掉落
                                else if (Math.random() < 0.3) {
                                    const drop = generateRandomEquip();
                                    addToBag(drop);
                                    createFloatingText(enemy.x, enemy.y - 50, `掉落${itemQualities[drop.quality].name}${equipTypes[drop.type].name}`, itemQualities[drop.quality].color);
                                }
                                updateUI();
                            }
                            return false;
                        }
                    }
                } else {
                    if (playerAlive) {
                        const dist = Math.hypot(p.x - player.x, p.y - player.y);
                        if (dist < player.radius + 6) {
                            // 神话技能：金刚不坏 - 护盾无敌
                            if (mythicSkillState.shieldActive) {
                                createFloatingText(player.x, player.y - 20, '免疫!', '#4169E1');
                                createParticles(p.x, p.y, '#4169E1', 8);
                                return false;
                            }
                            // 伤害减免
                            const dmgReduce = getDmgReduce();
                            let baseDmg = p.damage;
                            // 感电 Debuff：受伤+20%
                            if (playerDebuffs.shock.timer > 0) baseDmg *= 1.2;
                            const finalDamage = Math.max(1, Math.floor(baseDmg * (1 - dmgReduce)));
                            player.hp -= finalDamage;
                            createDamageText(player.x, player.y - 28, finalDamage, false);
                            createParticles(p.x, p.y, p.elementAffix ? p.elementAffix.color : '#8b0000', 6);
                            // 元素效果触发
                            if (p.elementAffix) {
                                applyElementEffectToPlayer(p.element, p.elementAffix);
                            }
                            updateUI();
                            if (player.hp <= 0) playerDied();
                            return false;
                        }
                    }
                }
                return p.life > 0;
            });
        }

        // 玩家元素 Debuff 状态
        let playerDebuffs = {
            burn:  { stacks: 0, timer: 0 }, // 燃烧：DOT伤害
            slow:  { timer: 0 },             // 减速
            shock: { timer: 0 },             // 感电：受伤+20%
            curse: { timer: 0 }              // 诅咒：回血归零
        };

        // 给玩家施加元素效果
        function applyElementEffectToPlayer(elemKey, affix) {
            if (!affix) return;
            switch (affix.effect) {
                case 'burn':
                    playerDebuffs.burn.stacks = Math.min(5, playerDebuffs.burn.stacks + 1);
                    playerDebuffs.burn.timer = 240; // 4秒
                    createFloatingText(player.x, player.y - 40, '🔥燃烧!', '#FF4500');
                    break;
                case 'slow':
                    playerDebuffs.slow.timer = 180; // 3秒
                    createFloatingText(player.x, player.y - 40, '❄️减速!', '#00BFFF');
                    break;
                case 'shock':
                    playerDebuffs.shock.timer = 180; // 3秒
                    createFloatingText(player.x, player.y - 40, '⚡感电!', '#FFD700');
                    break;
                case 'curse':
                    playerDebuffs.curse.timer = 300; // 5秒
                    createFloatingText(player.x, player.y - 40, '🌑诅咒!', '#9400D3');
                    break;
            }
        }

        // 每帧更新玩家元素 Debuff
        function updatePlayerDebuffs() {
            // 燃烧 DOT
            if (playerDebuffs.burn.timer > 0) {
                playerDebuffs.burn.timer--;
                if (playerDebuffs.burn.timer % 30 === 0) { // 每0.5秒一次伤害
                    const dotDmg = Math.max(1, Math.floor(player.maxHp * 0.005 * playerDebuffs.burn.stacks));
                    player.hp -= dotDmg;
                    createDamageText(player.x, player.y - 25, dotDmg, false, false, '#FF4500');
                    if (player.hp <= 0) playerDied();
                }
                if (playerDebuffs.burn.timer === 0) playerDebuffs.burn.stacks = 0;
            }
            if (playerDebuffs.slow.timer > 0) playerDebuffs.slow.timer--;
            if (playerDebuffs.shock.timer > 0) playerDebuffs.shock.timer--;
            if (playerDebuffs.curse.timer > 0) playerDebuffs.curse.timer--;
        }

        function playerDied() {
            // 神话技能：元神出窍 - 受到致命伤害时复活
            if (activeMythicSkill && activeMythicSkill.id === 'yuanShen' && !mythicSkillState.yuanShenUsed && mythicSkillState.cooldownTimer <= 0) {
                mythicSkillState.yuanShenUsed = true;
                mythicSkillState.cooldownTimer = activeMythicSkill.cooldown;
                player.hp = player.maxHp;
                // 清空场上敌人50%血量
                enemies.forEach(e => {
                    e.hp = Math.floor(e.hp * 0.5);
                });
                createFloatingText(player.x, player.y - 60, '👻元神出窍!', '#FFD700');
                createParticles(player.x, player.y, '#FFD700', 40);
                return; // 不执行死亡逻辑
            }

            playerAlive = false;
            // 生生不息：死亡清空层数
            if (mythicSkillState) mythicSkillState.stacks = 0;
            reviveTimer = 5;
            createParticles(player.x, player.y, '#ffd700', 35);
            createFloatingText(player.x, player.y - 40, '道消身殒', '#dc143c');
            document.getElementById('reviveOverlay').style.display = 'block';
            document.getElementById('reviveCountdown').textContent = reviveTimer;
            const countdownInterval = setInterval(() => {
                reviveTimer--;
                document.getElementById('reviveCountdown').textContent = reviveTimer;
                if (reviveTimer <= 0) {
                    clearInterval(countdownInterval);
                    revivePlayer();
                }
            }, 1000);
        }

        function revivePlayer() {
            playerAlive = true;
            player.hp = player.maxHp;
            player.x = centerX;
            player.y = centerY;
            player.targetX = centerX;
            player.targetY = centerY;
            player.isMoving = false;
            document.getElementById('reviveOverlay').style.display = 'none';
            updateUI();
            createParticles(player.x, player.y, '#ffd700', 25);
            createFloatingText(player.x, player.y - 30, '重塑肉身', '#22c55e');
            // 复活后重新刷新怪物
            enemies = [];
            projectiles = [];
            spawnWave();
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.94;
                p.vy *= 0.94;
                p.life--;
                return p.life > 0;
            });
        }

        function updateDamageTexts() {
            damageTexts = damageTexts.filter(d => {
                d.y -= 0.6;
                d.life--;
                return d.life > 0;
            });
        }

        function updateFloatingTexts() {
            floatingTexts = floatingTexts.filter(f => {
                f.y += f.vy;
                f.life--;
                return f.life > 0;
            });
        }

        // ========== 神话技能核心更新函数 ==========
        function updateMythicSkill() {
            if (!activeMythicSkill || !playerAlive) return;
            const s = mythicSkillState;

            // 冷却倒计时
            if (s.cooldownTimer > 0) s.cooldownTimer--;

            // 根据技能ID分别处理
            switch (activeMythicSkill.id) {
                // ================= 天罡剑阵 =================
                case 'tianGang':
                    if (s.cooldownTimer <= 0) {
                        if (s.durationTimer <= 0) {
                            // 启动剑阵：生成6把飞剑
                            s.durationTimer = activeMythicSkill.duration;
                            s.internalTimer = 0;
                            s.swords = [];
                            for (let i = 0; i < 6; i++) {
                                s.swords.push({
                                    angle: (i / 6) * Math.PI * 2,
                                    fired: false,
                                    x: 0, y: 0
                                });
                            }
                        }
                    }
                    if (s.durationTimer > 0) {
                        s.durationTimer--;
                        s.internalTimer++;
                        // 每秒发射1把飞剑
                        if (s.internalTimer % 60 === 0 && enemies.length > 0) {
                            const sword = s.swords.find(sw => !sw.fired);
                            if (sword) {
                                sword.fired = true;
                                const target = enemies[Math.floor(Math.random() * enemies.length)];
                                const ang = Math.atan2(target.y - player.y, target.x - player.x);
                                projectiles.push({
                                    x: player.x + Math.cos(sword.angle) * 45,
                                    y: player.y + Math.sin(sword.angle) * 45,
                                    vx: Math.cos(ang) * 9, vy: Math.sin(ang) * 9,
                                    isPlayer: true,
                                    damage: Math.floor(player.attackDamage * activeMythicSkill.damageMult),
                                    life: 90, angle: ang, type: 'tianGangSword', color: '#FFD700'
                                });
                                createParticles(player.x + Math.cos(sword.angle) * 45, player.y + Math.sin(sword.angle) * 45, '#FFD700', 5);
                            }
                        }
                        if (s.durationTimer <= 0) {
                            s.cooldownTimer = activeMythicSkill.cooldown;
                            s.swords = [];
                        }
                    }
                    break;

                // ================= 天雷引 =================
                case 'thunder':
                    if (s.cooldownTimer <= 0 && enemies.length > 0) {
                        s.cooldownTimer = activeMythicSkill.cooldown;
                        const target = enemies[Math.floor(Math.random() * enemies.length)];
                        // 造成伤害
                        const dmg = Math.floor(player.attackDamage * activeMythicSkill.damageMult);
                        target.hp -= dmg;
                        // 感电debuff：受伤害+20%，持续5秒
                        target.electrified = true;
                        target.electrifyTimer = activeMythicSkill.debuffDuration;
                        target.electrifyBonus = activeMythicSkill.damageTakenBonus;
                        createDamageText(target.x, target.y - 35, dmg, true, true); // true=暴击色
                        // 雷电特效
                        createParticles(target.x, target.y, '#9932CC', 20);
                        // 检查击杀
                        if (target.hp <= 0) {
                            enemies = enemies.filter(e => e !== target);
                            kills++;
                            score += target.score || 0;
                        }
                    }
                    // 更新敌人感电计时器
                    enemies.forEach(e => {
                        if (e.electrifyTimer > 0) {
                            e.electrifyTimer--;
                            if (e.electrifyTimer <= 0) {
                                e.electrified = false;
                                e.electrifyBonus = 0;
                            }
                        }
                    });
                    break;

                // ================= 金刚不坏 =================
                case 'jinGang':
                    if (s.cooldownTimer <= 0 && s.durationTimer <= 0) {
                        const hpPercent = player.hp / player.maxHp;
                        if (hpPercent <= 0.3) {
                            s.durationTimer = activeMythicSkill.duration;
                            s.shieldActive = true;
                            createFloatingText(player.x, player.y - 50, '金刚不坏!', '#4169E1');
                            createParticles(player.x, player.y, '#4169E1', 25);
                        }
                    }
                    if (s.durationTimer > 0) {
                        s.durationTimer--;
                        if (s.durationTimer <= 0) {
                            s.shieldActive = false;
                            s.cooldownTimer = activeMythicSkill.cooldown;
                        }
                    }
                    // 护盾激活时，伤害减免为100%（无敌）
                    break;

                // ================= 三昧真火 =================
                case 'sanWei':
                    // 每次玩家普攻（剑气发射时）给目标叠加燃烧
                    break;

                // ================= 冰封万里 =================
                case 'iceFreeze':
                    if (s.cooldownTimer <= 0) {
                        s.cooldownTimer = activeMythicSkill.cooldown;
                        // 冻结范围内所有敌人
                        let frozenCount = 0;
                        enemies.forEach(e => {
                            const dist = Math.hypot(e.x - player.x, e.y - player.y);
                            if (dist <= activeMythicSkill.range) {
                                s.frozenTimer[e.id] = activeMythicSkill.duration;
                                frozenCount++;
                            }
                        });
                        if (frozenCount > 0) {
                            createFloatingText(player.x, player.y - 50, `❄️冰封 ${frozenCount} 只!`, '#00CED1');
                            // 冰霜涟漪特效
                            createParticles(player.x, player.y, '#00CED1', 30);
                        }
                    }
                    // 更新冻结计时器
                    Object.keys(s.frozenTimer).forEach(id => {
                        const enemy = enemies.find(e => e.id == id);
                        if (!enemy) { delete s.frozenTimer[id]; return; }
                        s.frozenTimer[id]--;
                        if (s.frozenTimer[id] <= 0) {
                            delete s.frozenTimer[id];
                        }
                    });
                    break;

                // ================= 斩天一剑 =================
                case 'zhanTian':
                    if (s.cooldownTimer <= 0 && !s.slashFired) {
                        // 蓄力完成，释放斩击
                        s.slashFired = true;
                        const targetAngle = player.facingAngle;
                        const halfAngle = activeMythicSkill.angle / 2;
                        let hitCount = 0;
                        enemies.forEach(e => {
                            const dx = e.x - player.x;
                            const dy = e.y - player.y;
                            const dist = Math.hypot(dx, dy);
                            if (dist > 0) {
                                const angleToEnemy = Math.atan2(dy, dx);
                                let angleDiff = Math.abs(angleToEnemy - targetAngle);
                                if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;
                                if (angleDiff <= halfAngle) {
                                    const dmg = Math.floor(player.attackDamage * activeMythicSkill.damageMult);
                                    e.hp -= dmg;
                                    createDamageText(e.x, e.y - 30, dmg, true, true);
                                    hitCount++;
                                    if (e.hp <= 0) {
                                        createParticles(e.x, e.y, '#FF6347', 15);
                                        kills++;
                                        score += e.score || 0;
                                    }
                                }
                            }
                        });
                        if (hitCount > 0) {
                            createFloatingText(player.x, player.y - 60, '💥斩天!', '#FF6347');
                            createParticles(player.x, player.y, '#FF6347', 20);
                        }
                        enemies = enemies.filter(e => e.hp > 0);
                        s.cooldownTimer = activeMythicSkill.cooldown;
                        s.slashFired = false;
                    }
                    break;

                // ================= 生生不息 =================
                case 'shengSheng':
                    // 被动生效（无主动逻辑，层数在击杀时更新）
                    // 攻击加成：生生不息层数×每层2%
                    break;

                // ================= 轮回 =================
                case 'lunHui':
                    // 被动生效（无主动逻辑，CD重置在击杀时触发）
                    break;

                // ================= 一念千击 =================
                case 'yiNian':
                    // 被动：普攻15%触发，在playerAutoAttack中处理
                    break;

                // ================= 血祭噬魂 =================
                case 'xueJi':
                    // 被动：击杀30%触发下一击×3，在onEnemyKilled中处理
                    break;

                // ================= 空间撕裂 =================
                case 'kongJian':
                    if (s.cooldownTimer <= 0) {
                        s.cooldownTimer = activeMythicSkill.cooldown;
                        // 在玩家位置生成黑洞
                        s.blackHole = { x: player.x, y: player.y, timer: activeMythicSkill.duration };
                        createFloatingText(player.x, player.y - 50, '🌀空间撕裂!', '#8B008B');
                        createParticles(player.x, player.y, '#8B008B', 20);
                    }
                    // 更新黑洞
                    if (s.blackHole) {
                        s.blackHole.timer--;
                        // 吸引范围内敌人
                        enemies.forEach(e => {
                            const dx = s.blackHole.x - e.x;
                            const dy = s.blackHole.y - e.y;
                            const dist = Math.hypot(dx, dy);
                            if (dist <= activeMythicSkill.range && dist > 5) {
                                e.x += (dx / dist) * 2.5;
                                e.y += (dy / dist) * 2.5;
                            }
                        });
                        // 黑洞结束：爆炸
                        if (s.blackHole.timer <= 0) {
                            const dmg = Math.floor(player.attackDamage * activeMythicSkill.damageMult);
                            enemies.forEach(e => {
                                const dist = Math.hypot(e.x - s.blackHole.x, e.y - s.blackHole.y);
                                if (dist <= activeMythicSkill.range) {
                                    e.hp -= dmg;
                                    createDamageText(e.x, e.y - 15, dmg, true, false, '#8B008B');
                                }
                            });
                            enemies = enemies.filter(e => e.hp > 0);
                            createParticles(s.blackHole.x, s.blackHole.y, '#8B008B', 30);
                            s.blackHole = null;
                        }
                    }
                    break;

                // ================= 元神出窍 =================
                case 'yuanShen':
                    // 被动：在玩家受致命伤害时触发，见playerDied
                    break;

                // ================= 时间停滞 =================
                case 'shiJian':
                    if (s.cooldownTimer <= 0 && !s.timeStopActive) {
                        s.timeStopActive = true;
                        s.durationTimer = activeMythicSkill.duration;
                        createFloatingText(player.x, player.y - 50, '⏰时间停滞!', '#C0C0C0');
                        createParticles(player.x, player.y, '#C0C0C0', 25);
                    }
                    if (s.timeStopActive) {
                        s.durationTimer--;
                        if (s.durationTimer <= 0) {
                            s.timeStopActive = false;
                            s.cooldownTimer = activeMythicSkill.cooldown;
                        }
                    }
                    break;

                // ================= 必杀一击 =================
                case 'biSha':
                    // 被动：暴击加成在calcActualDamage中处理
                    break;

                // ================= 万剑归宗 =================
                case 'wanJian':
                    if (s.cooldownTimer <= 0 && enemies.length > 0) {
                        s.cooldownTimer = activeMythicSkill.cooldown;
                        const count = Math.min(activeMythicSkill.swordCount, enemies.length);
                        const targets = [];
                        const shuffled = [...enemies].sort(() => Math.random() - 0.5);
                        for (let i = 0; i < count; i++) targets.push(shuffled[i]);
                        targets.forEach(target => {
                            const ang = Math.atan2(target.y - player.y, target.x - player.x);
                            projectiles.push({
                                x: player.x, y: player.y,
                                vx: Math.cos(ang) * 10, vy: Math.sin(ang) * 10,
                                isPlayer: true,
                                damage: Math.floor(player.attackDamage * activeMythicSkill.damageMult),
                                life: 60, angle: ang, type: 'wanJianSword', color: '#00BFFF'
                            });
                        });
                        createParticles(player.x, player.y, '#00BFFF', 15);
                    }
                    break;
            }
        }

        // 三昧真火：攻击命中敌人时触发
        function applySanWeiBurn(target) {
            if (!activeMythicSkill || activeMythicSkill.id !== 'sanWei') return;
            if (!target.burnStacks) target.burnStacks = 0;
            if (!target.burnTimer) target.burnTimer = 0;
            target.burnStacks = Math.min(target.burnStacks + 1, activeMythicSkill.stackMax);
            target.burnTimer = activeMythicSkill.duration;
        }

        // 渲染神话技能视觉效果
        function drawMythicSkill() {
            if (!activeMythicSkill || !playerAlive) return;
            const s = mythicSkillState;

            switch (activeMythicSkill.id) {
                // 天罡剑阵渲染
                case 'tianGang':
                    if (s.durationTimer > 0 && s.swords.length > 0) {
                        const time = frameCount * 0.02;
                        s.swords.forEach((sword, i) => {
                            if (!sword.fired) {
                                const ang = sword.angle + time;
                                const sx = player.x + Math.cos(ang) * 45;
                                const sy = player.y + Math.sin(ang) * 45;
                                ctx.strokeStyle = '#FFD700';
                                ctx.lineWidth = 3;
                                ctx.shadowBlur = 10;
                                ctx.shadowColor = '#FFD700';
                                ctx.beginPath();
                                ctx.moveTo(sx - 12, sy);
                                ctx.lineTo(sx + 12, sy);
                                ctx.stroke();
                                ctx.shadowBlur = 0;
                            }
                        });
                    }
                    break;

                // 金刚不坏渲染
                case 'jinGang':
                    if (s.shieldActive) {
                        ctx.strokeStyle = '#4169E1';
                        ctx.lineWidth = 3;
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = '#4169E1';
                        ctx.beginPath();
                        ctx.arc(player.x, player.y, player.radius + 12, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.fillStyle = 'rgba(65, 105, 225, 0.15)';
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                    break;

                // 三昧真火渲染
                case 'sanWei':
                    enemies.forEach(e => {
                        if (e.burnStacks > 0 && e.burnTimer > 0) {
                            for (let i = 0; i < e.burnStacks; i++) {
                                const ox = (Math.random() - 0.5) * e.radius;
                                const oy = -e.radius - Math.random() * 8;
                                ctx.fillStyle = `rgba(255, ${60 + Math.random() * 40}, 0, 0.8)`;
                                ctx.beginPath();
                                ctx.arc(e.x + ox, e.y + oy, 2 + Math.random(), 0, Math.PI * 2);
                                ctx.fill();
                            }
                        }
                    });
                    break;

                // 天雷引渲染
                case 'thunder':
                    enemies.forEach(e => {
                        if (e.electrified) {
                            ctx.strokeStyle = '#9932CC';
                            ctx.lineWidth = 2;
                            ctx.shadowBlur = 8;
                            ctx.shadowColor = '#9932CC';
                            const t = frameCount * 0.1;
                            for (let i = 0; i < 4; i++) {
                                const ang = t + (i / 4) * Math.PI * 2;
                                const r = e.radius + 5;
                                ctx.beginPath();
                                ctx.moveTo(e.x + Math.cos(ang) * r, e.y + Math.sin(ang) * r);
                                ctx.lineTo(e.x + Math.cos(ang + 0.3) * (r + 8), e.y + Math.sin(ang + 0.3) * (r + 8));
                                ctx.stroke();
                            }
                            ctx.shadowBlur = 0;
                        }
                    });
                    break;

                // 冰封万里渲染
                case 'iceFreeze':
                    enemies.forEach(e => {
                        if (s.frozenTimer[e.id] > 0) {
                            const pulse = 0.3 + Math.sin(frameCount * 0.15) * 0.2;
                            ctx.strokeStyle = `rgba(0, 206, 209, ${pulse})`;
                            ctx.lineWidth = 3;
                            ctx.shadowBlur = 12;
                            ctx.shadowColor = '#00CED1';
                            ctx.beginPath();
                            ctx.arc(e.x, e.y, e.radius + 4, 0, Math.PI * 2);
                            ctx.stroke();
                            ctx.fillStyle = `rgba(173, 216, 230, ${pulse * 0.3})`;
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }
                    });
                    break;

                // 斩天一剑渲染
                case 'zhanTian':
                    // 蓄力进度：显示能量条
                    if (s.cooldownTimer > 0 && s.cooldownTimer > activeMythicSkill.cooldown * 0.3) {
                        const progress = 1 - (s.cooldownTimer / activeMythicSkill.cooldown);
                        const chargeX = player.x - 25; const chargeY = player.y - player.radius - 22;
                        ctx.fillStyle = 'rgba(0,0,0,0.7)';
                        ctx.fillRect(chargeX, chargeY, 50, 6);
                        ctx.fillStyle = '#FF6347';
                        ctx.fillRect(chargeX, chargeY, 50 * progress, 6);
                        ctx.strokeStyle = '#FF6347';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(chargeX, chargeY, 50, 6);
                    }
                    break;

                // 生生不息渲染：显示层数光环
                case 'shengSheng':
                    if (s.stacks > 0) {
                        const pulse = 0.3 + Math.sin(frameCount * 0.08) * 0.2;
                        for (let i = 0; i < Math.min(s.stacks, 5); i++) {
                            const ang = (i / 5) * Math.PI * 2 + frameCount * 0.02;
                            const r = player.radius + 8 + i * 4;
                            ctx.fillStyle = `rgba(50, 205, 50, ${pulse - i * 0.04})`;
                            ctx.shadowBlur = 8;
                            ctx.shadowColor = '#32CD32';
                            ctx.beginPath();
                            ctx.arc(player.x + Math.cos(ang) * r * 0.5, player.y + Math.sin(ang) * r * 0.5, 3, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        // 层数文字
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#32CD32';
                        ctx.font = 'bold 10px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(`${s.stacks}`, player.x, player.y + 4);
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 2;
                        ctx.strokeText(`${s.stacks}`, player.x, player.y + 4);
                        ctx.fillText(`${s.stacks}`, player.x, player.y + 4);
                    }
                    break;

                // 轮回渲染：被动无视觉
                case 'lunHui':
                    break;

                // 一念千击渲染：被动无持续视觉
                case 'yiNian':
                    break;

                // 血祭噬魂渲染：激活时剑身染血
                case 'xueJi':
                    if (s.bloodBoost) {
                        ctx.strokeStyle = '#DC143C';
                        ctx.lineWidth = 3;
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = '#DC143C';
                        ctx.beginPath();
                        ctx.arc(player.x, player.y, player.radius + 5, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                    break;

                // 空间撕裂渲染：黑洞
                case 'kongJian':
                    if (s.blackHole) {
                        const bh = s.blackHole;
                        const pulse = 0.5 + Math.sin(frameCount * 0.2) * 0.3;
                        // 黑洞核心
                        ctx.fillStyle = `rgba(20, 0, 20, ${pulse})`;
                        ctx.beginPath();
                        ctx.arc(bh.x, bh.y, 20, 0, Math.PI * 2);
                        ctx.fill();
                        // 紫色漩涡
                        ctx.strokeStyle = `rgba(139, 0, 139, ${pulse})`;
                        ctx.lineWidth = 2;
                        ctx.shadowBlur = 12;
                        ctx.shadowColor = '#8B008B';
                        for (let i = 0; i < 3; i++) {
                            const ang = frameCount * 0.05 + (i / 3) * Math.PI * 2;
                            ctx.beginPath();
                            ctx.arc(bh.x, bh.y, 15 + i * 12, ang, ang + Math.PI * 0.8);
                            ctx.stroke();
                        }
                        ctx.shadowBlur = 0;
                    }
                    break;

                // 元神出窍渲染：被动无持续视觉
                case 'yuanShen':
                    break;

                // 时间停滞渲染：画面变灰+玩家发光
                case 'shiJian':
                    if (s.timeStopActive) {
                        // 全屏灰色半透明遮罩
                        ctx.fillStyle = 'rgba(100, 100, 120, 0.15)';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        // 玩家金色光环
                        ctx.strokeStyle = '#C0C0C0';
                        ctx.lineWidth = 2;
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = '#fff';
                        ctx.beginPath();
                        ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                    break;

                // 必杀一击渲染：暴击光环
                case 'biSha':
                    const critPulse = 0.3 + Math.sin(frameCount * 0.1) * 0.2;
                    ctx.strokeStyle = `rgba(255, 20, 147, ${critPulse})`;
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#FF1493';
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.radius + 6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    break;

                // 万剑归宗渲染：被动无持续视觉（飞剑在projectiles中渲染）
                case 'wanJian':
                    break;
            }

            // 技能状态显示（屏幕左下角）
            const cdX = 15; const cdY = canvas.height - 35;
            // 被动技能（无CD）：显示常驻标签
            const passiveSkills = ['shengSheng', 'yiNian', 'xueJi', 'biSha', 'lunHui'];
            if (passiveSkills.includes(activeMythicSkill.id)) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(cdX - 2, cdY - 18, 110, 28);
                ctx.strokeStyle = activeMythicSkill.color;
                ctx.lineWidth = 1;
                ctx.strokeRect(cdX - 2, cdY - 18, 110, 28);
                ctx.fillStyle = activeMythicSkill.color;
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`${activeMythicSkill.icon} ${activeMythicSkill.name}`, cdX, cdY - 5);
                // 生生不息额外显示层数
                if (activeMythicSkill.id === 'shengSheng') {
                    ctx.fillStyle = s.stacks > 0 ? '#fff' : '#666';
                    ctx.font = '11px sans-serif';
                    ctx.fillText(`层数: ${s.stacks}/${activeMythicSkill.stackMax}`, cdX, cdY + 8);
                } else if (activeMythicSkill.id === 'xueJi' && s.bloodBoost) {
                    ctx.fillStyle = '#DC143C';
                    ctx.font = '11px sans-serif';
                    ctx.fillText('🩸蓄力中!', cdX, cdY + 8);
                } else {
                    ctx.fillStyle = '#888';
                    ctx.font = '11px sans-serif';
                    ctx.fillText('被动', cdX, cdY + 8);
                }
            }
            // 元神出窍：显示是否可用
            else if (activeMythicSkill.id === 'yuanShen') {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(cdX - 2, cdY - 18, 110, 28);
                ctx.strokeStyle = activeMythicSkill.color;
                ctx.lineWidth = 1;
                ctx.strokeRect(cdX - 2, cdY - 18, 110, 28);
                ctx.fillStyle = activeMythicSkill.color;
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`${activeMythicSkill.icon} ${activeMythicSkill.name}`, cdX, cdY - 5);
                ctx.fillStyle = s.yuanShenUsed ? '#666' : '#FFD700';
                ctx.font = '11px sans-serif';
                ctx.fillText(s.yuanShenUsed ? '已使用' : '就绪', cdX, cdY + 8);
            }
            // 主动技能：显示CD进度条
            else if (s.cooldownTimer > 0) {
                const cdPercent = s.cooldownTimer / activeMythicSkill.cooldown;
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(cdX, cdY, 80, 8);
                ctx.fillStyle = activeMythicSkill.color;
                ctx.fillRect(cdX, cdY, 80 * (1 - cdPercent), 8);
                ctx.strokeStyle = activeMythicSkill.color;
                ctx.lineWidth = 1;
                ctx.strokeRect(cdX, cdY, 80, 8);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`${activeMythicSkill.icon} ${activeMythicSkill.name}`, cdX, cdY - 5);
            }
            // 主动技能CD就绪
            else {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(cdX - 2, cdY - 18, 110, 28);
                ctx.strokeStyle = activeMythicSkill.color;
                ctx.lineWidth = 1;
                ctx.strokeRect(cdX - 2, cdY - 18, 110, 28);
                ctx.fillStyle = activeMythicSkill.color;
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`${activeMythicSkill.icon} ${activeMythicSkill.name}`, cdX, cdY - 5);
                ctx.fillStyle = '#0f0';
                ctx.font = '11px sans-serif';
                ctx.fillText('就绪', cdX, cdY + 8);
            }
        }

        function updateUI() {
            document.getElementById('playerLevel').textContent = player.playerLevel;
            document.getElementById('playerHp').textContent = Math.max(0, Math.floor(player.hp));
            document.getElementById('playerMaxHp').textContent = player.maxHp;
            document.getElementById('kills').textContent = kills;
            document.getElementById('wave').textContent = wave;
            document.getElementById('score').textContent = score;
        }

        // 皮肤选择UI
        function updateSkinPanel() {
            const skinList = document.getElementById('skinList');
            if (!skinList) return;
            skinList.innerHTML = '';
            Object.values(playerSkins).forEach(skin => {
                const div = document.createElement('div');
                div.style.cssText = `display:flex;align-items:center;justify-content:space-between;padding:8px;margin:5px 0;background:${skin.id === currentSkinId ? 'rgba(255,215,0,0.2)' : 'rgba(50,50,50,0.8)'};border:1px solid ${skin.id === currentSkinId ? '#ffd700' : '#555'};border-radius:4px;cursor:pointer;`;
                div.innerHTML = `<div><span style="color:${skin.color};font-weight:bold;">${skin.name}</span><span style="color:#888;font-size:11px;margin-left:8px;">${skin.desc}</span></div><span style="color:${skin.id === currentSkinId ? '#ffd700' : '#888'};">${skin.id === currentSkinId ? '✓ 使用中' : (skin.unlocked ? '点击选择' : '🔒')}</span>`;
                if (skin.unlocked && skin.id !== currentSkinId) {
                    div.onclick = () => {
                        currentSkinId = skin.id;
                        localStorage.setItem('playerSkin', skin.id);
                        updateSkinPanel();
                    };
                }
                skinList.appendChild(div);
            });
        }

        canvas.addEventListener('click', (e) => {
            if (!playerAlive) return;
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            const dist = Math.hypot(clickX - centerX, clickY - centerY);
            if (dist <= radarRadius) {
                player.targetX = clickX;
                player.targetY = clickY;
                player.isMoving = true;
            }
        });

        // 装备栏交互
        const equipBtn = document.getElementById('equipBtn');
        const equipPanel = document.getElementById('equipPanel');
        const closeEquip = document.getElementById('closeEquip');

        equipBtn.addEventListener('click', () => {
            equipPanel.style.display = 'block';
            updateEquipPanel();
        });

        closeEquip.addEventListener('click', () => {
            equipPanel.style.display = 'none';
        });

        // 点击装备栏外部关闭
        equipPanel.addEventListener('click', (e) => {
            if (e.target === equipPanel) {
                equipPanel.style.display = 'none';
            }
        });

        // 皮肤面板交互
        const skinBtn = document.getElementById('skinBtn');
        const skinPanel = document.getElementById('skinPanel');
        const closeSkin = document.getElementById('closeSkin');
        skinBtn.addEventListener('click', () => {
            skinPanel.style.display = 'block';
            updateSkinPanel();
        });
        closeSkin.addEventListener('click', () => skinPanel.style.display = 'none');
        skinPanel.addEventListener('click', (e) => {
            if (e.target === skinPanel) skinPanel.style.display = 'none';
        });

        // 更新装备栏显示
        // 更新上古石显示
        function updateAncientStoneDisplay() {
            const slot = document.getElementById('ancientStoneSlot');
            const countEl = document.getElementById('ancientStoneCount');
            if (ancientStone.count > 0) {
                slot.innerHTML = '🗿';
                slot.style.boxShadow = '0 0 15px #FF8C00, inset 0 0 10px rgba(255,140,0,0.3)';
                countEl.textContent = ancientStone.count;
                countEl.style.color = '#FFD700';
            } else {
                slot.innerHTML = '';
                slot.style.boxShadow = '0 0 10px rgba(255,140,0,0.3)';
                countEl.textContent = '0';
                countEl.style.color = '#FF8C00';
            }
        }

        // 上古石槽位交互
        document.getElementById('ancientStoneSlot').addEventListener('click', () => {
            // 从背包取出上古石放入槽位
            if (ancientStone.count < ancientStone.maxStack) {
                // 查找背包中的上古石
                const bagIndex = bag.items.findIndex(item => item && item.type === 'ancientStone');
                if (bagIndex >= 0) {
                    const item = bag.items[bagIndex];
                    const addCount = Math.min(item.count, ancientStone.maxStack - ancientStone.count);
                    ancientStone.count += addCount;
                    item.count -= addCount;
                    if (item.count <= 0) {
                        bag.items.splice(bagIndex, 1);
                    }
                    createFloatingText(player.x, player.y - 40, `放入${addCount}个上古石`, '#FF8C00');
                    updateAncientStoneDisplay();
                    updateBagDisplay();
                }
            }
        });
        // 右键取出上古石到背包
        document.getElementById('ancientStoneSlot').addEventListener('contextmenu', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (ancientStone.count > 0) {
                // 检查背包空间
                const existingStone = bag.items.find(item => item && item.type === 'ancientStone');
                let canAdd = true;
                if (!existingStone && bag.items.length >= bag.maxSize) {
                    createFloatingText(player.x, player.y - 40, '背包已满!', '#ff0000');
                    return;
                }
                const takeCount = Math.min(ancientStone.count, 100);
                ancientStone.count -= takeCount;
                // 放入背包
                if (existingStone) {
                    existingStone.count += takeCount;
                } else {
                    bag.items.push({ type: 'ancientStone', name: '上古石', count: takeCount, icon: '🗿' });
                }
                createFloatingText(player.x, player.y - 40, `取出${takeCount}个上古石`, '#FF8C00');
                updateAncientStoneDisplay();
                updateBagDisplay();
            }
        });

        function updateEquipPanel() {
            const weapon = player.equippedWeapon;
            const content = document.getElementById('weaponInfoContent');
            const weaponSlot = document.getElementById('weaponSlot');

            if (!weapon) {
                content.innerHTML = '<div style="color:#888;">未装备武器</div>';
                weaponSlot.style.borderColor = '#666';
                weaponSlot.style.boxShadow = 'none';
                weaponSlot.innerHTML = '🗡️';
                return;
            }

            // 更新武器槽外观
            let stageColor = '#2E8B57';
            if (weapon.type === 'greenWeapon' && weapon.stage > 0) {
                stageColor = weaponStages[weapon.stage].color;
            } else if (weapon.type === 'lightGreenWeapon') {
                stageColor = '#90EE90';
            }
            weaponSlot.style.borderColor = stageColor;
            weaponSlot.style.boxShadow = '0 0 10px ' + stageColor;
            
            // 计算攻击力
            let atkInfo = calcWeaponAtk(weapon);
            let isDeepGreen = weapon.type === 'greenWeapon';
            let template = isDeepGreen ? greenWeapons[weapon.weaponId] : lightGreenWeapons[weapon.weaponId];
            
            // 显示武器图标（图片或emoji）
            if (template && template.icon) {
                weaponSlot.innerHTML = `<img src="${template.icon}" style="width:40px;height:40px;object-fit:contain;" alt="${template.name}">`;
            } else {
                weaponSlot.innerHTML = '🗡️';
            }

            let html = '';
            // 武器名称
            html += `<div style="font-size:18px;color:${stageColor};margin-bottom:8px;font-weight:bold;">${weapon.name}</div>`;

            // 等级和经验
            html += `<div style="margin-bottom:4px;font-size:13px;">等级: <span style="color:#fff;">${weapon.level}</span>/${template ? template.maxLevel : '?'}</div>`;
            let expPercent = weapon.expToNext > 0 ? (weapon.exp / weapon.expToNext * 100) : 0;
            html += `<div style="margin-bottom:4px;font-size:13px;">经验: ${weapon.exp}/${weapon.expToNext}</div>`;
            html += `<div style="width:100%;height:8px;background:#333;border-radius:4px;margin:5px 0 10px 0;overflow:hidden;">
                <div style="width:${expPercent}%;height:100%;background:linear-gradient(90deg,#90EE90,#4CAF50);transition:width 0.3s;"></div>
            </div>`;

            // 攻击力
            html += `<div style="margin-bottom:3px;font-size:13px;">基础攻击: <span style="color:#FF6347;">${atkInfo.minAtk}~${atkInfo.maxAtk}</span></div>`;
            html += `<div style="margin-bottom:3px;font-size:13px;">最终攻击: <span style="color:#FF4500;font-weight:bold;">${atkInfo.finalMinAtk}~${atkInfo.finalMaxAtk}</span></div>`;

            // 爆攻（仅深绿）
            if (isDeepGreen) {
                html += `<div style="margin-bottom:3px;font-size:13px;">爆攻: <span style="color:#FF8C00;">+${weapon.totalBurstAtk}</span>/60</div>`;
            }

            // 耐久
            let duraColor = weapon.durability > weapon.maxDurability * 0.3 ? '#22c55e' : '#dc2626';
            html += `<div style="margin-bottom:3px;font-size:13px;">耐久: <span style="color:${duraColor};">${weapon.durability}</span>/${weapon.maxDurability}</div>`;

            // 进阶（仅深绿）
            if (isDeepGreen) {
                let stageName = weaponStages[weapon.stage].name;
                let nextReq = stageRequirements[weapon.stage + 1];
                html += `<div style="margin-bottom:3px;font-size:13px;">进阶: <span style="color:${stageColor};">${stageName}</span>`;
                if (nextReq && weapon.level < nextReq.reqLevel) {
                    html += ` <span style="color:#888;font-size:11px;">(需${nextReq.reqLevel}级)</span>`;
                } else if (nextReq) {
                    html += ` <span style="color:#FFD700;font-size:11px;">(可进阶 ${Math.floor(nextReq.successRate*100)}%)</span>`;
                }
                html += `</div>`;
            }

            // 绑定状态
            html += `<div style="margin-bottom:3px;font-size:13px;">绑定: <span style="color:${weapon.bound ? '#FFD700' : '#888'};">${weapon.bound ? '已认主' : '未绑定'}</span></div>`;

            // 元素属性
            if (template && template.element) {
                let elemColor = template.element === '火攻' ? '#FF4500' : (template.element === '冰攻' ? '#00BFFF' : '#32CD32');
                html += `<div style="margin-bottom:3px;font-size:13px;">元素: <span style="color:${elemColor};">${template.element}</span></div>`;
            }

            // 武器评分
            if (isDeepGreen) {
                let rating = weapon.scoreRating || getScoreRating(weapon.totalScore || 0);
                let bonusText = '';
                if (rating.bonus) {
                    let bonuses = [];
                    if (rating.bonus.atkBonus > 0) bonuses.push(`物攻+${(rating.bonus.atkBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.hpBonus > 0) bonuses.push(`生命+${(rating.bonus.hpBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.critBonus > 0) bonuses.push(`暴击+${(rating.bonus.critBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.dmgReduceBonus > 0) bonuses.push(`减伤+${(rating.bonus.dmgReduceBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.elementBonus > 0) bonuses.push(`元素+${(rating.bonus.elementBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.playerExpBonus > 0) bonuses.push(`人物经验+${(rating.bonus.playerExpBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.weaponExpBonus > 0) bonuses.push(`武具经验+${(rating.bonus.weaponExpBonus * 100).toFixed(0)}%`);
                    if (bonuses.length > 0) bonusText = ` <span style="color:#4CAF50;">(${bonuses.join(', ')})</span>`;
                }
                html += `<div style="margin-top:8px;border-top:1px solid #333;padding-top:5px;font-size:13px;">
                    <div style="color:#d4af37;">武器评分: <span style="color:${rating.color};font-weight:bold;font-size:16px;">${weapon.totalScore || 0}</span> <span style="color:${rating.color};">[${rating.name}]</span></div>
                    <div style="color:${rating.color};font-size:14px;font-weight:bold;">称号: ${rating.title}${bonusText}</div>
                </div>`;
            }

            // 神话技能展示
            if (isDeepGreen && weapon.mythicSkillId) {
                const skill = mythicSkills.find(s => s.id === weapon.mythicSkillId);
                if (skill) {
                    html += `<div style="margin-top:8px;border-top:2px solid ${skill.color};padding-top:8px;background:rgba(${parseInt(skill.color.slice(1,3),16)},${parseInt(skill.color.slice(3,5),16)},${parseInt(skill.color.slice(5,7),16)},0.1);padding:8px;border-radius:4px;">
                        <div style="color:${skill.color};font-weight:bold;font-size:14px;">🌟 神话技能：${skill.icon} ${skill.name}</div>
                        <div style="color:#ccc;font-size:11px;margin-top:4px;line-height:1.5;">${skill.desc}</div>
                    </div>`;
                }
            }

            // 词条（仅深绿）
            if (isDeepGreen && weapon.inscriptions && weapon.inscriptions.length > 0) {
                html += `<div style="margin-top:8px;border-top:1px solid #333;padding-top:5px;color:#d4af37;font-size:14px;">词条 (${weapon.inscriptions.length}种):</div>`;
                weapon.inscriptions.forEach((ins, idx) => {
                    let typeDef = inscriptionTypes[ins.type];
                    let scoreGrade = getScoreGrade(ins.score);
                    html += `<div style="color:${scoreGrade.color};font-size:12px;margin:2px 0 2px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">[${scoreGrade.name}] ${typeDef.name} +${ins.value.toFixed(1)}${typeDef.unit} <span style="color:#888;">[${ins.score}分]</span></div>`;
                });
            } else if (isDeepGreen) {
                html += `<div style="margin-top:8px;border-top:1px solid #333;padding-top:5px;color:#555;font-size:12px;">词条: 12级开始解锁，每3级获得一次</div>`;
            }

            // 操作按钮
            html += `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">`;
            if (isDeepGreen && !weapon.bound) {
                html += `<button onclick="bindWeapon(player.equippedWeapon);updateEquipPanel();" style="background:#8b4513;color:#FFD700;border:1px solid #d4af37;padding:4px 10px;cursor:pointer;font-family:inherit;border-radius:4px;font-size:12px;">认主绑定</button>`;
            }
            if (isDeepGreen) {
                html += `<button onclick="if(confirm('确认重生？等级、词条、爆攻、进阶将全部重置！')){rebirthWeapon(player.equippedWeapon);updateEquipPanel();}" style="background:#8B0000;color:#00FFAA;border:1px solid #00FFAA;padding:4px 10px;cursor:pointer;font-family:inherit;border-radius:4px;font-size:12px;">🔄重生</button>`;
            }
            if (isDeepGreen && stageRequirements[weapon.stage + 1] && weapon.level >= stageRequirements[weapon.stage + 1].reqLevel) {
                html += `<button onclick="attemptWeaponStageUp(player.equippedWeapon);updateEquipPanel();" style="background:#4a7c59;color:#fff;border:none;padding:4px 10px;cursor:pointer;font-family:inherit;border-radius:4px;font-size:12px;">尝试进阶</button>`;
            }
            // 卸下武器
            html += `<button onclick="unequipWeapon();" style="background:#555;color:#fff;border:none;padding:4px 10px;cursor:pointer;font-family:inherit;border-radius:4px;font-size:12px;">卸下</button>`;
            html += `</div>`;

            content.innerHTML = html;
        }

        // 卸下武器
        function unequipWeapon() {
            if (!player.equippedWeapon) return;
            if (addToBag(player.equippedWeapon)) {
                player.equippedWeapon = null;
                activateMythicSkill(); // 卸下武器：清除技能
                updateEquipPanel();
                updateEquipSlots();
                createFloatingText(player.x, player.y - 40, '卸下武器', '#888');
            }
        }

        // 定期更新装备栏（如果打开状态）
        setInterval(() => {
            if (equipPanel.style.display === 'block') {
                updateEquipPanel();
            }
        }, 500);

        // ========== 后台运行支持 ==========
        let isPageVisible = true;
        let backgroundInterval = null;
        const BACKUP_FPS = 60; // 游戏目标帧率（60帧/秒）
        const BACKUP_INTERVAL = 1000 / 30; // setInterval 触发间隔（≈33ms，但浏览器后台会节流到1秒）
        const FRAME_MS = 1000 / 60; // 单帧时长
        let lastBackupTime = 0;
        let lastVisibleTime = 0; // 切到后台时的时间戳

        // 页面可见性变化处理
        // ⚠️ 只监听 visibilitychange，不再监听 blur/focus
        // 防止误触：点击背包按钮、右键菜单、窗口边缘都会触发 blur 导致游戏卡死
        // 只有真正切 tab / 最小化才会触发 visibilitychange
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                enterBackgroundMode();
            } else {
                exitBackgroundMode();
            }
        });

        function enterBackgroundMode() {
            if (!isPageVisible) return; // 已经在后台
            isPageVisible = false;
            lastBackupTime = performance.now();
            if (!backgroundInterval) {
                backgroundInterval = setInterval(gameLoopBackup, BACKUP_INTERVAL);
            }
        }

        function exitBackgroundMode() {
            if (isPageVisible) return; // 已经在前台
            // 不再做同步补帧（会卡死浏览器）
            // 后台时游戏进度已通过 gameLoopBackup 推进，直接恢复即可
            lastBackupTime = 0;
            isPageVisible = true;
            if (backgroundInterval) {
                clearInterval(backgroundInterval);
                backgroundInterval = null;
            }
            requestAnimationFrame(gameLoop);
        }

        // 背包系统交互
        const bagBtn = document.getElementById('bagBtn');
        const bagPanel = document.getElementById('bagPanel');
        const closeBag = document.getElementById('closeBag');
        const sortBag = document.getElementById('sortBag');
        const bagGrid = document.getElementById('bagGrid');

        // 初始化背包格子
        function initBagGrid() {
            bagGrid.innerHTML = '';
            for (let i = 0; i < bag.maxSize; i++) {
                const slot = document.createElement('div');
                slot.className = 'bag-slot';
                slot.style.cssText = 'width:44px;height:44px;background:linear-gradient(135deg,rgba(40,30,20,0.8),rgba(20,15,10,0.8));border:1px solid #5a4530;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:20px;position:relative;overflow:hidden;transition:all 0.15s;';
                slot.dataset.index = i;
                // 左键：使用/装备
                slot.addEventListener('click', () => useBagItem(i));
                // 右键：存入储物箱
                slot.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    bagToStorage(i);
                });
                // tooltip
                slot.addEventListener('mouseenter', (e) => {
                    const item = bag.items[i];
                    if (!item) return;
                    let html = '';
                    if (item.type === 'greenWeapon' || item.type === 'lightGreenWeapon') {
                        html = buildWeaponTooltip(item);
                    } else {
                        html = buildEquipTooltip(item);
                    }
                    if (html) showTooltip(e, html);
                });
                slot.addEventListener('mouseleave', hideTooltip);
                bagGrid.appendChild(slot);
            }
            updateBagDisplay();
            initStorageGrid();
        }

        // 初始化储物箱
        function initStorageGrid() {
            const storageGrid = document.getElementById('storageGrid');
            storageGrid.innerHTML = '';
            for (let i = 0; i < storage.maxSize; i++) {
                const slot = document.createElement('div');
                slot.className = 'storage-slot';
                slot.style.cssText = 'width:44px;height:44px;background:linear-gradient(135deg,rgba(20,30,45,0.8),rgba(10,20,35,0.8));border:1px solid #2a4060;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;position:relative;transition:all 0.15s;';
                slot.dataset.index = i;
                // 左键：取出到背包
                slot.addEventListener('click', () => storageToBag(i));
                // 右键：无操作
                slot.addEventListener('contextmenu', (e) => e.preventDefault());
                // tooltip
                slot.addEventListener('mouseenter', (e) => {
                    const item = storage.items[i];
                    if (!item) return;
                    let html = '';
                    if (item.type === 'greenWeapon' || item.type === 'lightGreenWeapon') {
                        html = buildWeaponTooltip(item);
                    } else {
                        html = buildEquipTooltip(item);
                    }
                    if (html) showTooltip(e, html);
                });
                slot.addEventListener('mouseleave', hideTooltip);
                storageGrid.appendChild(slot);
            }
            updateStorageDisplay();
        }

        // 更新储物箱显示
        function updateStorageDisplay() {
            const slots = document.querySelectorAll('.storage-slot');
            slots.forEach((slot, i) => {
                const item = storage.items[i];
                if (item) {
                    if (item.type === 'ancientStone') {
                        slot.innerHTML = `<span style="font-size:24px;">🗿</span><span style="font-size:9px;color:#FFD700;position:absolute;bottom:1px;right:2px;font-weight:bold;text-shadow:0 0 3px #000;">×${item.count}</span>`;
                        slot.style.borderColor = '#FF8C00';
                        slot.style.boxShadow = '0 0 10px #FF8C00, inset 0 0 5px rgba(255,140,0,0.3)';
                        slot.title = `上古石 ×${item.count}`;
                    } else if (item.type === 'greenWeapon' || item.type === 'lightGreenWeapon') {
                        let borderColor = item.type === 'greenWeapon' ? '#2E8B57' : '#90EE90';
                        let rating = item.scoreRating || getScoreRating(item.totalScore || 0);
                        if (item.type === 'greenWeapon' && item.totalScore > 0) {
                            borderColor = rating.color;
                        } else if (item.type === 'greenWeapon' && item.stage > 0) {
                            borderColor = weaponStages[item.stage].color;
                        }
                        const isMythic = item.mythicSkillId;
                        const isShenBing = (item.totalScore || 0) >= 1500;
                        const glowSize = isMythic ? 16 : (isShenBing ? 12 : 8);
                        let scoreHtml = '';
                        if (item.type === 'greenWeapon' && item.totalScore > 0) {
                            scoreHtml = `<span style="font-size:8px;color:${rating.color};position:absolute;top:1px;right:2px;font-weight:bold;text-shadow:0 0 2px #000;">${item.totalScore}</span>`;
                        }
                        let mythicIcon = '';
                        if (item.mythicSkillId) {
                            const skill = mythicSkills.find(s => s.id === item.mythicSkillId);
                            if (skill) mythicIcon = `<span style="font-size:10px;position:absolute;top:1px;left:1px;filter:drop-shadow(0 0 3px ${skill.color});">${skill.icon}</span>`;
                        }
                        slot.innerHTML = `<span style="font-size:22px;">🗡️</span>${scoreHtml}${mythicIcon}<span style="font-size:8px;color:${borderColor};position:absolute;bottom:1px;left:2px;font-weight:bold;text-shadow:0 0 2px #000;">Lv${item.level}</span>`;
                        slot.style.borderColor = borderColor;
                        slot.style.boxShadow = `0 0 ${glowSize}px ${borderColor}, inset 0 0 6px ${borderColor}80`;
                        if (isMythic) {
                            slot.style.animation = 'mythicPulse 2s ease-in-out infinite';
                        } else {
                            slot.style.animation = '';
                        }
                        slot.title = `${item.name} Lv.${item.level}`;
                    } else {
                        const equipType = equipTypes[item.type];
                        const quality = itemQualities[item.quality];
                        slot.innerHTML = `<span style="font-size:22px;">${equipType.icon}</span>`;
                        slot.style.borderColor = quality.color;
                        slot.style.boxShadow = `0 0 10px ${quality.color}, inset 0 0 4px ${quality.color}40`;
                        slot.style.animation = '';
                        slot.title = `${quality.name}${equipType.name}`;
                    }
                } else {
                    slot.innerHTML = '';
                    slot.style.borderColor = '#2a4060';
                    slot.style.boxShadow = 'none';
                    slot.style.animation = '';
                    slot.title = '空';
                }
