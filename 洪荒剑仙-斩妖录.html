<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洪荒剑仙 - 斩妖录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @keyframes bossWarning {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        @keyframes bossTextPulse {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.5);
            }
            20% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.2);
            }
            40% { 
                transform: translate(-50%, -50%) scale(1);
            }
            80% { 
                opacity: 1; 
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        @keyframes levelUpPulse {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.3);
            }
            30% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.1);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1);
            }
            80% { 
                opacity: 1; 
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.9);
            }
        }
        
        /* 自定义tooltip */
        #gameTooltip {
            display: none;
            position: fixed;
            z-index: 99999;
            background: rgba(10, 5, 2, 0.96);
            border: 2px solid #8b4513;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #d4af37;
            pointer-events: none;
            max-width: 280px;
            box-shadow: 0 0 15px rgba(139, 69, 19, 0.6);
            font-family: 'SimSun', '宋体', serif;
            line-height: 1.6;
        }
        #gameTooltip .tt-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #555;
        }
        #gameTooltip .tt-row {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        #gameTooltip .tt-label { color: #888; }
        #gameTooltip .tt-value { color: #e8d5a3; text-align: right; }
        #gameTooltip .tt-value.green { color: #4CAF50; }
        #gameTooltip .tt-value.blue { color: #4169E1; }
        #gameTooltip .tt-value.purple { color: #9370DB; }
        #gameTooltip .tt-value.gold { color: #FFD700; }
        #gameTooltip .tt-value.orange { color: #FF8C00; }
        #gameTooltip .tt-value.red { color: #FF4500; }
        #gameTooltip .tt-divider {
            border-top: 1px solid #333;
            margin: 5px 0;
        }
        #gameTooltip .tt-inscription {
            font-size: 11px;
            padding: 1px 0;
        }
        #gameTooltip .tt-score {
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px solid #555;
        }
        
        body {
            background: linear-gradient(135deg, #1a0f0a 0%, #2d1810 50%, #1a0f0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'SimSun', '宋体', serif;
            overflow: hidden;
            user-select: none;
        }
        
        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 32px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.8);
            margin-bottom: 8px;
            letter-spacing: 6px;
        }
        
        .subtitle {
            color: #8b7355;
            font-size: 14px;
            letter-spacing: 3px;
        }
        
        .stats {
            display: flex;
            gap: 25px;
            font-size: 14px;
            color: #d4af37;
            margin-top: 10px;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .canvas-wrapper {
            position: relative;
            border: 3px solid #8b4513;
            border-radius: 50%;
            box-shadow: 
                0 0 40px rgba(139, 69, 19, 0.4),
                inset 0 0 60px rgba(0, 0, 0, 0.5),
                0 0 0 2px #d4af37,
                0 0 0 4px #8b4513;
            background: radial-gradient(circle at center, #1a0f0a 0%, #0d0705 100%);
            margin-top: 15px;
        }
        
        canvas {
            border-radius: 50%;
            cursor: crosshair;
            display: block;
        }
        
        .controls {
            color: #8b7355;
            margin-top: 20px;
            font-size: 13px;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .revive-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }
        
        .revive-text {
            font-size: 40px;
            color: #dc143c;
            text-shadow: 0 0 30px #dc143c;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 10px;
        }
        
        .revive-countdown {
            font-size: 60px;
            color: #ffd700;
            text-shadow: 0 0 40px #ffd700;
            font-family: 'Courier New', monospace;
        }
        
        .revive-subtext {
            color: #8b7355;
            font-size: 16px;
            margin-top: 15px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>洪荒剑仙</h1>
            <div class="subtitle">上古战场 · 斩妖除魔</div>
            <div class="stats">
                <div class="stat-item">
                    <span>剑客 Lv.<span id="playerLevel">1</span></span>
                </div>
                <div class="stat-item">
                    <span>气血: <span id="playerHp">100</span>/<span id="playerMaxHp">100</span></span>
                </div>
                <div class="stat-item">
                    <span>斩妖: <span id="kills">0</span></span>
                </div>
                <div class="stat-item">
                    <span>波次: <span id="wave">1</span></span>
                </div>
                <div class="stat-item">
                    <span>修为: <span id="score">0</span></span>
                </div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="500" height="500"></canvas>
            <div class="revive-overlay" id="reviveOverlay">
                <div class="revive-text">道消身殒</div>
                <div class="revive-countdown" id="reviveCountdown">5</div>
                <div class="revive-subtext">元神重塑中...</div>
            </div>
        </div>
        
        <div class="controls">
            点击地面御剑飞行 | 剑气自动斩妖 | 死亡后5秒重塑肉身 | <button id="equipBtn" style="background:#8b4513;color:#ffd700;border:1px solid #d4af37;padding:2px 8px;cursor:pointer;font-family:inherit;">装备栏</button> | <button id="bagBtn" style="background:#4a7c59;color:#ffd700;border:1px solid #d4af37;padding:2px 8px;cursor:pointer;font-family:inherit;">背包</button>
        </div>
        
        <!-- 装备栏界面 -->
        <div id="equipPanel" style="display:none;position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.95);border:3px solid #8b4513;border-radius:15px;padding:15px;z-index:10000;box-shadow:0 0 30px rgba(139,69,19,0.5);width:520px;max-height:90vh;overflow-y:auto;">
            <div style="text-align:center;color:#ffd700;font-size:24px;margin-bottom:15px;">装备栏</div>
            <div style="display:flex;gap:15px;">
                <!-- 左侧：人物和装备 -->
                <div style="position:relative;width:200px;height:280px;background:rgba(139,69,19,0.2);border-radius:10px;border:2px solid #8b4513;flex-shrink:0;">
                    <!-- 头盔 -->
                    <div class="equip-slot" data-slot="helmet" style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;" title="头盔">🪖</div>
                    <!-- 左手法宝 -->
                    <div class="equip-slot" data-slot="leftHand" style="position:absolute;top:80px;left:10px;width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;" title="法宝">📿</div>
                    <!-- 人物 -->
                    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;">👤</div>
                    <!-- 右手武器 -->
                    <div class="equip-slot" data-slot="weapon" id="weaponSlot" style="position:absolute;top:80px;right:10px;width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #90EE90;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;box-shadow:0 0 10px #90EE90;" title="武器">🗡️</div>
                    <!-- 衣服 -->
                    <div class="equip-slot" data-slot="armor" style="position:absolute;top:150px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;" title="衣服">👘</div>
                    <!-- 鞋子 -->
                    <div class="equip-slot" data-slot="shoes" style="position:absolute;top:220px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;" title="鞋子">👢</div>
                    <!-- 项链 -->
                    <div class="equip-slot" data-slot="necklace" style="position:absolute;top:150px;left:10px;width:40px;height:40px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;" title="项链">📿</div>
                    <!-- 戒指 -->
                    <div class="equip-slot" data-slot="ring" style="position:absolute;top:150px;right:10px;width:40px;height:40px;background:rgba(0,0,0,0.5);border:2px solid #666;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;" title="戒指">💍</div>
                </div>
                <!-- 右侧：武器详细信息 -->
                <div id="weaponInfoPanel" style="width:280px;color:#d4af37;font-size:14px;">
                    <div id="weaponInfoContent" style="color:#888;">未装备武器</div>
                </div>
                <!-- 上古石槽位 -->
                <div style="width:60px;display:flex;flex-direction:column;align-items:center;">
                    <div style="color:#FF8C00;font-size:11px;margin-bottom:5px;">上古石</div>
                    <div id="ancientStoneSlot" style="width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid #FF8C00;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;position:relative;box-shadow:0 0 10px rgba(255,140,0,0.3);" title="上古石槽位 - 提升词条品质概率">🗿</div>
                    <div id="ancientStoneCount" style="color:#FF8C00;font-size:11px;margin-top:3px;">0</div>
                </div>
            </div>
            <button id="closeEquip" style="position:absolute;top:10px;right:10px;background:#8b4513;color:#ffd700;border:1px solid #d4af37;padding:5px 12px;cursor:pointer;font-family:inherit;border-radius:5px;font-size:16px;">✕</button>
        </div>
        
        <!-- 背包界面 -->
        <!-- 背包+储物箱面板 -->
        <div id="bagPanel" style="display:none;position:fixed;top:50%;right:5px;transform:translateY(-50%);background:rgba(0,0,0,0.95);border:3px solid #8b4513;border-radius:15px;padding:10px;z-index:10000;box-shadow:0 0 30px rgba(139,69,19,0.5);width:280px;max-height:95vh;overflow-y:auto;">
            <div style="text-align:center;color:#ffd700;font-size:16px;margin-bottom:8px;">🎒 背包</div>
            <div id="bagGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:8px;">
                <!-- 背包格子由JS生成 -->
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <span id="bagCount" style="color:#888;font-size:11px;">0/20</span>
                <button id="sortBag" style="background:#4a7c59;color:#fff;border:none;padding:3px 10px;cursor:pointer;font-family:inherit;border-radius:5px;font-size:10px;">整理</button>
            </div>
            <div style="border-top:2px solid #8b4513;margin:6px 0;"></div>
            <div style="text-align:center;color:#4169E1;font-size:16px;margin-bottom:8px;">📦 储物箱</div>
            <div id="storageGrid" style="display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:8px;">
                <!-- 储物箱格子由JS生成 -->
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span id="storageCount" style="color:#888;font-size:11px;">0/100</span>
                <span style="color:#666;font-size:9px;">右键存 / 左键取</span>
            </div>
            <button id="closeBag" style="position:absolute;top:8px;right:8px;background:#8b4513;color:#ffd700;border:1px solid #d4af37;padding:3px 8px;cursor:pointer;font-family:inherit;border-radius:5px;font-size:12px;">✕</button>
        </div>
    </div>

    <!-- 自定义tooltip -->
    <div id="gameTooltip"></div>

            critDmg: { name: '暴击伤害', category: '输出', maxValue: 160, scorePerUnit: 400/160, unit: '%', color: '#E53935' },
            atkSpeed: { name: '攻击速度', category: '输出', maxValue: 44, scorePerUnit: 400/44, unit: '%', color: '#FF7043' },
            atkRange: { name: '攻击范围', category: '输出', maxValue: 50, scorePerUnit: 400/50, unit: '%', color: '#FFAB91' },
            fireDmg: { name: '附加火伤', category: '输出', maxValue: 272, scorePerUnit: 400/272, unit: '', color: '#FF5722' },
            iceDmg: { name: '附加冰伤', category: '输出', maxValue: 248, scorePerUnit: 400/248, unit: '', color: '#4FC3F7' },
            poisonDmg: { name: '附加毒伤', category: '输出', maxValue: 232, scorePerUnit: 400/232, unit: '', color: '#8BC34A' },
            // 续航类 - 绿色/青色系
            hpSteal: { name: '生命汲取', category: '续航', maxValue: 32, scorePerUnit: 400/32, unit: '%', color: '#66BB6A' },
            mpSteal: { name: '精气汲取', category: '续航', maxValue: 30, scorePerUnit: 400/30, unit: '%', color: '#26A69A' },
            staSteal: { name: '体力汲取', category: '续航', maxValue: 36, scorePerUnit: 400/36, unit: '%', color: '#4DB6AC' },
            dmgReduce: { name: '伤害减免', category: '续航', maxValue: 40, scorePerUnit: 400/40, unit: '%', color: '#78909C' },
            hpBonus: { name: '生命上限', category: '续航', maxValue: 1400, scorePerUnit: 400/1400, unit: '', color: '#81C784' },
            // 养成类 - 蓝色/紫色系
            expBonus: { name: '人物经验加成', category: '养成', maxValue: 40, scorePerUnit: 400/40, unit: '%', color: '#42A5F5' },
            weaponExpBonus: { name: '武具经验加成', category: '养成', maxValue: 52, scorePerUnit: 400/52, unit: '%', color: '#7E57C2' },
            duraReduce: { name: '耐久消耗降低', category: '养成', maxValue: 80, scorePerUnit: 400/80, unit: '%', color: '#5C6BC0' }
        };

        // 攻击范围全局上限
        const ATK_RANGE_MAX = 0.25; // 25%

        // 词条最大叠加次数（每种类型）
        const INSCRIPTION_MAX_STACK = 10;

        // 武器最大词条数量（总词条槽数）
        const WEAPON_MAX_INSCRIPTIONS = 10;

        // ========== 测试用常量 ==========
        const WEAPON_EXP_MULTIPLIER = 100; // 武器经验倍率（测试用，100倍）

        // 品质波动系数（更集中在中间值）
        const qualityFluctuation = {
            common: { min: 0.75, max: 0.95 },  // 普通：范围0.2，更集中
            fine: { min: 0.88, max: 1.08 },    // 优秀：范围0.2
            excellent: { min: 1.0, max: 1.2 }, // 精良：范围0.2
            perfect: { min: 1.15, max: 1.35 }  // 极品：范围0.2
        };

        // 连击计数器
        let comboCount = 0;
        let comboTimer = 0;

        // ========== 职业系统函数 ==========

        // 计算角色属性
        function calculatePlayerStats() {
            const cls = classes[player.classId];
            const attr = player.attributes;
            const effects = attributeEffects;
            
            // 基础值 + 属性加成
            let physicalAtk = 30 + attr.strength * effects.strength.physicalAtk;
            
            // 绿武攻击加成
            if (player.equippedWeapon) {
                const weapon = player.equippedWeapon;
                const template = greenWeapons[weapon.weaponId];
                if (template) {
                    // 计算武器攻击力（基础+成长+爆攻）
                    const levelDiff = weapon.level - template.reqLevel;
                    const baseMinAtk = template.minAtk + template.growth * levelDiff;
                    const baseMaxAtk = template.maxAtk + template.growth * levelDiff;
                    const finalMinAtk = baseMinAtk + weapon.totalBurstAtk;
                    const finalMaxAtk = baseMaxAtk + weapon.totalBurstAtk;
                    const avgAtk = (finalMinAtk + finalMaxAtk) / 2;
                    
                    // 进阶加成
                    const stageBonus = weaponStages[weapon.stage].bonusPercent / 100;
                    const finalAtk = avgAtk * (1 + stageBonus);
                    
                    physicalAtk += finalAtk;
                }
            }
            
            player.computedStats = {
                physicalAtk: physicalAtk,
                maxHp: 100 + attr.constitution * effects.constitution.maxHp,
                maxMp: 50 + attr.spirit * effects.spirit.maxMp,
                physicalDef: attr.constitution * effects.constitution.physicalDef,
                elementalAtk: attr.spirit * effects.spirit.elementalAtk,
                elementalDef: attr.spirit * effects.spirit.elementalDef,
                attackSpeed: 1.0 + attr.agility * effects.agility.attackSpeed,
                moveSpeed: 0.6 + attr.agility * effects.agility.moveSpeed * 10,
                dodge: attr.agility * effects.agility.dodge,
                crit: attr.agility * effects.agility.crit,
                critDamage: 1.5,
                damageReduce: attr.constitution * effects.constitution.damageReduce
            };
            
            // 剑客被动：剑术精通（物攻+8%）
            if (player.classId === 'jianke' && player.equippedWeapon) {
                const weapon = player.equippedWeapon;
                if (weapon && greenWeapons[weapon.weaponId]) {
                    const template = greenWeapons[weapon.weaponId];
                    if (template.name.includes('刀') || template.name.includes('剑')) {
                        player.computedStats.physicalAtk *= 1.08;
                    }
                }
            }

            // 称号加成
            let titleBonus = { atkBonus: 0, hpBonus: 0, critBonus: 0, dmgReduceBonus: 0, elementBonus: 0 };
            if (player.equippedWeapon && player.equippedWeapon.scoreRating) {
                const bonus = player.equippedWeapon.scoreRating.bonus;
                if (bonus) {
                    titleBonus = bonus;
                }
            }

            // 应用称号加成
            player.computedStats.physicalAtk *= (1 + titleBonus.atkBonus);
            player.computedStats.maxHp *= (1 + titleBonus.hpBonus);
            player.computedStats.crit += titleBonus.critBonus;
            player.computedStats.damageReduce += titleBonus.dmgReduceBonus;
            player.computedStats.elementalAtk *= (1 + titleBonus.elementBonus);

            // 同步到 player 的攻击属性
            player.attackDamage = Math.floor(player.computedStats.physicalAtk);
            player.maxHp = Math.floor(player.computedStats.maxHp + getHpBonus());
            player.moveSpeed = player.computedStats.moveSpeed;
            
            // 攻速词条：减少攻击间隔
            const atkSpeedBonus = getAtkSpeedBonus();
            const baseInterval = 6;
            player.attackInterval = Math.max(2, Math.floor(baseInterval / (1 + atkSpeedBonus)));
            
            // 计算攻击范围（词条+进阶）
            updatePlayerAttackRange();
        }
        
        // 计算攻击范围
        function updatePlayerAttackRange() {
            let baseRange = 90; // 基础攻击范围
            let rangeBonus = 0;
            
            // 词条加成
            if (player.equippedWeapon) {
                const weapon = player.equippedWeapon;
                weapon.inscriptions.forEach(ins => {
                    if (ins.type === 'atkRange') {
                        rangeBonus += ins.value / 100;
                    }
                });
                
                // 进阶加成
                const stageBonus = weaponStages[weapon.stage].atkRangeBonus / 100;
                rangeBonus += stageBonus;
            }
            
            // 限制上限25%
            if (rangeBonus > ATK_RANGE_MAX) {
                rangeBonus = ATK_RANGE_MAX;
            }
            
            player.attackRange = baseRange * (1 + rangeBonus);
            player.computedStats.atkRangeBonus = rangeBonus;
        }

        // 角色升级
        function levelUpPlayer() {
            player.playerLevel++;
            
            // 根据职业成长加点
            const cls = classes[player.classId];
            player.attributes.strength += cls.growth.strength;
            player.attributes.constitution += cls.growth.constitution;
            player.attributes.agility += cls.growth.agility;
            player.attributes.spirit += cls.growth.spirit;
            
            // 重新计算属性
            calculatePlayerStats();
            
            // 回满血
            player.hp = player.maxHp;
            
            // 显示升级提示
            showPlayerLevelUp();
        }

        function showPlayerLevelUp() {
            const levelUpDiv = document.createElement('div');
            levelUpDiv.style.cssText = `
                position: fixed;
                top: 40%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 32px;
                font-weight: bold;
                color: #FFD700;
                text-shadow: 0 0 20px #FFD700, 0 0 40px #FFD700;
                z-index: 10001;
                text-align: center;
                animation: levelUpPulse 2s ease-out forwards;
            `;
            levelUpDiv.innerHTML = `⚔️ 升级 Lv.${player.playerLevel} ⚔️<br><span style="font-size:16px;color:#fff;">${classes[player.classId].name}</span>`;
            document.body.appendChild(levelUpDiv);
            setTimeout(() => levelUpDiv.remove(), 2000);
        }

        // 角色获取经验
        function addPlayerExp(baseExp) {
            // 人物经验加成词条
            let expBonus = getExpBonus();
            // 称号经验加成
            if (player.equippedWeapon && player.equippedWeapon.scoreRating && player.equippedWeapon.scoreRating.bonus) {
                expBonus += player.equippedWeapon.scoreRating.bonus.playerExpBonus || 0;
            }
            const finalExp = Math.floor(baseExp * (1 + expBonus));
            player.playerExp += finalExp;
            while (player.playerExp >= player.expToNext) {
                player.playerExp -= player.expToNext;
                player.expToNext = Math.floor(player.expToNext * 1.2);
                levelUpPlayer();
            }
            updateUI();
        }

        // ========== 绿武系统函数 ==========

        // 创建深绿武器实例
        function createGreenWeaponInstance(weaponId) {
            const template = greenWeapons[weaponId];
            if (!template) return null;
            return {
                weaponId: weaponId,
                name: template.name,
                level: template.reqLevel,
                exp: 0,
                expToNext: getWeaponExpNeeded(template.reqLevel),
                totalBurstAtk: 0,
                durability: 24,
                maxDurability: 24,
                bound: false,
                stage: 0,
                inscriptions: [],
                totalScore: 0,
                scoreRating: getScoreRating(0),
                type: 'greenWeapon',
                quality: 'green'
            };
        }

        // 创建浅绿武器实例
        function createLightGreenWeaponInstance(weaponId) {
            const template = lightGreenWeapons[weaponId];
            if (!template) return null;
            return {
                weaponId: weaponId,
                name: template.name,
                level: template.reqLevel,
                exp: 0,
                expToNext: getWeaponExpNeeded(template.reqLevel),
                totalBurstAtk: 0,
                durability: 20,
                maxDurability: 20,
                bound: false,
                stage: 0,
                inscriptions: [],
                totalScore: 0,
                scoreRating: getScoreRating(0),
                type: 'lightGreenWeapon',
                quality: 'lightGreen'
            };
        }

        // 获取武器升级所需经验
        function getWeaponExpNeeded(level) {
            if (level < 30) return 80 + level * 5;       // 9-30级：低经验
            if (level < 60) return 200 + (level - 30) * 12; // 31-60级：中经验
            if (level < 90) return 560 + (level - 60) * 20; // 61-90级：高经验
            return 1160 + (level - 90) * 35;              // 91-99级：超高经验
        }

        // 计算武器当前攻击力
        function calcWeaponAtk(weapon) {
            if (!weapon) return { minAtk: 0, maxAtk: 0, finalMinAtk: 0, finalMaxAtk: 0 };
            let isDeepGreen = weapon.type === 'greenWeapon';
            let template = isDeepGreen ? greenWeapons[weapon.weaponId] : lightGreenWeapons[weapon.weaponId];
            if (!template) return { minAtk: 0, maxAtk: 0, finalMinAtk: 0, finalMaxAtk: 0 };

            let levelDiff = weapon.level - template.reqLevel;
            let currentMinAtk = template.minAtk + levelDiff * template.growth;
            let currentMaxAtk = template.maxAtk + levelDiff * template.growth;

            // 进阶加成（仅深绿）
            let stageBonus = 0;
            if (isDeepGreen && weapon.stage > 0) {
                stageBonus = weaponStages[weapon.stage].bonusPercent / 100;
            }

            // 绑定固定伤害加成
            let boundBonus = weapon.bound ? 15 : 0;

            let finalMinAtk = currentMinAtk * (1 + stageBonus) + boundBonus;
            let finalMaxAtk = currentMaxAtk * (1 + stageBonus) + boundBonus;

            // 爆攻加成
            finalMinAtk += weapon.totalBurstAtk;
            finalMaxAtk += weapon.totalBurstAtk;

            return {
                minAtk: Math.floor(currentMinAtk),
                maxAtk: Math.floor(currentMaxAtk),
                finalMinAtk: Math.floor(finalMinAtk),
                finalMaxAtk: Math.floor(finalMaxAtk)
            };
        }

        // 获取武器最大耐久
        function getWeaponMaxDurability(level) {
            return Math.min(24 + Math.floor((level - 9) * 0.3), 48);
        }

        // 武器获取经验
        function addWeaponExp(weapon, baseExp) {
            if (!weapon) return;
            let isDeepGreen = weapon.type === 'greenWeapon';
            let template = isDeepGreen ? greenWeapons[weapon.weaponId] : lightGreenWeapons[weapon.weaponId];
            if (!template) return;
            if (weapon.level >= template.maxLevel) return;

            // 连击加成
            let comboMultiplier = 1.0;
            if (comboCount >= 100) comboMultiplier = 1.3;
            else if (comboCount >= 50) comboMultiplier = 1.15;

            // 绑定经验加成
            let expMultiplier = comboMultiplier * (weapon.bound ? 1.08 : 1.0);

            // 武具经验加成词条
            let weaponExpBonus = 0;
            weapon.inscriptions.forEach(ins => {
                if (ins.type === 'weaponExpBonus') weaponExpBonus += ins.value;
            });
            expMultiplier *= (1 + weaponExpBonus / 100);

            // 称号武具经验加成
            if (weapon.scoreRating && weapon.scoreRating.bonus) {
                expMultiplier *= (1 + (weapon.scoreRating.bonus.weaponExpBonus || 0));
            }

            // 测试用经验倍率
            expMultiplier *= WEAPON_EXP_MULTIPLIER;

            let finalExp = Math.floor(baseExp * expMultiplier);
            
            // 检查是否解锁新词条（每3级一次）
            const prevLevel = weapon.level;
            weapon.exp += finalExp;
            
            // 计算新等级
            let newLevel = prevLevel;
            while (weapon.exp >= weapon.expToNext && newLevel < template.maxLevel) {
                weapon.exp -= weapon.expToNext;
                newLevel++;
            }
            
            if (newLevel > prevLevel) {
                // 每2级获得一次词条（从12级开始）
                for (let lvl = prevLevel + 1; lvl <= newLevel; lvl++) {
                    if (lvl >= 12 && (lvl - 12) % 2 === 0) {
                        unlockInscription(weapon);
                    }
                    
                    // 爆攻判定（深绿武器）
                    if (isDeepGreen) {
                        let burstChance = 0.20;
                        if (comboCount >= 100) burstChance += 0.05;
                        else if (comboCount >= 50) burstChance += 0.03;

                        let rand = Math.random();
                        if (rand < 0.01) {
                            weapon.totalBurstAtk += 3;
                            showWeaponBurstAtk(3);
                        } else if (rand < 0.05) {
                            weapon.totalBurstAtk += 2;
                            showWeaponBurstAtk(2);
                        } else if (rand < 0.25) {
                            weapon.totalBurstAtk += 1;
                            showWeaponBurstAtk(1);
                        }
                        // 累计爆攻上限60
                        weapon.totalBurstAtk = Math.min(weapon.totalBurstAtk, 60);
                    }
                }
                
                weapon.level = newLevel;
                weapon.expToNext = getWeaponExpNeeded(weapon.level);
                weapon.maxDurability = getWeaponMaxDurability(weapon.level);
                
                showWeaponLevelUp(weapon.name, weapon.level);
                
                // 重新计算角色属性（武器升级影响攻击力）
                calculatePlayerStats();
            }

            // 更新装备栏显示
            if (equipPanel.style.display === 'block') updateEquipPanel();
        }

        // 体型增伤词条类型
        const sizeDamageTypes = ['largeDmg', 'mediumDmg', 'smallDmg'];
        
        // 生成随机词条
        function generateInscription(weapon) {
            const types = Object.keys(inscriptionTypes);
            const qualities = ['common', 'fine', 'excellent', 'perfect'];
            
            // 上古石效果：提升高品质词条概率
            let qualityWeights;
            if (ancientStone.count > 0) {
                // 有上古石：白44% 蓝33% 紫18% 金5%
                qualityWeights = [0.44, 0.33, 0.18, 0.05];
            } else {
                // 无上古石：白55% 蓝30% 紫12% 金3%
                qualityWeights = [0.55, 0.30, 0.12, 0.03];
            }
            
            let selectedType;
            
            // 检查是否已有10个词条
            if (weapon.inscriptions.length >= WEAPON_MAX_INSCRIPTIONS) {
                // 满10条后，从已有词条中随机选择一个类型进行叠加
                const randomIndex = Math.floor(Math.random() * weapon.inscriptions.length);
                selectedType = weapon.inscriptions[randomIndex].type;
            } else {
                // 未满10条，随机选择词条类型（排除已满10层的类型）
                let availableTypes = types.filter(type => {
                    const count = weapon.inscriptions.filter(i => i.type === type).length;
                    return count < INSCRIPTION_MAX_STACK;
                });
                
                // 检查已拥有的体型增伤词条数量
                const existingSizeDmgCount = weapon.inscriptions.filter(i => 
                    sizeDamageTypes.includes(i.type)
                ).length;
                
                // 如果已有2种体型增伤，排除剩余的体型增伤类型
                if (existingSizeDmgCount >= 2) {
                    availableTypes = availableTypes.filter(type => !sizeDamageTypes.includes(type));
                }
                
                // 如果没有可用类型（理论上不会发生，因为总词条数<10时必有空位），从已有类型中选择
                if (availableTypes.length === 0) {
                    const randomIndex = Math.floor(Math.random() * weapon.inscriptions.length);
                    selectedType = weapon.inscriptions[randomIndex].type;
                } else {
                    selectedType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
                }
            }
            
            const typeConfig = inscriptionTypes[selectedType];
            
            // 随机品质
            let rand = Math.random();
            let quality = 'common';
            for (let i = 0; i < qualities.length; i++) {
                rand -= qualityWeights[i];
                if (rand <= 0) {
                    quality = qualities[i];
                    break;
                }
            }
            
            // 计算波动值
            const fluctuation = qualityFluctuation[quality];
            const baseValue = typeConfig.maxValue / INSCRIPTION_MAX_STACK;
            const minValue = baseValue * fluctuation.min;
            const maxValue = baseValue * fluctuation.max;
            const actualValue = minValue + Math.random() * (maxValue - minValue);
            
            // 计算分数
            const score = actualValue * typeConfig.scorePerUnit;
            
            // 返回词条信息，标记是否使用了上古石
            return {
                type: selectedType,
                quality: quality,
                value: actualValue,
                score: Math.floor(score),
                usedAncientStone: ancientStone.count > 0
            };
        }

        // 词条解锁函数
        function unlockInscription(weapon) {
            const newInscription = generateInscription(weapon);
            
            // 消耗上古石
            if (newInscription.usedAncientStone && ancientStone.count > 0) {
                ancientStone.count--;
                updateAncientStoneDisplay();
                createFloatingText(player.x, player.y - 60, '上古石加持！', '#FF8C00');
            }
            
            // 检查是否已有同类型词条
            const existingIndex = weapon.inscriptions.findIndex(i => i.type === newInscription.type);
            
            if (existingIndex >= 0) {
                // 合并叠加
                const existing = weapon.inscriptions[existingIndex];
                existing.value += newInscription.value;
                existing.score += newInscription.score;
                
                // 检查是否达到上限
                const typeConfig = inscriptionTypes[newInscription.type];
                if (existing.value > typeConfig.maxValue) {
                    existing.value = typeConfig.maxValue;
                    existing.score = Math.floor(typeConfig.maxValue * typeConfig.scorePerUnit); // 满分
                }
                
                showInscriptionMerge(weapon.name, typeConfig.name, existing.value, existing.score);
            } else if (weapon.inscriptions.length < WEAPON_MAX_INSCRIPTIONS) {
                // 新词条（未满10条时）
                weapon.inscriptions.push(newInscription);
                showInscriptionUnlock(weapon.name, inscriptionTypes[newInscription.type].name, newInscription.quality);
            } else {
                // 已满10条，但生成了新类型（理论上不会发生），强制叠加到第一个词条
                const existing = weapon.inscriptions[0];
                existing.value += newInscription.value;
                existing.score += newInscription.score;
                const typeConfig = inscriptionTypes[existing.type];
                if (existing.value > typeConfig.maxValue) {
                    existing.value = typeConfig.maxValue;
                    existing.score = 100;
                }
                showInscriptionMerge(weapon.name, typeConfig.name, existing.value, existing.score);
            }
            
            // 更新武器评分
            updateWeaponScore(weapon);
        }

        // 武器评分系统
        function updateWeaponScore(weapon) {
            let totalScore = 0;
            
            // 词条分数累计
            weapon.inscriptions.forEach(ins => {
                totalScore += ins.score || 0;
            });
            
            weapon.totalScore = totalScore;
            weapon.scoreRating = getScoreRating(totalScore);
        }

        // 称号配置（新评分系统）
        const titleBonuses = {
            '凡铁': { atkBonus: 0, hpBonus: 0, critBonus: 0, dmgReduceBonus: 0, elementBonus: 0, playerExpBonus: 0, weaponExpBonus: 0 },
            '精钢': { atkBonus: 0, hpBonus: 0.01, critBonus: 0, dmgReduceBonus: 0, elementBonus: 0, playerExpBonus: 0.01, weaponExpBonus: 0.01 },
            '灵器': { atkBonus: 0, hpBonus: 0.02, critBonus: 0.005, dmgReduceBonus: 0.01, elementBonus: 0, playerExpBonus: 0.02, weaponExpBonus: 0.02 },
            '仙兵': { atkBonus: 0, hpBonus: 0.03, critBonus: 0.01, dmgReduceBonus: 0.02, elementBonus: 0, playerExpBonus: 0.03, weaponExpBonus: 0.03 },
            '神器': { atkBonus: 0, hpBonus: 0.05, critBonus: 0.015, dmgReduceBonus: 0.03, elementBonus: 0, playerExpBonus: 0.04, weaponExpBonus: 0.05 },
            '圣物': { atkBonus: 0.03, hpBonus: 0.08, critBonus: 0.02, dmgReduceBonus: 0.05, elementBonus: 0.03, playerExpBonus: 0.05, weaponExpBonus: 0.08 }
        };

        function getScoreRating(score) {
            if (score >= 1700) return { name: '神话', color: '#FF0000', title: '圣物', bonus: titleBonuses['圣物'] };
            if (score >= 1650) return { name: '史诗', color: '#FFD700', title: '神器', bonus: titleBonuses['神器'] };
            if (score >= 1600) return { name: '传说', color: '#FF8C00', title: '仙兵', bonus: titleBonuses['仙兵'] };

            if (!weapon || weapon.type !== 'greenWeapon') return false;
            if (weapon.stage >= 4) return false;
            let nextStage = weapon.stage + 1;
            let req = stageRequirements[nextStage];
            if (!req) return false;
            if (weapon.level < req.reqLevel) return false;

            let success = Math.random() < req.successRate;
            if (success) {
                weapon.stage = nextStage;
                updatePlayerAttackRange(); // 更新攻击范围
                showWeaponStageUp(weapon.name, weaponStages[nextStage].name, weaponStages[nextStage].color);
            } else {
                showWeaponStageFail(weapon.name);
            }
            return success;
        }

        // 武器认主绑定（随机获得一条词缀）
        function bindWeapon(weapon) {
            if (!weapon || weapon.bound) return false;
            weapon.bound = true;
            
            // 认主时随机获得一条词缀
            if (weapon.inscriptions.length < WEAPON_MAX_INSCRIPTIONS) {
                const newInscription = generateInscription(weapon);
                const existingIndex = weapon.inscriptions.findIndex(i => i.type === newInscription.type);
                
                if (existingIndex >= 0) {
                    // 已有同类型词条，叠加
                    const existing = weapon.inscriptions[existingIndex];
                    existing.value += newInscription.value;
                    existing.score += newInscription.score;
                    const typeConfig = inscriptionTypes[newInscription.type];
                    if (existing.value > typeConfig.maxValue) {
                        existing.value = typeConfig.maxValue;
                        existing.score = 100;
                    }
                    showInscriptionMerge(weapon.name, typeConfig.name, existing.value, existing.score);
                } else {
                    // 新增词条
                    weapon.inscriptions.push(newInscription);
                    showInscriptionUnlock(weapon.name, inscriptionTypes[newInscription.type].name, newInscription.quality);
                }
                updateWeaponScore(weapon);
                showWeaponBind(weapon.name, inscriptionTypes[newInscription.type].name);
            } else {
                showWeaponBind(weapon.name);
            }
            
            return true;
        }

        // 消耗耐久
        function consumeWeaponDurability(weapon) {
            if (!weapon) return;
            // 每攻击100000次掉1点耐久
            if (!weapon.attackCount) weapon.attackCount = 0;
            weapon.attackCount++;
            
            // 耐久消耗降低词条
            let duraReduce = 0;
            weapon.inscriptions.forEach(ins => {
                if (ins.type === 'duraReduce') duraReduce += ins.value;
            });
            
            // 计算实际需要的攻击次数（考虑词条减免）
            let attacksPerDura = 100000;
            if (duraReduce > 0) {
                attacksPerDura = Math.floor(100000 * (1 + duraReduce / 100));
            }
            
            // 达到次数才扣耐久
            if (weapon.attackCount >= attacksPerDura) {
                weapon.attackCount = 0;
                weapon.durability--;
                if (weapon.durability < 0) weapon.durability = 0;
            }
        }

            // 角色获取经验

            // 连击加成

        function drawBackground() {
            ctx.fillStyle = 'rgba(13, 7, 5, 0.98)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(139, 69, 19, 0.3)';
            ctx.lineWidth = 2;
            for (let r = 60; r <= radarRadius; r += 60) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    ctx.fillStyle = 'rgba(139, 69, 19, 0.4)';
                    ctx.font = '12px serif';
                    ctx.fillText('◆', centerX + Math.cos(angle) * r - 4, centerY + Math.sin(angle) * r + 4);
                }
            }

            ctx.strokeStyle = 'rgba(139, 69, 19, 0.25)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + Math.cos(angle) * radarRadius, centerY + Math.sin(angle) * radarRadius);
                ctx.stroke();
            }

            const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            ctx.fillStyle = 'rgba(212, 175, 55, 0.5)';
            ctx.font = '12px SimSun';
            directions.forEach((dir, i) => {
                const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                const x = centerX + Math.cos(angle) * (radarRadius + 15);
                const y = centerY + Math.sin(angle) * (radarRadius + 15);
                ctx.fillText(dir, x - 6, y + 4);
            });

            ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radarRadius, 0, Math.PI * 2);
            ctx.stroke();

        function drawAttackRange() {
            if (!playerAlive) return;
            const gradient = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.attackRange);
            gradient.addColorStop(0, 'rgba(255, 215, 0, 0.05)');
            gradient.addColorStop(1, 'rgba(255, 215, 0, 0.15)');
            ctx.fillStyle = gradient;
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.attackRange, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.15)';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.attackRange * 0.7, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawPlayer() {
            if (!playerAlive) return;
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
            ctx.stroke();

            ctx.fillStyle = '#ffd700';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ffd700';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#fff8dc';
            ctx.beginPath();
            ctx.arc(player.x, player.y, 7, 0, Math.PI * 2);
            ctx.fill();

            player.swordAngle += 0.08;
            for (let i = 0; i < 3; i++) {
                const angle = player.swordAngle + (i * Math.PI * 2 / 3);
                const sx = player.x + Math.cos(angle) * 20;
                const sy = player.y + Math.sin(angle) * 20;
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(sx - 6, sy);
                ctx.lineTo(sx + 6, sy);
                ctx.stroke();
            }

            const barWidth = 36, barHeight = 5;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth, barHeight);
            const hpPercent = player.hp / player.maxHp;
            ctx.fillStyle = hpPercent > 0.5 ? '#22c55e' : (hpPercent > 0.25 ? '#eab308' : '#dc2626');
            ctx.fillRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth * hpPercent, barHeight);
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 1;
            ctx.strokeRect(player.x - barWidth/2, player.y - player.radius - 15, barWidth, barHeight);
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                const distToPlayer = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                const sizeMod = sizeModifiers[enemy.sizeType];
                const scale = sizeMod.scale;
                const scaledRadius = enemy.radius * scale;
                
                if (distToPlayer < enemy.attackRange + 50 && playerAlive) {
                    ctx.strokeStyle = 'rgba(139, 0, 0, 0.15)';
                    ctx.fillStyle = 'rgba(139, 0, 0, 0.03)';
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, enemy.attackRange, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }

                ctx.fillStyle = enemy.color;
                ctx.shadowBlur = 12;
                ctx.shadowColor = enemy.color;
                if (enemy.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, scaledRadius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (enemy.shape === 'triangle') {
                    ctx.beginPath();
                    ctx.moveTo(enemy.x, enemy.y - scaledRadius);
                    ctx.lineTo(enemy.x - scaledRadius, enemy.y + scaledRadius);
                    ctx.lineTo(enemy.x + scaledRadius, enemy.y + scaledRadius);
                    ctx.closePath();
                    ctx.fill();
                } else if (enemy.shape === 'square') {
                    ctx.fillRect(enemy.x - scaledRadius, enemy.y - scaledRadius, scaledRadius * 2, scaledRadius * 2);
                } else if (enemy.shape === 'diamond') {
                    ctx.beginPath();
                    ctx.moveTo(enemy.x, enemy.y - scaledRadius);
                    ctx.lineTo(enemy.x + scaledRadius, enemy.y);
                    ctx.lineTo(enemy.x, enemy.y + scaledRadius);
                    ctx.lineTo(enemy.x - scaledRadius, enemy.y);
                    ctx.closePath();
                    ctx.fill();
                } else if (enemy.shape === 'star') {
                    drawStar(ctx, enemy.x, enemy.y, 5, scaledRadius, scaledRadius * 0.5);
                } else if (enemy.shape === 'hexstar') {
                    drawStar(ctx, enemy.x, enemy.y, 6, scaledRadius, scaledRadius * 0.6);
                }
                ctx.shadowBlur = 0;

                ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, scaledRadius * 0.5, 0, Math.PI * 2);
                ctx.stroke();

                // 体型标识 S/M/L
                const sizeColors = { 'S': '#90EE90', 'M': '#FFD700', 'L': '#FF6347' };
                ctx.fillStyle = sizeColors[enemy.sizeType];
                ctx.font = 'bold 10px SimSun';
                ctx.fillText(enemy.sizeType, enemy.x - 4, enemy.y - scaledRadius - 18);

                // 血条
                const barWidth = 28, barHeight = 4;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(enemy.x - barWidth/2, enemy.y - scaledRadius - 12, barWidth, barHeight);
                const hpPercent = enemy.hp / enemy.maxHp;
                ctx.fillStyle = hpPercent > 0.5 ? '#22c55e' : (hpPercent > 0.25 ? '#eab308' : '#dc2626');
                ctx.fillRect(enemy.x - barWidth/2, enemy.y - scaledRadius - 12, barWidth * hpPercent, barHeight);
            });
        }

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        function updatePlayer() {
            if (!playerAlive) return;

            // 手动移动优先
            if (player.isMoving) {
                const dx = player.targetX - player.x;
                const dy = player.targetY - player.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 3) {
                    player.x += (dx / dist) * player.moveSpeed;
                    player.y += (dy / dist) * player.moveSpeed;
                } else {
                    player.isMoving = false;
                }
            } else {
                // 自动追踪最近的敌人
                if (enemies.length > 0) {
                    let nearestEnemy = null;
                    let nearestDist = Infinity;
                    
                    enemies.forEach(enemy => {
                        const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                        if (dist < nearestDist) {
                            nearestDist = dist;
                            nearestEnemy = enemy;
                        }
                    });

                    // 如果敌人不在攻击范围内，向其移动
                    if (nearestEnemy && nearestDist > player.attackRange) {
                        const dx = nearestEnemy.x - player.x;
                        const dy = nearestEnemy.y - player.y;
                        const dist = Math.hypot(dx, dy);
                        
                        // 计算移动距离（不能超出雷达边界）
                        let moveX = (dx / dist) * player.moveSpeed;
                        let moveY = (dy / dist) * player.moveSpeed;
                        
                        const newX = player.x + moveX;
                        const newY = player.y + moveY;
                        const centerDist = Math.hypot(newX - centerX, newY - centerY);
                        
                        // 限制在雷达范围内移动
                        if (centerDist <= radarRadius - player.radius) {
                            player.x = newX;
                            player.y = newY;
                        } else {
                            // 如果要超出边界，向边界方向移动
                            const angle = Math.atan2(newY - centerY, newX - centerX);
                            player.x = centerX + Math.cos(angle) * (radarRadius - player.radius - 1);
                            player.y = centerY + Math.sin(angle) * (radarRadius - player.radius - 1);
                        }
                    }
                }
            }

            // 边界检查（防止卡在边缘）
            const centerDist = Math.hypot(player.x - centerX, player.y - centerY);
            if (centerDist > radarRadius - player.radius) {
                const angle = Math.atan2(player.y - centerY, player.x - centerX);
                player.x = centerX + Math.cos(angle) * (radarRadius - player.radius);
                player.y = centerY + Math.sin(angle) * (radarRadius - player.radius);
            }
        }

        function playerAutoAttack() {
            if (!playerAlive) return;
            player.attackTimer++;
            if (player.attackTimer >= player.attackInterval) {
                player.attackTimer = 0;
                let targetsInRange = [];
                enemies.forEach(enemy => {
                    const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (dist <= player.attackRange) targetsInRange.push(enemy);
                });
                targetsInRange.forEach((target, index) => {
                    setTimeout(() => {
                        if (playerAlive && enemies.includes(target)) createSwordQi(player, target, player.attackDamage);
                    }, index * 80);
                });
            }
        }

        function updateEnemies() {
            enemies.forEach(enemy => {
                if (playerAlive) {
                    const distToPlayer = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (distToPlayer > enemy.attackRange - 10) {
                        const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                        enemy.x += Math.cos(angle) * enemy.moveSpeed;
                        enemy.y += Math.sin(angle) * enemy.moveSpeed;
                    }
                    if (distToPlayer <= enemy.attackRange && enemy.attackCooldown <= 0) {
                        createDemonQi(enemy, player, enemy.damage);
                        enemy.attackCooldown = enemy.attackSpeed;
                    }
                }
                if (enemy.attackCooldown > 0) enemy.attackCooldown--;
            });
        }

        // ========== 词条属性读取 ==========

        // 获取指定词条的总值
        function getInscriptionValue(type) {
            let total = 0;
            if (player.equippedWeapon && player.equippedWeapon.inscriptions) {
                player.equippedWeapon.inscriptions.forEach(ins => {
                    if (ins.type === type) total += ins.value;

        // 获取玩家锋利破防总值
        function getPlayerPierceDef() {
            return Math.floor(getInscriptionValue('pierceDef'));
        }

        // 获取暴击几率（百分比）
        function getPlayerCritChance() {
            let base = player.computedStats.crit || 0;
            return base + getInscriptionValue('critChance');
        }

        // 获取暴击伤害倍率
        function getPlayerCritDamage() {
            let base = player.computedStats.critDamage || 1.5;
            let bonus = getInscriptionValue('critDmg') / 100;
            return base + bonus;
        }

        // 获取体型增伤百分比
        function getSizeDamageBonus(sizeType) {
            const typeMap = { 'S': 'smallDmg', 'M': 'mediumDmg', 'L': 'largeDmg' };
            return getInscriptionValue(typeMap[sizeType] || '') / 100;
        }

        // 获取元素伤害总值
        function getElementalDamage(elementType) {
            const typeMap = { '火攻': 'fireDmg', '冰攻': 'iceDmg', '毒攻': 'poisonDmg' };
            return getInscriptionValue(typeMap[elementType] || '');
        }

        // 获取生命汲取百分比
        function getHpSteal() {
            return getInscriptionValue('hpSteal') / 100;

        // 获取伤害减免百分比
        function getDmgReduce() {

            let ins = getInscriptionValue('dmgReduce') / 100;
            return base + ins;
        }

        // 获取生命上限加成
        function getHpBonus() {

        function getAtkSpeedBonus() {

        // 计算实际伤害（考虑防御、破防、暴击、体型增伤、元素伤害）
        function calcActualDamage(baseDamage, enemy) {
            let damage = baseDamage;

            // 1. 破防
            const pierceDef = getPlayerPierceDef();
            const actualDefense = Math.max(0, enemy.defense - pierceDef);
            damage = Math.max(1, damage - actualDefense);

            // 2. 体型增伤
            if (enemy.sizeType) {
                const sizeBonus = getSizeDamageBonus(enemy.sizeType);
                damage *= (1 + sizeBonus);
            }

            // 3. 暴击判定
            let isCrit = false;
            const critChance = getPlayerCritChance();
            if (Math.random() * 100 < critChance) {
                isCrit = true;
                damage *= getPlayerCritDamage();
            }

            // 4. 元素伤害（武器自带 + 词条附加）
            let elementalDmg = 0;
            if (player.equippedWeapon) {
                const template = greenWeapons[player.equippedWeapon.weaponId];
                if (template && template.element) {
                    // 武器自带元素伤害（按等级成长）
                    const levelDiff = player.equippedWeapon.level - template.reqLevel;
                    elementalDmg = template.elementGrowth * levelDiff || 0;
                }
                // 词条附加元素伤害
                if (template && template.element) {
                    elementalDmg += getElementalDamage(template.element);
                }
            }
            damage += elementalDmg;

            // 最终伤害最低1
            damage = Math.max(1, Math.floor(damage));

            // 5. 生命汲取
            const hpSteal = getHpSteal();
            if (hpSteal > 0 && damage > 0) {
                const healAmount = Math.floor(damage * hpSteal);
                if (healAmount > 0) {
                    player.hp = Math.min(player.maxHp, player.hp + healAmount);
                }
            }

            return { damage, isCrit };
        }

        function updateProjectiles() {
            projectiles = projectiles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.isPlayer) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        const dist = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                        if (dist < enemy.radius + 6) {
                            // 计算实际伤害（考虑防御、破防、暴击、体型增伤、元素伤害）
                            const result = calcActualDamage(p.damage, enemy);
                            enemy.hp -= result.damage;
                            createDamageText(enemy.x, enemy.y - 20, result.damage, true, result.isCrit);
                            createParticles(p.x, p.y, result.isCrit ? '#FF4500' : '#ffd700', result.isCrit ? 12 : 6);
                            if (enemy.hp <= 0) {
                                createParticles(enemy.x, enemy.y, enemy.color, 18);
                                createFloatingText(enemy.x, enemy.y - 30, '斩!', '#ffd700');
                                score += enemy.score;
                                kills++;
                                enemies.splice(i, 1);
                                // 绿武系统：击杀处理（经验、耐久消耗）
                                onEnemyKilled(enemy);
                                // 掉落装备
                                if (Math.random() < 0.3) {
                                    const drop = generateRandomEquip();
                                    addToBag(drop);
                                    createFloatingText(enemy.x, enemy.y - 50, `掉落${itemQualities[drop.quality].name}${equipTypes[drop.type].name}`, itemQualities[drop.quality].color);
                                }
                                updateUI();
                            }
                            return false;
                        }
                    }
                } else {
                    if (playerAlive) {
                        const dist = Math.hypot(p.x - player.x, p.y - player.y);
                        if (dist < player.radius + 6) {
                            // 伤害减免
                            const dmgReduce = getDmgReduce();
                            const finalDamage = Math.max(1, Math.floor(p.damage * (1 - dmgReduce)));
                            player.hp -= finalDamage;
                            createDamageText(player.x, player.y - 28, finalDamage, false);
                            createParticles(p.x, p.y, '#8b0000', 6);
                            updateUI();
                            if (player.hp <= 0) playerDied();
                            return false;
                        }
                    }
                }
                return p.life > 0;
            });
        }

        function playerDied() {
            playerAlive = false;
            reviveTimer = 5;
            createParticles(player.x, player.y, '#ffd700', 35);
            createFloatingText(player.x, player.y - 40, '道消身殒', '#dc143c');

        function updateParticles() {

        function updateEquipPanel() {

            if (!weapon) {
                content.innerHTML = '<div style="color:#888;">未装备武器</div>';

            let expPercent = weapon.expToNext > 0 ? (weapon.exp / weapon.expToNext * 100) : 0;
            html += `<div style="margin-bottom:4px;font-size:13px;">经验: ${weapon.exp}/${weapon.expToNext}</div>`;
            html += `<div style="width:100%;height:8px;background:#333;border-radius:4px;margin:5px 0 10px 0;overflow:hidden;">
                <div style="width:${expPercent}%;height:100%;background:linear-gradient(90deg,#90EE90,#4CAF50);transition:width 0.3s;"></div>
            </div>`;

            // 攻击力
            html += `<div style="margin-bottom:3px;font-size:13px;">基础攻击: <span style="color:#FF6347;">${atkInfo.minAtk}~${atkInfo.maxAtk}</span></div>`;
            html += `<div style="margin-bottom:3px;font-size:13px;">最终攻击: <span style="color:#FF4500;font-weight:bold;">${atkInfo.finalMinAtk}~${atkInfo.finalMaxAtk}</span></div>`;

            // 爆攻（仅深绿）
            if (isDeepGreen) {
                html += `<div style="margin-bottom:3px;font-size:13px;">爆攻: <span style="color:#FF8C00;">+${weapon.totalBurstAtk}</span>/60</div>`;
            }

            // 耐久
            let duraColor = weapon.durability > weapon.maxDurability * 0.3 ? '#22c55e' : '#dc2626';
            html += `<div style="margin-bottom:3px;font-size:13px;">耐久: <span style="color:${duraColor};">${weapon.durability}</span>/${weapon.maxDurability}</div>`;

            // 进阶（仅深绿）
            if (isDeepGreen) {
                let stageName = weaponStages[weapon.stage].name;
                let nextReq = stageRequirements[weapon.stage + 1];
                html += `<div style="margin-bottom:3px;font-size:13px;">进阶: <span style="color:${stageColor};">${stageName}</span>`;
                if (nextReq && weapon.level < nextReq.reqLevel) {
                    html += ` <span style="color:#888;font-size:11px;">(需${nextReq.reqLevel}级)</span>`;
                } else if (nextReq) {
                    html += ` <span style="color:#FFD700;font-size:11px;">(可进阶 ${Math.floor(nextReq.successRate*100)}%)</span>`;
                }
                html += `</div>`;
            }

            // 绑定状态
            html += `<div style="margin-bottom:3px;font-size:13px;">绑定: <span style="color:${weapon.bound ? '#FFD700' : '#888'};">${weapon.bound ? '已认主' : '未绑定'}</span></div>`;

            // 元素属性
            if (template && template.element) {
                let elemColor = template.element === '火攻' ? '#FF4500' : (template.element === '冰攻' ? '#00BFFF' : '#32CD32');
                html += `<div style="margin-bottom:3px;font-size:13px;">元素: <span style="color:${elemColor};">${template.element}</span></div>`;
            }

            // 武器评分
            if (isDeepGreen) {
                let rating = weapon.scoreRating || getScoreRating(weapon.totalScore || 0);
                let bonusText = '';
                if (rating.bonus) {
                    let bonuses = [];
                    if (rating.bonus.atkBonus > 0) bonuses.push(`物攻+${(rating.bonus.atkBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.hpBonus > 0) bonuses.push(`生命+${(rating.bonus.hpBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.critBonus > 0) bonuses.push(`暴击+${(rating.bonus.critBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.dmgReduceBonus > 0) bonuses.push(`减伤+${(rating.bonus.dmgReduceBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.elementBonus > 0) bonuses.push(`元素+${(rating.bonus.elementBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.playerExpBonus > 0) bonuses.push(`人物经验+${(rating.bonus.playerExpBonus * 100).toFixed(0)}%`);
                    if (rating.bonus.weaponExpBonus > 0) bonuses.push(`武具经验+${(rating.bonus.weaponExpBonus * 100).toFixed(0)}%`);

                html += `<div style="margin-top:8px;border-top:1px solid #333;padding-top:5px;font-size:13px;">

                weapon.inscriptions.forEach((ins, idx) => {
                    let typeDef = inscriptionTypes[ins.type];
                    let qualityDef = inscriptionQualities[ins.quality];
                    let typeColor = typeDef.color || '#FFFFFF';
                    html += `<div style="color:${typeColor};font-size:12px;margin:2px 0 2px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">[${qualityDef.name}] ${typeDef.name} +${ins.value.toFixed(1)}${typeDef.unit} <span style="color:#888;">[${ins.score}分]</span></div>`;
                });
            } else if (isDeepGreen) {
                html += `<div style="margin-top:8px;border-top:1px solid #333;padding-top:5px;color:#555;font-size:12px;">词条: 12级开始解锁，每3级获得一次</div>`;
            }

            // 操作按钮
            html += `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">`;
            if (isDeepGreen && !weapon.bound) {
                html += `<button onclick="bindWeapon(player.equippedWeapon);updateEquipPanel();" style="background:#8b4513;color:#FFD700;border:1px solid #d4af37;padding:4px 10px;cursor:pointer;font-family:inherit;border-radius:4px;font-size:12px;">认主绑定</button>`;
            }

                html += `<button onclick="if(confirm('确认重生？等级、词条、爆攻、进阶将全部重置！')){rebirthWeapon(player.equippedWeapon);updateEquipPanel();}" style="background:#8B0000;color:#00FFAA;border:1px solid #00FFAA;padding:4px 10px;cursor:pointer;font-family:inherit;border-radius:4px;font-size:12px;">🔄重生</button>`;
            }
            if (isDeepGreen && stageRequirements[weapon.stage + 1] && weapon.level >= stageRequirements[weapon.stage + 1].reqLevel) {
                html += `<button onclick="attemptWeaponStageUp(player.equippedWeapon);updateEquipPanel();" style="background:#4a7c59;color:#fff;border:none;padding:4px 10px;cursor:pointer;font-family:inherit;border-radius:4px;font-size:12px;">尝试进阶</button>`;
            }
            // 卸下武器
            html += `<button onclick="unequipWeapon();" style="background:#555;color:#fff;border:none;padding:4px 10px;cursor:pointer;font-family:inherit;border-radius:4px;font-size:12px;">卸下</button>`;
            html += `</div>`;

            content.innerHTML = html;
        }

        // 卸下武器
        function unequipWeapon() {
            if (!player.equippedWeapon) return;
            if (addToBag(player.equippedWeapon)) {
                player.equippedWeapon = null;
                updateEquipPanel();

                createFloatingText(player.x, player.y - 40, '卸下武器', '#888');

        setInterval(() => {

        // ========== 后台运行支持 ==========
        let isPageVisible = true;
        let backgroundInterval = null;
        const BACKUP_FPS = 10; // 后台运行帧率
        const BACKUP_INTERVAL = 1000 / BACKUP_FPS;

        // 页面可见性变化处理
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面隐藏：切换到 setInterval 模式
                isPageVisible = false;
                if (!backgroundInterval) {
                    backgroundInterval = setInterval(gameLoopBackup, BACKUP_INTERVAL);
                }
            } else {
                // 页面显示：切回 requestAnimationFrame 模式
                isPageVisible = true;
                if (backgroundInterval) {
                    clearInterval(backgroundInterval);
                    backgroundInterval = null;

                // 重新启动 RAF 循环
                requestAnimationFrame(gameLoop);

        // 背包系统交互

        const sortBag = document.getElementById('sortBag');

        // 初始化背包格子
        function initBagGrid() {

                slot.dataset.index = i;
                // 左键：使用/装备
                slot.addEventListener('click', () => useBagItem(i));
                // 右键：存入储物箱

                    e.preventDefault();
                    bagToStorage(i);
                });

                slot.addEventListener('mouseenter', (e) => {
                    const item = bag.items[i];

        // 初始化储物箱
        function initStorageGrid() {
            const storageGrid = document.getElementById('storageGrid');
            storageGrid.innerHTML = '';
            for (let i = 0; i < storage.maxSize; i++) {
                const slot = document.createElement('div');
                slot.className = 'storage-slot';

                    const item = storage.items[i];
